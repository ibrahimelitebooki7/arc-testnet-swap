<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Xroga · Arc Swap (Fixed)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0a0f1f; }
    .glass-panel { background: rgba(12,20,32,0.65); backdrop-filter: blur(14px); border: 1px solid #3b82f620; }
    .toast-notify { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293bc9; backdrop-filter: blur(12px); border-radius: 40px; padding: 8px 18px; color: white; font-size: 13px; z-index: 1000; transition: transform 0.25s; pointer-events: none; }
    .toast-show { transform: translateX(-50%) translateY(0); }
    .loading-spinner { width: 16px; height: 16px; border: 2px solid #ffffff33; border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input, select { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; padding: 6px 10px; }
  </style>
</head>
<body>
<div id="toastRoot" class="toast-notify">✨ Ready</div>

<main class="max-w-md mx-auto px-4 py-8">
  <div class="glass-panel rounded-3xl p-5">
    <div class="flex justify-between items-center mb-4">
      <div class="text-2xl font-black bg-gradient-to-r from-white via-blue-400 to-purple-500 bg-clip-text text-transparent">Xroga</div>
      <button id="connectBtn" class="bg-slate-800/70 hover:bg-slate-700/80 rounded-full px-3 py-1.5 text-sm text-slate-200 border border-slate-700">
        <i data-lucide="wallet" class="w-3.5 h-3.5 inline"></i> <span id="connectBtnText">Connect</span>
      </button>
    </div>

    <!-- Token address override (for custom USDC) -->
    <div class="bg-black/30 rounded-xl p-3 mb-4 text-xs">
      <div class="flex flex-col gap-2">
        <div class="flex justify-between items-center">
          <span class="text-slate-400">USDC Token Address:</span>
          <input type="text" id="customUsdcAddress" value="0x3600000000000000000000000000000000000000" class="font-mono text-[11px] w-48">
        </div>
        <div class="flex justify-between items-center">
          <span class="text-slate-400">Your USDC Balance:</span>
          <span id="balanceDisplay" class="font-mono">—</span>
          <button id="refreshBalanceBtn" class="bg-blue-600/50 px-2 py-0.5 rounded text-[10px]">Refresh</button>
        </div>
        <div class="text-yellow-400 text-[10px]">⚠️ If balance shows 0, paste your USDC contract address from your wallet above and click Refresh.</div>
      </div>
    </div>

    <!-- Swap UI -->
    <div class="glass-panel rounded-2xl p-4 mb-3">
      <div class="flex justify-between text-xs text-slate-400 mb-1">
        <span>You pay</span>
        <span id="fromBalanceLabel" class="font-mono">—</span>
      </div>
      <div class="flex items-center gap-3">
        <button id="fromTokenBtn" class="flex items-center gap-2 rounded-full py-2 px-3 bg-slate-800/90 text-white text-sm font-semibold border border-slate-600">
          <i data-lucide="circle-dollar-sign" class="w-4 h-4"></i> <span id="fromTokenSymbol">USDC</span>
        </button>
        <input type="number" id="amountInput" value="1.0" step="0.5" class="bg-transparent text-right text-2xl font-medium text-white w-full outline-none">
      </div>
      <div class="flex justify-end gap-2 mt-2">
        <button class="percentBtn text-[11px] px-2 py-0.5 rounded-full bg-slate-700/50" data-percent="0.25">25%</button>
        <button class="percentBtn text-[11px] px-2 py-0.5 rounded-full bg-slate-700/50" data-percent="0.5">50%</button>
        <button class="percentBtn text-[11px] px-2 py-0.5 rounded-full bg-slate-700/50" data-percent="0.75">75%</button>
        <button id="maxBtn" class="text-[11px] px-2 py-0.5 rounded-full bg-slate-700/60">MAX</button>
      </div>
    </div>

    <div class="flex justify-center -my-2">
      <button id="flipBtn" class="bg-slate-800/90 border border-blue-500/40 rounded-full p-2"><i data-lucide="arrow-down-up" class="w-5 h-5 text-blue-400"></i></button>
    </div>

    <div class="glass-panel rounded-2xl p-4 mt-1 mb-4">
      <div class="flex justify-between text-xs text-slate-400 mb-1">
        <span>You receive</span>
        <span id="toBalanceLabel" class="font-mono">—</span>
      </div>
      <div class="flex items-center gap-3">
        <button id="toTokenBtn" class="flex items-center gap-2 rounded-full py-2 px-3 bg-slate-800/90 text-white text-sm font-semibold border border-slate-600">
          <i data-lucide="euro" class="w-4 h-4"></i> <span id="toTokenSymbol">EURC</span>
        </button>
        <input type="text" id="receiveField" readonly disabled class="bg-transparent text-right text-2xl font-medium text-white/80 w-full">
      </div>
      <div class="flex justify-between mt-1"><span id="minReceiveHint" class="text-[11px] text-slate-400">—</span></div>
    </div>

    <div class="bg-black/20 rounded-xl px-3 py-2 mb-4 text-xs">
      <div class="flex justify-between"><span>⛽ Gas:</span><span id="gasEstimate">—</span></div>
      <div class="flex justify-between mt-1"><span>📉 Slippage:</span><span id="slippageValue">0.5%</span></div>
      <div class="flex gap-2 justify-end mt-2">
        <button class="slippagePreset text-[10px] px-2 py-0.5 rounded bg-slate-700" data-slippage="0.1">0.1%</button>
        <button class="slippagePreset text-[10px] px-2 py-0.5 rounded bg-slate-700" data-slippage="0.5">0.5%</button>
        <button class="slippagePreset text-[10px] px-2 py-0.5 rounded bg-slate-700" data-slippage="1">1%</button>
      </div>
    </div>

    <button id="swapBtn" disabled class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 disabled:opacity-50 rounded-2xl py-3.5 font-bold text-white">
      <span id="swapBtnText">Swap tokens</span>
    </button>
  </div>
</main>

<script>
  const NATIVE_USDC = '0x3600000000000000000000000000000000000000';
  const EURC_ADDRESS = '0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a';
  const ERC20_ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"];
  const BACKEND_URL = 'https://arc-testnet-swap.vercel.app/api/swap';
  const EXPECTED_CHAIN_ID = 5042002;

  let provider, signer, userAddress, connected = false;
  let selectedFrom = "USDC", selectedTo = "EURC";
  let currentSlippage = 0.5, isProcessing = false;
  let userBalances = { USDC: 0, EURC: 0 };
  let usdcContract = null, eurcContract = null;
  let currentUsdcAddress = NATIVE_USDC;

  // DOM elements
  const connectBtn = document.getElementById('connectBtn');
  const connectBtnText = document.getElementById('connectBtnText');
  const statusLed = document.getElementById('statusLed');
  const walletAddrSpan = document.getElementById('walletAddressShort');
  const fromBalanceLabel = document.getElementById('fromBalanceLabel');
  const toBalanceLabel = document.getElementById('toBalanceLabel');
  const amountInput = document.getElementById('amountInput');
  const receiveField = document.getElementById('receiveField');
  const minReceiveHint = document.getElementById('minReceiveHint');
  const swapBtn = document.getElementById('swapBtn');
  const swapBtnText = document.getElementById('swapBtnText');
  const flipBtn = document.getElementById('flipBtn');
  const maxBtn = document.getElementById('maxBtn');
  const gasEstimateSpan = document.getElementById('gasEstimate');
  const slippageValueSpan = document.getElementById('slippageValue');
  const customUsdcAddressInput = document.getElementById('customUsdcAddress');
  const refreshBalanceBtn = document.getElementById('refreshBalanceBtn');
  const balanceDisplay = document.getElementById('balanceDisplay');

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toastRoot');
    toast.textContent = msg;
    toast.classList.add('toast-show');
    toast.style.borderColor = isError ? '#ef4444' : '#3b82f6';
    setTimeout(() => toast.classList.remove('toast-show'), 4000);
  }

  async function updateUsdcContract() {
    let newAddress = customUsdcAddressInput.value.trim();
    if (!newAddress.match(/^0x[a-fA-F0-9]{40}$/i)) {
      showToast("Invalid USDC address, using native", true);
      newAddress = NATIVE_USDC;
      customUsdcAddressInput.value = NATIVE_USDC;
    }
    currentUsdcAddress = newAddress;
    if (provider) {
      usdcContract = new ethers.Contract(currentUsdcAddress, ERC20_ABI, provider);
      await fetchBalances();
    }
  }

  async function fetchBalances() {
    if (!userAddress || !provider) return;
    try {
      if (usdcContract) {
        const wei = await usdcContract.balanceOf(userAddress);
        const decimals = await usdcContract.decimals();
        const bal = ethers.utils.formatUnits(wei, decimals);
        userBalances.USDC = parseFloat(bal);
        balanceDisplay.innerText = `${bal} USDC`;
      }
      if (eurcContract) {
        const wei = await eurcContract.balanceOf(userAddress);
        const decimals = await eurcContract.decimals();
        userBalances.EURC = parseFloat(ethers.utils.formatUnits(wei, decimals));
      }
      updateBalanceUI();
    } catch(err) { console.error(err); balanceDisplay.innerText = "error"; }
  }

  function updateBalanceUI() {
    if (!connected) {
      fromBalanceLabel.innerText = '—';
      toBalanceLabel.innerText = '—';
      return;
    }
    fromBalanceLabel.innerText = `${userBalances[selectedFrom]?.toFixed(4) || 0} ${selectedFrom}`;
    toBalanceLabel.innerText = `${userBalances[selectedTo]?.toFixed(4) || 0} ${selectedTo}`;
  }

  async function updateGasFee() {
    if (!provider || !connected) { gasEstimateSpan.innerText = '—'; return; }
    try {
      const feeData = await provider.getFeeData();
      let gasPrice = feeData.maxFeePerGas || feeData.gasPrice;
      if (!gasPrice) throw new Error();
      const minWei = ethers.utils.parseUnits("160", "gwei");
      if (gasPrice.lt(minWei)) gasPrice = minWei;
      const totalWei = ethers.BigNumber.from(350000).mul(gasPrice);
      const totalUSDC = ethers.utils.formatUnits(totalWei, 18);
      gasEstimateSpan.innerText = `~${parseFloat(totalUSDC).toFixed(6)} USDC`;
    } catch(e) { gasEstimateSpan.innerText = "?"; }
  }

  function updateQuote() {
    if (!connected) { receiveField.value = ''; minReceiveHint.innerText = '—'; return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) { receiveField.value = ''; minReceiveHint.innerText = '—'; return; }
    const rate = (selectedFrom === 'USDC' && selectedTo === 'EURC') ? 0.978 :
                 (selectedFrom === 'EURC' && selectedTo === 'USDC') ? 1.023 : 1;
    const rawOut = amount * rate;
    const minReceived = rawOut * (1 - currentSlippage / 100);
    receiveField.value = rawOut.toFixed(6);
    minReceiveHint.innerText = `min receive: ${minReceived.toFixed(6)} ${selectedTo}`;
  }

  function validateSwap() {
    if (!connected || isProcessing) { swapBtn.disabled = true; return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0 || amount > (userBalances[selectedFrom] || 0)) swapBtn.disabled = true;
    else swapBtn.disabled = false;
  }

  async function refreshUI() {
    if (connected) {
      await fetchBalances();
      await updateGasFee();
    }
    updateQuote();
    validateSwap();
  }

  async function connectWallet() {
    if (!window.ethereum) { showToast("Install MetaMask or Rabby", true); return; }
    try {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      userAddress = accounts[0];
      provider = new ethers.providers.Web3Provider(window.ethereum);
      signer = provider.getSigner();
      const network = await provider.getNetwork();
      if (network.chainId !== EXPECTED_CHAIN_ID) {
        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: `0x${EXPECTED_CHAIN_ID.toString(16)}` }] });
      }
      connected = true;
      eurcContract = new ethers.Contract(EURC_ADDRESS, ERC20_ABI, provider);
      await updateUsdcContract();
      await refreshUI();
      walletAddrSpan.innerText = `${userAddress.slice(0,6)}...${userAddress.slice(-4)} on Arc`;
      statusLed.classList.add('bg-emerald-400'); statusLed.classList.remove('bg-gray-500');
      connectBtnText.innerText = 'Connected';
      document.getElementById('copyAddressBtn')?.classList.remove('hidden');
      document.getElementById('disconnectBtn')?.classList.remove('hidden');
      showToast("Connected");
    } catch(err) { showToast(err.message, true); connected = false; }
  }

  function disconnect() {
    connected = false; userAddress = null; provider = null;
    userBalances = { USDC:0, EURC:0 };
    walletAddrSpan.innerText = '⚡ not connected';
    statusLed.classList.remove('bg-emerald-400'); statusLed.classList.add('bg-gray-500');
    connectBtnText.innerText = 'Connect';
    refreshUI();
  }

  async function executeSwap() {
    if (!connected) { showToast("Connect wallet", true); return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) { showToast("Invalid amount", true); return; }
    if (amount > userBalances[selectedFrom]) { showToast(`Insufficient ${selectedFrom} balance (${userBalances[selectedFrom]})`, true); return; }

    isProcessing = true;
    swapBtn.disabled = true;
    swapBtnText.innerHTML = '<div class="loading-spinner"></div> Preparing...';

    try {
      const response = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tokenIn: selectedFrom, tokenOut: selectedTo, amountIn: amount.toString(), walletAddress: userAddress })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "Backend error");

      // Extract transaction from fullResult (your backend format)
      const txData = data.fullResult || data;
      if (!txData.to || !txData.data) throw new Error("No transaction data");

      const tx = {
        to: txData.to,
        data: txData.data,
        value: txData.value || "0x0",
        gasLimit: txData.gas || 500000,
        gasPrice: txData.gasPrice
      };

      swapBtnText.innerHTML = '<div class="loading-spinner"></div> Confirm in wallet...';
      const txResponse = await signer.sendTransaction(tx);
      swapBtnText.innerHTML = '<div class="loading-spinner"></div> Confirming...';
      await txResponse.wait(1);
      showToast(`✅ Swap successful! ${txResponse.hash.slice(0,10)}...`, false);
      await refreshUI();
    } catch(err) {
      showToast(`❌ Swap failed: ${err.message}`, true);
    } finally {
      swapBtnText.innerHTML = "Swap tokens";
      isProcessing = false;
      validateSwap();
    }
  }

  // Event listeners
  connectBtn.addEventListener('click', connectWallet);
  document.getElementById('disconnectBtn')?.addEventListener('click', disconnect);
  document.getElementById('copyAddressBtn')?.addEventListener('click', () => { if(userAddress) navigator.clipboard.writeText(userAddress); showToast("Copied"); });
  flipBtn.addEventListener('click', () => { let t=selectedFrom; selectedFrom=selectedTo; selectedTo=t; document.getElementById('fromTokenSymbol').innerText=selectedFrom; document.getElementById('toTokenSymbol').innerText=selectedTo; refreshUI(); });
  maxBtn.addEventListener('click', () => { if(connected) amountInput.value = userBalances[selectedFrom]; refreshUI(); });
  amountInput.addEventListener('input', refreshUI);
  document.querySelectorAll('.percentBtn').forEach(btn => btn.addEventListener('click', () => { if(connected) amountInput.value = (userBalances[selectedFrom] * parseFloat(btn.dataset.percent)).toFixed(6); refreshUI(); }));
  document.querySelectorAll('.slippagePreset').forEach(btn => btn.addEventListener('click', () => { currentSlippage = parseFloat(btn.dataset.slippage); slippageValueSpan.innerText = `${currentSlippage}%`; refreshUI(); }));
  swapBtn.addEventListener('click', executeSwap);
  refreshBalanceBtn.addEventListener('click', async () => { await updateUsdcContract(); await refreshUI(); });
  customUsdcAddressInput.addEventListener('change', updateUsdcContract);

  refreshUI();
</script>
</body>
</html>
