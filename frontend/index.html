<!DOCTYPE html>
<html lang="en">
<head>
  <!-- same HEAD as before, unchanged -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Xroga · Arc Swap 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* same styles as before – no changes needed */
    * { font-family: 'Inter', sans-serif; }
    body { background: radial-gradient(ellipse at 40% 50%, #0a0f1f, #010208); min-height: 100vh; overflow-x: hidden; margin: 0; }
    .ambient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.08), transparent 70%), radial-gradient(circle at 80% 70%, rgba(139,92,246,0.08), transparent 70%); animation: breathe 12s infinite alternate; }
    @keyframes breathe { 0% { opacity: 0.4; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }
    .glass-panel { background: rgba(12, 20, 32, 0.65); backdrop-filter: blur(14px); border: 1px solid rgba(59, 130, 246, 0.2); transition: all 0.25s ease; position: relative; overflow: hidden; }
    .glass-panel::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(59,130,246,0.15), transparent 70%); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .glass-panel:hover::after { opacity: 1; }
    .morph-btn { position: relative; overflow: hidden; transition: all 0.2s; }
    .toast-notify { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293bc9; backdrop-filter: blur(12px); border: 1px solid #3b82f6; border-radius: 40px; padding: 8px 18px; color: white; font-size: 13px; font-weight: 500; z-index: 1000; transition: transform 0.25s ease; pointer-events: none; white-space: nowrap; }
    .toast-show { transform: translateX(-50%) translateY(0); }
    .token-modal, .guide-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 2000; display: flex; align-items: flex-end; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.2s; }
    .token-modal.active, .guide-modal.active { opacity: 1; visibility: visible; }
    .token-drawer, .guide-drawer { background: #0f172fe6; backdrop-filter: blur(20px); border-radius: 32px 32px 0 0; width: 100%; max-width: 480px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); border-top: 1px solid #3b82f680; }
    .token-modal.active .token-drawer, .guide-modal.active .guide-drawer { transform: translateY(0); }
    @media (max-width: 500px) { .glass-panel { padding: 1rem; } }
    button, .token-trigger { touch-action: manipulation; }
    .loading-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<!-- same HTML body – no changes needed -->
<div class="ambient-bg"></div>
<div id="toastRoot" class="toast-notify">✨ Ready</div>
<main class="w-full max-w-lg mx-auto px-4 py-6 md:py-10 relative z-10">
  <div class="glass-panel rounded-3xl shadow-2xl p-5 md:p-6">
    <!-- header, wallet status, from/to cards, etc. – exactly as before -->
    <!-- I omit the duplicate HTML for brevity; keep your existing HTML structure exactly as it was. -->
    <!-- The only change is the <script> below. -->
  </div>
</main>
<!-- token modal, guide modal – unchanged -->

<script>
  // ========== CORRECTED FRONTEND (NO FAKE BALANCES, WITH APPROVAL) ==========
  const USDC_ADDRESS = '0x3600000000000000000000000000000000000000'; // official Arc testnet USDC (native + ERC-20)
  const EURC_ADDRESS = '0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a';
  const ERC20_ABI = [
    "function balanceOf(address owner) view returns (uint256)",
    "function decimals() view returns (uint8)",
    "function symbol() view returns (string)",
    "function approve(address spender, uint256 amount) returns (bool)",
    "function allowance(address owner, address spender) view returns (uint256)"
  ];

  const BACKEND_URL = 'https://arc-testnet-swap.vercel.app/api/swap'; // your deployed backend
  const EXPECTED_CHAIN_ID = 5042002;

  let userAddress = null;
  let provider = null;
  let connected = false;
  let selectedFrom = "USDC";
  let selectedTo = "EURC";
  let currentSlippage = 0.5;
  let isProcessing = false;
  let userBalances = { USDC: 0, EURC: 0 };
  let tokenContracts = {};

  // DOM elements (same as before)
  const connectBtn = document.getElementById('connectWalletBtn');
  const connectBtnText = document.getElementById('connectBtnText');
  const walletAddrSpan = document.getElementById('walletAddressShort');
  const statusLed = document.getElementById('statusLed');
  const amountInput = document.getElementById('amountInput');
  const receiveField = document.getElementById('receiveField');
  const fromBalanceLabel = document.getElementById('fromBalanceLabel');
  const toBalanceLabel = document.getElementById('toBalanceLabel');
  const minReceiveHint = document.getElementById('minReceiveHint');
  const rateDynamicSpan = document.getElementById('rateDynamic');
  const slippageValueSpan = document.getElementById('slippageValue');
  const swapBtn = document.getElementById('swapActionBtn');
  const swapBtnText = document.getElementById('swapBtnText');
  const flipBtn = document.getElementById('flipSwapBtn');
  const maxBtn = document.getElementById('maxFromBtn');
  const fromTokenBtn = document.getElementById('fromTokenBtn');
  const toTokenBtn = document.getElementById('toTokenBtn');
  const fromTokenSymbolSpan = document.getElementById('fromTokenSymbol');
  const toTokenSymbolSpan = document.getElementById('toTokenSymbol');
  const tokenModal = document.getElementById('tokenModal');
  const guideModal = document.getElementById('guideModal');
  const aiSparkBtn = document.getElementById('aiSparkBtn');
  const advancedToggle = document.getElementById('advancedToggle');
  const advancedPanel = document.getElementById('advancedPanel');
  const chevronAdv = document.getElementById('chevronAdv');
  const copyBtn = document.getElementById('copyAddressBtn');
  const disconnectWalletBtn = document.getElementById('disconnectBtn');
  const gasEstimateSpan = document.getElementById('gasEstimate');
  const faucetBtn = document.getElementById('faucetBtn');
  const guideBtn = document.getElementById('guideBtn');
  const closeGuideBtn = document.getElementById('closeGuideBtn');

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toastRoot');
    toast.textContent = msg;
    toast.classList.add('toast-show');
    toast.style.borderColor = isError ? '#ef4444' : '#3b82f6';
    setTimeout(() => toast.classList.remove('toast-show'), 4000);
  }

  faucetBtn.addEventListener('click', () => window.open('https://faucet.circle.com/', '_blank'));
  guideBtn.addEventListener('click', () => guideModal.classList.add('active'));
  closeGuideBtn.addEventListener('click', () => guideModal.classList.remove('active'));
  guideModal.addEventListener('click', (e) => { if (e.target === guideModal) guideModal.classList.remove('active'); });

  // ========== WALLET CONNECTION – recreate provider after network switch ==========
  async function ensureArcNetwork() {
    if (!window.ethereum) throw new Error("No wallet");
    const chainIdHex = `0x${EXPECTED_CHAIN_ID.toString(16)}`;
    try {
      await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: chainIdHex }] });
    } catch (switchError) {
      if (switchError.code === 4902) {
        await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [{
          chainId: chainIdHex,
          chainName: 'Arc Testnet',
          nativeCurrency: { name: 'USDC', symbol: 'USDC', decimals: 18 },
          rpcUrls: ['https://rpc.testnet.arc.network'],
          blockExplorerUrls: ['https://explorer.testnet.arc.network']
        }]});
      } else throw switchError;
    }
  }

  async function connectWallet() {
    if (!window.ethereum) { showToast('Install MetaMask or Rabby', true); return; }
    try {
      showToast('Connecting...');
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      if (!accounts.length) throw new Error('No accounts');
      userAddress = accounts[0];
      // First switch network, then recreate provider
      await ensureArcNetwork();
      provider = new ethers.providers.Web3Provider(window.ethereum);
      const network = await provider.getNetwork();
      if (network.chainId !== EXPECTED_CHAIN_ID) throw new Error('Network switch failed');
      connected = true;
      walletAddrSpan.innerText = `${userAddress.slice(0,6)}...${userAddress.slice(-4)} on Arc`;
      statusLed.classList.add('bg-emerald-400'); statusLed.classList.remove('bg-gray-500');
      connectBtnText.innerText = 'Connected';
      copyBtn.classList.remove('hidden'); disconnectWalletBtn.classList.remove('hidden');
      showToast('Connected to Arc Testnet');
      tokenContracts.USDC = new ethers.Contract(USDC_ADDRESS, ERC20_ABI, provider.getSigner());
      tokenContracts.EURC = new ethers.Contract(EURC_ADDRESS, ERC20_ABI, provider.getSigner());
      await refreshUI();
    } catch (err) { showToast(err.message, true); }
  }

  function disconnect() {
    connected = false; userAddress = null; provider = null;
    walletAddrSpan.innerText = '⚡ not connected';
    statusLed.classList.remove('bg-emerald-400'); statusLed.classList.add('bg-gray-500');
    connectBtnText.innerText = 'Connect';
    copyBtn.classList.add('hidden'); disconnectWalletBtn.classList.add('hidden');
    refreshUI();
    showToast('Disconnected');
  }

  copyBtn.addEventListener('click', () => { if (userAddress) { navigator.clipboard.writeText(userAddress); showToast('Address copied'); } });

  // ========== REAL BALANCE FETCHING – NO MOCKS ==========
  async function fetchBalances() {
    if (!connected || !provider) return;
    try {
      const usdcBalanceWei = await tokenContracts.USDC.balanceOf(userAddress);
      const usdcDecimals = await tokenContracts.USDC.decimals();
      userBalances.USDC = parseFloat(ethers.utils.formatUnits(usdcBalanceWei, usdcDecimals));
      const eurcBalanceWei = await tokenContracts.EURC.balanceOf(userAddress);
      const eurcDecimals = await tokenContracts.EURC.decimals();
      userBalances.EURC = parseFloat(ethers.utils.formatUnits(eurcBalanceWei, eurcDecimals));
      console.log(`✅ Real balances: USDC = ${userBalances.USDC}, EURC = ${userBalances.EURC}`);
    } catch (err) {
      console.error("Balance fetch error:", err);
      userBalances.USDC = 0;
      userBalances.EURC = 0;
      showToast("Failed to fetch balances", true);
    }
    updateBalanceUI();
    validateSwap();
  }

  function updateBalanceUI() {
    if (!connected) {
      fromBalanceLabel.innerText = '—';
      toBalanceLabel.innerText = '—';
      return;
    }
    fromBalanceLabel.innerText = `${(userBalances[selectedFrom] || 0).toFixed(4)} ${selectedFrom}`;
    toBalanceLabel.innerText = `${(userBalances[selectedTo] || 0).toFixed(4)} ${selectedTo}`;
  }

  // ========== GAS ESTIMATION – NO FORCED MIN GAS ==========
  async function updateGasFee() {
    if (!provider || !connected) { gasEstimateSpan.innerText = '—'; return; }
    try {
      const feeData = await provider.getFeeData();
      let maxFeePerGas = feeData.maxFeePerGas || feeData.gasPrice;
      if (!maxFeePerGas) throw new Error("No fee data");
      // No forced minimum – use what the network returns
      const gasLimit = ethers.BigNumber.from(350000);
      const totalWei = gasLimit.mul(maxFeePerGas);
      const totalUSDC = ethers.utils.formatUnits(totalWei, 18);
      gasEstimateSpan.innerText = `~${parseFloat(totalUSDC).toFixed(6)} USDC`;
    } catch (err) { gasEstimateSpan.innerText = "Gas error"; }
  }

  // ========== QUOTE UPDATE (fixed rate preview) ==========
  function updateQuote() {
    if (!connected) {
      receiveField.value = '';
      minReceiveHint.innerText = 'min receive: —';
      rateDynamicSpan.innerText = '1 USDC ≈ 0.978 EURC';
      return;
    }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) {
      receiveField.value = '';
      minReceiveHint.innerText = 'min receive: —';
      return;
    }
    const rate = (selectedFrom === 'USDC' && selectedTo === 'EURC') ? 0.978 :
                 (selectedFrom === 'EURC' && selectedTo === 'USDC') ? 1.023 : 1;
    const rawOut = amount * rate;
    const minReceived = rawOut * (1 - currentSlippage / 100);
    receiveField.value = rawOut.toFixed(6);
    minReceiveHint.innerText = `min receive: ${minReceived.toFixed(6)} ${selectedTo}`;
    rateDynamicSpan.innerText = selectedFrom === 'USDC' ? '1 USDC ≈ 0.978 EURC' : '1 EURC ≈ 1.023 USDC';
  }

  function validateSwap() {
    if (!connected || isProcessing) {
      swapBtn.disabled = true;
      return;
    }
    const amount = parseFloat(amountInput.value);
    const balance = userBalances[selectedFrom] || 0;
    const isValid = !isNaN(amount) && amount > 0 && amount <= balance;
    swapBtn.disabled = !isValid;
    if (connected && !isProcessing) {
      console.log(`Validate: amount=${amount}, balance=${balance}, isValid=${isValid}`);
    }
  }

  async function refreshUI() {
    if (connected) { 
      await fetchBalances(); 
      await updateGasFee(); 
    }
    updateQuote();
    validateSwap();
    lucide.createIcons();
  }

  // ========== SWAP EXECUTION WITH PROPER APPROVAL ==========
  async function executeSwap() {
    if (!connected) { showToast('Connect wallet first', true); return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) { showToast('Invalid amount', true); return; }
    if (amount > userBalances[selectedFrom]) { showToast(`Insufficient ${selectedFrom} balance`, true); return; }

    isProcessing = true;
    swapBtn.disabled = true;
    swapBtnText.innerHTML = '<span class="flex items-center gap-2"><div class="loading-spinner"></div> Preparing swap...</span>';
    lucide.createIcons();

    try {
      // 1. Get swap transaction from backend
      const response = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tokenIn: selectedFrom,
          tokenOut: selectedTo,
          amountIn: amount.toString(),
          walletAddress: userAddress
        })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Failed to prepare transaction');

      // 2. Get token contract and decimals
      const tokenAddress = selectedFrom === 'USDC' ? USDC_ADDRESS : EURC_ADDRESS;
      const token = new ethers.Contract(tokenAddress, ERC20_ABI, provider.getSigner());
      const decimals = await token.decimals();
      const amountWei = ethers.utils.parseUnits(amount.toString(), decimals);

      // 3. Check allowance
      const spender = data.to; // the swap router contract
      const allowance = await token.allowance(userAddress, spender);
      if (allowance.lt(amountWei)) {
        swapBtnText.innerHTML = '<span class="flex items-center gap-2"><div class="loading-spinner"></div> Approving token...</span>';
        const approveTx = await token.approve(spender, amountWei);
        showToast(`Approving ${selectedFrom}...`, false);
        await approveTx.wait();
        showToast(`Approval confirmed`, false);
      }

      // 4. Send swap transaction
      swapBtnText.innerHTML = '<span class="flex items-center gap-2"><div class="loading-spinner"></div> Confirm swap in wallet...</span>';
      const tx = {
        from: userAddress,
        to: data.to,
        data: data.data,
        value: data.value,
        gasPrice: data.gasPrice,
        gasLimit: ethers.BigNumber.from(data.gas || 500000)
      };
      const sendTx = await provider.getSigner().sendTransaction(tx);
      showToast(`Swap submitted! Tx: ${sendTx.hash.slice(0,10)}...`, false);
      swapBtnText.innerHTML = '<span class="flex items-center gap-2"><div class="loading-spinner"></div> Confirming...</span>';
      await sendTx.wait(1);
      showToast(`✅ Swap confirmed! ${selectedFrom} → ${selectedTo} completed.`, false);
      swapBtnText.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> Done!';
      lucide.createIcons();
      await refreshUI();
      setTimeout(() => {
        swapBtnText.innerHTML = "Swap tokens";
        isProcessing = false;
        validateSwap();
      }, 2000);
    } catch (err) {
      console.error(err);
      let friendly = err.message;
      if (friendly.includes('user rejected')) friendly = 'Transaction rejected.';
      else if (friendly.includes('insufficient')) friendly = 'Insufficient balance or allowance.';
      showToast(`❌ Swap failed: ${friendly}`, true);
      swapBtnText.innerHTML = "Swap tokens";
      isProcessing = false;
      validateSwap();
    }
  }

  // ========== UI EVENT HANDLERS (same as before) ==========
  flipBtn.addEventListener('click', () => {
    let tmp = selectedFrom; selectedFrom = selectedTo; selectedTo = tmp;
    fromTokenSymbolSpan.innerText = selectedFrom;
    toTokenSymbolSpan.innerText = selectedTo;
    fromTokenBtn.querySelector('i').setAttribute('data-lucide', selectedFrom === 'USDC' ? 'circle-dollar-sign' : 'euro');
    toTokenBtn.querySelector('i').setAttribute('data-lucide', selectedTo === 'USDC' ? 'circle-dollar-sign' : 'euro');
    lucide.createIcons();
    refreshUI();
  });

  maxBtn.addEventListener('click', () => {
    if (connected) {
      amountInput.value = userBalances[selectedFrom];
      refreshUI();
    } else showToast("Connect wallet first", true);
  });

  document.querySelectorAll('.percentBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!connected) { showToast("Connect wallet first", true); return; }
      let p = parseFloat(btn.dataset.percent);
      amountInput.value = (userBalances[selectedFrom] * p).toFixed(6);
      refreshUI();
    });
  });

  amountInput.addEventListener('input', () => {
    updateQuote();
    validateSwap();
  });
  swapBtn.addEventListener('click', executeSwap);

  document.querySelectorAll('.slippagePreset').forEach(btn => {
    btn.addEventListener('click', () => {
      currentSlippage = parseFloat(btn.dataset.slippage);
      slippageValueSpan.innerText = `${currentSlippage}%`;
      refreshUI();
      showToast(`Slippage set to ${currentSlippage}%`);
    });
  });

  advancedToggle.addEventListener('click', () => {
    advancedPanel.classList.toggle('hidden');
    chevronAdv.style.transform = advancedPanel.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
  });

  aiSparkBtn.addEventListener('click', () => {
    showToast(`✨ AI insight: Network fees are ${gasEstimateSpan.innerText}. Use 0.5% slippage for stable pairs.`);
  });

  // ========== TOKEN SELECTOR MODAL (same) ==========
  const tokenList = [
    { symbol:"USDC", name:"USD Coin", icon:"circle-dollar-sign" },
    { symbol:"EURC", name:"Euro Coin", icon:"euro" }
  ];
  function renderTokenModal(targetSide) {
    let search = document.getElementById('tokenSearch').value.toLowerCase();
    let filtered = tokenList.filter(t => t.symbol.toLowerCase().includes(search));
    let container = document.getElementById('tokenList');
    container.innerHTML = filtered.map(t => `
      <div class="token-item flex justify-between items-center p-3 rounded-xl hover:bg-slate-700/50 cursor-pointer" data-symbol="${t.symbol}" data-side="${targetSide}">
        <div class="flex gap-3 items-center"><i data-lucide="${t.icon}" class="w-6 h-6"></i><div><div class="text-white font-medium">${t.symbol}</div><div class="text-xs text-slate-400">${t.name}</div></div></div>
        <div class="text-right"><div class="text-white text-sm">${(userBalances[t.symbol] || 0).toFixed(4)}</div></div>
      </div>
    `).join('');
    lucide.createIcons();
    document.querySelectorAll('.token-item').forEach(el => {
      el.addEventListener('click', () => {
        let sym = el.dataset.symbol;
        if (el.dataset.side === 'from') {
          selectedFrom = sym;
          fromTokenSymbolSpan.innerText = sym;
          fromTokenBtn.querySelector('i').setAttribute('data-lucide', sym === 'USDC' ? 'circle-dollar-sign' : 'euro');
        } else {
          selectedTo = sym;
          toTokenSymbolSpan.innerText = sym;
          toTokenBtn.querySelector('i').setAttribute('data-lucide', sym === 'USDC' ? 'circle-dollar-sign' : 'euro');
        }
        lucide.createIcons();
        tokenModal.classList.remove('active');
        refreshUI();
      });
    });
  }
  fromTokenBtn.addEventListener('click', () => { tokenModal.classList.add('active'); renderTokenModal('from'); });
  toTokenBtn.addEventListener('click', () => { tokenModal.classList.add('active'); renderTokenModal('to'); });
  document.getElementById('closeModalBtn').addEventListener('click', () => tokenModal.classList.remove('active'));
  document.getElementById('tokenSearch').addEventListener('input', () => renderTokenModal('from'));

  // ========== SPARKLINE ==========
  let sparklineData = Array(20).fill(0.978);
  let sparkCtx = document.getElementById('sparklineCanvas').getContext('2d');
  function updateSparkline() {
    let newVal = (selectedFrom === 'USDC' ? 0.978 : 1.023) + (Math.random() - 0.5) * 0.002;
    sparklineData.push(newVal);
    if (sparklineData.length > 30) sparklineData.shift();
    sparkCtx.clearRect(0, 0, 80, 24);
    sparkCtx.beginPath();
    sparkCtx.strokeStyle = '#60a5fa';
    sparkCtx.lineWidth = 1.5;
    let min = Math.min(...sparklineData);
    let max = Math.max(...sparklineData);
    for (let i = 0; i < sparklineData.length; i++) {
      let x = (i / sparklineData.length) * 80;
      let y = 24 - ((sparklineData[i] - min) / (max - min || 1)) * 20;
      if (i === 0) sparkCtx.moveTo(x, y);
      else sparkCtx.lineTo(x, y);
    }
    sparkCtx.stroke();
  }
  setInterval(() => { if (connected) updateSparkline(); }, 4000);

  // ========== ACCOUNT / CHAIN CHANGE HANDLERS ==========
  if (window.ethereum) {
    window.ethereum.on('accountsChanged', (accounts) => {
      if (!accounts.length) disconnect();
      else {
        userAddress = accounts[0];
        provider = new ethers.providers.Web3Provider(window.ethereum);
        walletAddrSpan.innerText = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
        showToast('Account changed, refreshing balances.');
        refreshUI();
      }
    });
    window.ethereum.on('chainChanged', () => window.location.reload());
  }

  connectBtn.addEventListener('click', connectWallet);
  disconnectWalletBtn.addEventListener('click', disconnect);

  refreshUI();
  lucide.createIcons();
</script>
</body>
</html>
