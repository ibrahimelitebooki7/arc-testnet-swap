<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Xroga · Arc Swap</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: radial-gradient(ellipse at 40% 50%, #0a0f1f, #010208); min-height: 100vh; }
    .glass-panel {
      background: rgba(12, 20, 32, 0.65); backdrop-filter: blur(14px); border: 1px solid rgba(59, 130, 246, 0.2);
    }
    .toast-notify {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #1e293bc9; backdrop-filter: blur(12px); border: 1px solid #3b82f6; border-radius: 40px;
      padding: 8px 18px; color: white; font-size: 13px; font-weight: 500; z-index: 1000;
      transition: transform 0.25s ease; pointer-events: none; white-space: nowrap;
    }
    .toast-show { transform: translateX(-50%) translateY(0); }
    .loading-spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%;
      border-top-color: white; animation: spin 0.6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="toastRoot" class="toast-notify">✨ Ready</div>

<main class="w-full max-w-md mx-auto px-4 py-8">
  <div class="glass-panel rounded-3xl shadow-2xl p-5">
    <!-- Header -->
    <div class="flex justify-between items-center mb-5">
      <div class="text-2xl font-black bg-gradient-to-r from-white via-blue-400 to-purple-500 bg-clip-text text-transparent">Xroga</div>
      <button id="connectWalletBtn" class="bg-slate-800/70 hover:bg-slate-700/80 rounded-full px-3 py-1.5 text-sm font-medium text-slate-200 border border-slate-700 flex items-center gap-1">
        <i data-lucide="wallet" class="w-3.5 h-3.5"></i><span id="connectBtnText">Connect</span>
      </button>
    </div>

    <!-- Wallet status -->
    <div class="bg-black/30 rounded-2xl px-3 py-2 mb-5 text-xs flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div id="statusLed" class="w-2 h-2 rounded-full bg-gray-500"></div>
        <span id="walletAddressShort" class="text-slate-300">⚡ not connected</span>
        <button id="copyAddressBtn" class="hidden text-slate-400 hover:text-blue-400"><i data-lucide="copy" class="w-3 h-3"></i></button>
        <button id="disconnectBtn" class="hidden text-slate-400 hover:text-red-400"><i data-lucide="log-out" class="w-3 h-3"></i></button>
      </div>
      <div id="backendWalletBadge" class="text-[10px] bg-indigo-500/30 px-2 py-0.5 rounded-full truncate max-w-[140px]"></div>
    </div>

    <!-- FROM -->
    <div class="glass-panel rounded-2xl p-4 mb-3">
      <div class="flex justify-between text-xs text-slate-400 mb-1">
        <span>You pay</span>
        <span id="fromBalanceLabel" class="font-mono">—</span>
      </div>
      <div class="flex items-center gap-3">
        <button id="fromTokenBtn" class="flex items-center gap-2 rounded-full py-2 px-3 bg-slate-800/90 text-white text-sm font-semibold border border-slate-600">
          <i data-lucide="circle-dollar-sign" class="w-4 h-4"></i> <span id="fromTokenSymbol">USDC</span>
        </button>
        <input type="number" id="amountInput" value="1.0" step="0.5" class="bg-transparent text-right text-2xl font-medium text-white w-full outline-none">
      </div>
      <div class="flex justify-end gap-2 mt-2">
        <button class="percentBtn text-[11px] px-2 py-0.5 rounded-full bg-slate-700/50" data-percent="0.25">25%</button>
        <button class="percentBtn text-[11px] px-2 py-0.5 rounded-full bg-slate-700/50" data-percent="0.5">50%</button>
        <button class="percentBtn text-[11px] px-2 py-0.5 rounded-full bg-slate-700/50" data-percent="0.75">75%</button>
        <button id="maxBtn" class="text-[11px] px-2 py-0.5 rounded-full bg-slate-700/60">MAX</button>
      </div>
    </div>

    <!-- Flip arrow -->
    <div class="flex justify-center -my-2">
      <button id="flipBtn" class="bg-slate-800/90 border border-blue-500/40 rounded-full p-2 backdrop-blur">
        <i data-lucide="arrow-down-up" class="w-5 h-5 text-blue-400"></i>
      </button>
    </div>

    <!-- TO -->
    <div class="glass-panel rounded-2xl p-4 mt-1 mb-4">
      <div class="flex justify-between text-xs text-slate-400 mb-1">
        <span>You receive</span>
        <span id="toBalanceLabel" class="font-mono">—</span>
      </div>
      <div class="flex items-center gap-3">
        <button id="toTokenBtn" class="flex items-center gap-2 rounded-full py-2 px-3 bg-slate-800/90 text-white text-sm font-semibold border border-slate-600">
          <i data-lucide="euro" class="w-4 h-4"></i> <span id="toTokenSymbol">EURC</span>
        </button>
        <input type="text" id="receiveField" readonly disabled class="bg-transparent text-right text-2xl font-medium text-white/80 w-full outline-none">
      </div>
      <div class="flex justify-between mt-1">
        <span id="minReceiveHint" class="text-[11px] text-slate-400">—</span>
      </div>
    </div>

    <!-- Gas & slippage -->
    <div class="bg-black/20 rounded-xl px-3 py-2 mb-4">
      <div class="flex justify-between items-center">
        <div class="flex gap-2 items-center text-xs"><i data-lucide="fuel" class="w-3 h-3"></i> <span id="gasEstimate">Fetching gas...</span></div>
        <div class="flex items-center gap-1 text-xs"><i data-lucide="gauge" class="w-3 h-3"></i> <span id="slippageValue">0.5%</span></div>
      </div>
      <div class="mt-2 flex justify-end gap-2">
        <button class="slippagePreset text-[10px] px-2 py-0.5 rounded bg-slate-700" data-slippage="0.1">0.1%</button>
        <button class="slippagePreset text-[10px] px-2 py-0.5 rounded bg-slate-700" data-slippage="0.5">0.5%</button>
        <button class="slippagePreset text-[10px] px-2 py-0.5 rounded bg-slate-700" data-slippage="1">1%</button>
      </div>
    </div>

    <!-- Swap button -->
    <button id="swapBtn" disabled class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 disabled:opacity-50 rounded-2xl py-3.5 font-bold text-white text-sm">
      <span id="swapBtnText">Swap tokens</span>
    </button>
  </div>
</main>

<script>
  // ========== CONFIGURATION ==========
  const USDC_ADDRESS = '0x3600000000000000000000000000000000000000';
  const EURC_ADDRESS = '0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a';
  const ERC20_ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)", "function symbol() view returns (string)"];
  const EXPECTED_CHAIN_ID = 5042002;
  const BACKEND_SWAP_URL = '/api/swap';
  const BACKEND_GET_URL = '/api/swap';

  let userAddress = null, provider = null, connected = false;
  let selectedFrom = "USDC", selectedTo = "EURC";
  let currentSlippage = 0.5;
  let isProcessing = false;
  let userBalances = { USDC: 0, EURC: 0 };
  let tokenContracts = {};

  // DOM elements
  const connectBtn = document.getElementById('connectWalletBtn');
  const connectBtnText = document.getElementById('connectBtnText');
  const walletAddrSpan = document.getElementById('walletAddressShort');
  const statusLed = document.getElementById('statusLed');
  const fromBalanceLabel = document.getElementById('fromBalanceLabel');
  const toBalanceLabel = document.getElementById('toBalanceLabel');
  const amountInput = document.getElementById('amountInput');
  const receiveField = document.getElementById('receiveField');
  const minReceiveHint = document.getElementById('minReceiveHint');
  const swapBtn = document.getElementById('swapBtn');
  const swapBtnText = document.getElementById('swapBtnText');
  const flipBtn = document.getElementById('flipBtn');
  const maxBtn = document.getElementById('maxBtn');
  const copyBtn = document.getElementById('copyAddressBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');
  const gasEstimateSpan = document.getElementById('gasEstimate');
  const slippageValueSpan = document.getElementById('slippageValue');

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toastRoot');
    toast.textContent = msg;
    toast.classList.add('toast-show');
    toast.style.borderColor = isError ? '#ef4444' : '#3b82f6';
    setTimeout(() => toast.classList.remove('toast-show'), 4000);
  }

  async function fetchBackendWallet() {
    try {
      const res = await fetch(BACKEND_GET_URL);
      const data = await res.json();
      if (data.backendAddress) {
        document.getElementById('backendWalletBadge').innerHTML = `🐚 ${data.backendAddress.slice(0,6)}...${data.backendAddress.slice(-4)}`;
      }
    } catch(e) { console.warn(e); }
  }

  async function fetchTokenBalances() {
    if (!userAddress || !provider) return;
    try {
      if (tokenContracts.USDC) {
        const bal = await tokenContracts.USDC.balanceOf(userAddress);
        const decimals = await tokenContracts.USDC.decimals();
        userBalances.USDC = parseFloat(ethers.utils.formatUnits(bal, decimals));
      }
      if (tokenContracts.EURC) {
        const bal = await tokenContracts.EURC.balanceOf(userAddress);
        const decimals = await tokenContracts.EURC.decimals();
        userBalances.EURC = parseFloat(ethers.utils.formatUnits(bal, decimals));
      }
      fromBalanceLabel.innerText = `${userBalances[selectedFrom]?.toFixed(4) || 0} ${selectedFrom}`;
      toBalanceLabel.innerText = `${userBalances[selectedTo]?.toFixed(4) || 0} ${selectedTo}`;
    } catch(err) { console.warn(err); }
  }

  async function updateGasFee() {
    if (!provider || !connected) { gasEstimateSpan.innerText = '—'; return; }
    try {
      const feeData = await provider.getFeeData();
      let maxFeePerGas = feeData.maxFeePerGas || feeData.gasPrice;
      if (!maxFeePerGas) throw new Error();
      const minFeeWei = ethers.utils.parseUnits("160", "gwei");
      if (maxFeePerGas.lt(minFeeWei)) maxFeePerGas = minFeeWei;
      const gasLimit = ethers.BigNumber.from(350000);
      const totalWei = gasLimit.mul(maxFeePerGas);
      const totalUSDC = ethers.utils.formatUnits(totalWei, 18);
      gasEstimateSpan.innerText = `~${parseFloat(totalUSDC).toFixed(6)} USDC`;
    } catch(e) { gasEstimateSpan.innerText = "Gas error"; }
  }

  function updateQuote() {
    if (!connected) { receiveField.value = ''; minReceiveHint.innerText = '—'; return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) { receiveField.value = ''; minReceiveHint.innerText = '—'; return; }
    const rate = (selectedFrom === 'USDC' && selectedTo === 'EURC') ? 0.978 :
                 (selectedFrom === 'EURC' && selectedTo === 'USDC') ? 1.023 : 1;
    const rawOut = amount * rate;
    const minReceived = rawOut * (1 - currentSlippage / 100);
    receiveField.value = rawOut.toFixed(6);
    minReceiveHint.innerText = `min receive: ${minReceived.toFixed(6)} ${selectedTo}`;
  }

  function validateSwap() {
    if (!connected || isProcessing) { swapBtn.disabled = true; return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0 || amount > (userBalances[selectedFrom] || 0)) swapBtn.disabled = true;
    else swapBtn.disabled = false;
  }

  async function refreshUI() {
    if (connected) { await fetchTokenBalances(); await updateGasFee(); }
    updateQuote();
    validateSwap();
    lucide.createIcons();
  }

  async function initTokenContracts() {
    if (!provider) return;
    tokenContracts.USDC = new ethers.Contract(USDC_ADDRESS, ERC20_ABI, provider);
    tokenContracts.EURC = new ethers.Contract(EURC_ADDRESS, ERC20_ABI, provider);
  }

  async function ensureArcNetwork(ethereumProvider) {
    const chainIdHex = `0x${EXPECTED_CHAIN_ID.toString(16)}`;
    try {
      await ethereumProvider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: chainIdHex }] });
    } catch (switchError) {
      if (switchError.code === 4902) {
        await ethereumProvider.request({ method: 'wallet_addEthereumChain', params: [{
          chainId: chainIdHex, chainName: 'Arc Testnet',
          nativeCurrency: { name: 'USDC', symbol: 'USDC', decimals: 18 },
          rpcUrls: ['https://rpc.testnet.arc.network'],
          blockExplorerUrls: ['https://explorer.testnet.arc.network']
        }]});
      } else throw switchError;
    }
  }

  async function connectWallet() {
    if (!window.ethereum) { showToast('❌ No wallet found', true); return; }
    try {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      userAddress = accounts[0];
      provider = new ethers.providers.Web3Provider(window.ethereum);
      await ensureArcNetwork(window.ethereum);
      const network = await provider.getNetwork();
      if (network.chainId !== EXPECTED_CHAIN_ID) throw new Error('Please switch to Arc Testnet');
      connected = true;
      await initTokenContracts();
      await refreshUI();
      walletAddrSpan.innerText = `${userAddress.slice(0,6)}...${userAddress.slice(-4)} on Arc`;
      statusLed.classList.add('bg-emerald-400'); statusLed.classList.remove('bg-gray-500');
      connectBtnText.innerText = 'Connected';
      copyBtn.classList.remove('hidden');
      disconnectBtn.classList.remove('hidden');
      showToast('Connected to Arc Testnet');
    } catch(err) { showToast(`Connection error: ${err.message}`, true); connected = false; }
  }

  function disconnect() {
    connected = false;
    userAddress = null;
    provider = null;
    userBalances = { USDC: 0, EURC: 0 };
    walletAddrSpan.innerText = '⚡ not connected';
    statusLed.classList.remove('bg-emerald-400'); statusLed.classList.add('bg-gray-500');
    connectBtnText.innerText = 'Connect';
    copyBtn.classList.add('hidden');
    disconnectBtn.classList.add('hidden');
    refreshUI();
    showToast('Disconnected');
  }

  // ========== SWAP FUNCTION (EXACTLY LIKE OLD WORKING CODE) ==========
  async function executeSwap() {
    if (!userAddress) { showToast('Connect wallet first', true); return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) { showToast('Invalid amount', true); return; }
    if (amount > userBalances[selectedFrom]) { showToast(`Insufficient ${selectedFrom} balance`, true); return; }

    isProcessing = true;
    swapBtn.disabled = true;
    swapBtnText.innerHTML = '<div class="loading-spinner"></div> Preparing swap...';

    try {
      // 1. Call backend to get swap transaction data
      const res = await fetch(BACKEND_SWAP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tokenIn: selectedFrom, tokenOut: selectedTo, amountIn: amount.toString(), walletAddress: userAddress })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Swap preparation failed');

      // 2. Extract transaction data from backend response (supports old format with fullResult)
      let tx;
      if (data.fullResult && data.fullResult.to && data.fullResult.data) {
        tx = {
          to: data.fullResult.to,
          data: data.fullResult.data,
          value: data.fullResult.value || "0x0",
          gasLimit: data.fullResult.gas || 500000,
          gasPrice: data.fullResult.gasPrice
        };
      } else if (data.to && data.data) {
        tx = {
          to: data.to,
          data: data.data,
          value: data.value || "0x0",
          gasLimit: data.gas || 500000,
          gasPrice: data.gasPrice
        };
      } else {
        throw new Error('Backend did not return a valid transaction object');
      }

      // 3. Ask user to sign and send the transaction
      swapBtnText.innerHTML = '<div class="loading-spinner"></div> Confirm in wallet...';
      const signer = provider.getSigner();
      const transactionResponse = await signer.sendTransaction(tx);

      // 4. Wait for confirmation
      swapBtnText.innerHTML = '<div class="loading-spinner"></div> Confirming on chain...';
      await transactionResponse.wait(1);

      showToast(`✅ Swap successful! Tx: ${transactionResponse.hash.slice(0,10)}...`, false);
      await refreshUI();
      swapBtnText.innerHTML = 'Swap tokens';
    } catch (err) {
      console.error(err);
      let friendly = err.message;
      if (friendly.includes('user rejected')) friendly = 'Transaction rejected.';
      else if (friendly.includes('insufficient')) friendly = 'Insufficient funds for gas or token.';
      showToast(`❌ Swap failed: ${friendly}`, true);
      swapBtnText.innerHTML = 'Swap tokens';
    } finally {
      isProcessing = false;
      validateSwap();
    }
  }

  // Event listeners
  connectBtn.addEventListener('click', connectWallet);
  disconnectBtn.addEventListener('click', disconnect);
  copyBtn.addEventListener('click', () => { if(userAddress) { navigator.clipboard.writeText(userAddress); showToast('Copied'); } });
  flipBtn.addEventListener('click', () => {
    let tmp = selectedFrom;
    selectedFrom = selectedTo;
    selectedTo = tmp;
    document.getElementById('fromTokenSymbol').innerText = selectedFrom;
    document.getElementById('toTokenSymbol').innerText = selectedTo;
    const fromIcon = selectedFrom === 'USDC' ? 'circle-dollar-sign' : 'euro';
    const toIcon = selectedTo === 'USDC' ? 'circle-dollar-sign' : 'euro';
    document.getElementById('fromTokenBtn').querySelector('i').setAttribute('data-lucide', fromIcon);
    document.getElementById('toTokenBtn').querySelector('i').setAttribute('data-lucide', toIcon);
    lucide.createIcons();
    refreshUI();
  });
  maxBtn.addEventListener('click', () => { if(connected) amountInput.value = userBalances[selectedFrom]; refreshUI(); });
  amountInput.addEventListener('input', refreshUI);
  document.querySelectorAll('.percentBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      if(connected) amountInput.value = (userBalances[selectedFrom] * parseFloat(btn.dataset.percent)).toFixed(6);
      refreshUI();
    });
  });
  document.querySelectorAll('.slippagePreset').forEach(btn => {
    btn.addEventListener('click', () => {
      currentSlippage = parseFloat(btn.dataset.slippage);
      slippageValueSpan.innerText = `${currentSlippage}%`;
      refreshUI();
    });
  });
  swapBtn.addEventListener('click', executeSwap);

  fetchBackendWallet();
  refreshUI();
  lucide.createIcons();
</script>
</body>
</html>
