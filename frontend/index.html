<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Xroga · Arc Swap – REAL (Gas‑Aware)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: radial-gradient(ellipse at 40% 50%, #0a0f1f, #010208); min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .glass-panel { background: rgba(12,20,32,0.65); backdrop-filter: blur(14px); border: 1px solid rgba(59,130,246,0.2); border-radius: 2rem; padding: 1.5rem; max-width: 480px; width: 100%; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; backdrop-filter: blur(12px); border-radius: 40px; padding: 8px 18px; color: white; font-size: 13px; z-index: 1000; pointer-events: none; transition: opacity 0.2s; }
    .warning { background: rgba(245,158,11,0.2); border: 1px solid #f59e0b; color: #fbbf24; }
  </style>
</head>
<body>
<div id="toast" class="toast opacity-0">✨ Ready</div>
<main>
  <div class="glass-panel">
    <div class="flex justify-between items-center mb-5">
      <div class="text-2xl font-black bg-gradient-to-r from-white via-blue-400 to-purple-500 bg-clip-text text-transparent">Xroga</div>
      <button id="connectBtn" class="bg-slate-800 hover:bg-slate-700 rounded-full px-4 py-1.5 text-sm flex items-center gap-2">
        <i data-lucide="wallet" class="w-4 h-4"></i><span id="connectText">Connect</span>
      </button>
    </div>
    <div class="bg-black/30 rounded-2xl p-3 text-xs flex justify-between items-center mb-5">
      <div class="flex gap-2 items-center">
        <div id="led" class="w-2 h-2 rounded-full bg-gray-500"></div>
        <span id="walletShort">⚡ not connected</span>
      </div>
      <div class="flex gap-3">
        <button id="faucetBtn" class="text-emerald-400 hover:text-emerald-300 underline">💧 Faucet</button>
        <button id="refreshBtn" class="text-blue-400 hover:text-blue-300 underline">⟳ Refresh</button>
      </div>
    </div>

    <!-- FROM -->
    <div class="bg-black/20 rounded-2xl p-4 mb-3">
      <div class="flex justify-between text-xs text-slate-400"><span>You pay</span><span id="fromBalance">—</span></div>
      <div class="flex items-center gap-3 mt-1">
        <button id="fromTokenBtn" class="bg-slate-800 rounded-full py-2 px-3 text-sm flex items-center gap-2">
          <i data-lucide="circle-dollar-sign" class="w-4 h-4"></i><span id="fromSymbol">USDC</span><i data-lucide="chevron-down" class="w-3 h-3"></i>
        </button>
        <input type="number" id="amount" value="1.0" step="0.1" class="bg-transparent text-right text-2xl text-white w-full outline-none">
      </div>
      <div class="flex justify-end gap-2 mt-2">
        <button class="percentBtn" data-pct="0.25">25%</button>
        <button class="percentBtn" data-pct="0.5">50%</button>
        <button class="percentBtn" data-pct="0.75">75%</button>
        <button id="maxBtn" class="flex items-center gap-1"><i data-lucide="maximize-2" class="w-2.5 h-2.5"></i> MAX</button>
      </div>
      <div id="gasWarning" class="text-xs text-orange-300 mt-1 hidden">⚠️ Leave at least 0.01 USDC for gas fee</div>
    </div>

    <div class="flex justify-center -my-2 z-10 relative">
      <button id="flipBtn" class="bg-slate-800 rounded-full p-2 border border-blue-500/40"><i data-lucide="arrow-down-up" class="w-5 h-5 text-blue-400"></i></button>
    </div>

    <!-- TO -->
    <div class="bg-black/20 rounded-2xl p-4 mt-1 mb-3">
      <div class="flex justify-between text-xs text-slate-400"><span>You receive</span><span id="toBalance">—</span></div>
      <div class="flex items-center gap-3 mt-1">
        <button id="toTokenBtn" class="bg-slate-800 rounded-full py-2 px-3 text-sm flex items-center gap-2">
          <i data-lucide="euro" class="w-4 h-4"></i><span id="toSymbol">EURC</span><i data-lucide="chevron-down" class="w-3 h-3"></i>
        </button>
        <input type="text" id="receiveField" readonly class="bg-transparent text-right text-2xl text-white/80 w-full outline-none">
      </div>
      <div class="flex justify-between mt-1"><span id="minReceive" class="text-xs text-slate-400">—</span></div>
    </div>

    <div class="bg-black/20 rounded-xl p-2 text-xs flex justify-between items-center mb-4">
      <div class="flex gap-2"><i data-lucide="refresh-cw" class="w-3 h-3"></i><span id="rateDisplay">1 USDC ≈ 0.978 EURC</span></div>
      <button id="aiBtn" class="bg-purple-500/20 rounded-full px-2 py-0.5 flex items-center gap-1"><i data-lucide="sparkles" class="w-3 h-3"></i> AI</button>
    </div>

    <div class="bg-black/20 rounded-xl p-2 mb-4">
      <div class="flex justify-between cursor-pointer" id="advToggle">
        <div class="flex gap-3"><i data-lucide="fuel" class="w-3 h-3"></i><span id="gasEstimate">Fetching gas...</span><i data-lucide="gauge" class="w-3 h-3 ml-2"></i><span id="slippageVal">0.5%</span></div>
        <i data-lucide="chevron-down" id="chevron" class="w-4 h-4"></i>
      </div>
      <div id="advPanel" class="hidden mt-2 pt-2 border-t border-white/10">
        <div class="flex justify-between"><span class="text-xs">MEV protection</span><label><input type="checkbox" id="mev"></label></div>
        <div><span class="text-xs">Slippage</span><div class="flex gap-2 mt-1"><button class="slippagePreset" data-slip="0.1">0.1%</button><button class="slippagePreset" data-slip="0.5">0.5%</button><button class="slippagePreset" data-slip="1">1%</button></div></div>
      </div>
    </div>

    <button id="swapBtn" disabled class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 disabled:opacity-50 rounded-2xl py-3.5 font-bold text-white">Swap tokens</button>
  </div>
</main>

<script>
  // ========== BACKEND URL (CHANGE TO YOUR DEPLOYED BACKEND) ==========
  const BACKEND_URL = 'https://arc-testnet-swap.vercel.app/api/swap';

  const USDC_ADDRESS = '0x3600000000000000000000000000000000000000';
  const EURC_ADDRESS = '0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a';
  const ERC20_ABI = [
    "function balanceOf(address) view returns (uint256)",
    "function decimals() view returns (uint8)",
    "function approve(address,uint256) returns (bool)",
    "function allowance(address,address) view returns (uint256)"
  ];
  const EXPECTED_CHAIN_ID = 5042002;

  let userAddress = null, provider = null, connected = false;
  let selectedFrom = "USDC", selectedTo = "EURC", slippage = 0.5, processing = false;
  let balances = { USDC: 0, EURC: 0 };
  let tokenContracts = {};
  let currentGasFee = 0; // in USDC

  // DOM elements
  const connectBtn = document.getElementById('connectBtn');
  const connectText = document.getElementById('connectText');
  const walletShort = document.getElementById('walletShort');
  const led = document.getElementById('led');
  const amountInput = document.getElementById('amount');
  const receiveField = document.getElementById('receiveField');
  const fromBalanceSpan = document.getElementById('fromBalance');
  const toBalanceSpan = document.getElementById('toBalance');
  const minReceiveSpan = document.getElementById('minReceive');
  const rateSpan = document.getElementById('rateDisplay');
  const gasSpan = document.getElementById('gasEstimate');
  const slippageSpan = document.getElementById('slippageVal');
  const swapButton = document.getElementById('swapBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const faucetBtn = document.getElementById('faucetBtn');
  const maxBtn = document.getElementById('maxBtn');
  const flipBtn = document.getElementById('flipBtn');
  const fromTokenBtn = document.getElementById('fromTokenBtn');
  const toTokenBtn = document.getElementById('toTokenBtn');
  const fromSymbolSpan = document.getElementById('fromSymbol');
  const toSymbolSpan = document.getElementById('toSymbol');
  const aiBtn = document.getElementById('aiBtn');
  const advToggle = document.getElementById('advToggle');
  const advPanel = document.getElementById('advPanel');
  const chevron = document.getElementById('chevron');
  const gasWarning = document.getElementById('gasWarning');

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.borderColor = isError ? '#ef4444' : '#3b82f6';
    toast.classList.remove('opacity-0');
    setTimeout(() => toast.classList.add('opacity-0'), 4000);
  }

  // Wallet & network
  async function ensureArcNetwork() {
    const hex = `0x${EXPECTED_CHAIN_ID.toString(16)}`;
    try {
      await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: hex }] });
    } catch (e) {
      if (e.code === 4902) {
        await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [{
          chainId: hex, chainName: 'Arc Testnet', nativeCurrency: { name: 'USDC', symbol: 'USDC', decimals: 18 },
          rpcUrls: ['https://rpc.testnet.arc.network'], blockExplorerUrls: ['https://explorer.testnet.arc.network']
        }]});
      } else throw e;
    }
  }

  async function connectWallet() {
    if (!window.ethereum) { showToast('Install MetaMask or Rabby', true); return; }
    try {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      if (!accounts.length) throw new Error('No accounts');
      userAddress = accounts[0];
      await ensureArcNetwork();
      provider = new ethers.providers.Web3Provider(window.ethereum);
      const net = await provider.getNetwork();
      if (net.chainId !== EXPECTED_CHAIN_ID) throw new Error('Wrong network');
      connected = true;
      walletShort.innerText = `${userAddress.slice(0,6)}...${userAddress.slice(-4)} on Arc`;
      led.className = 'w-2 h-2 rounded-full bg-emerald-400';
      connectText.innerText = 'Connected';
      tokenContracts.USDC = new ethers.Contract(USDC_ADDRESS, ERC20_ABI, provider.getSigner());
      tokenContracts.EURC = new ethers.Contract(EURC_ADDRESS, ERC20_ABI, provider.getSigner());
      await refreshBalances();
      await refreshUI();
    } catch (err) { showToast(err.message, true); }
  }

  // Balance fetch
  async function refreshBalances() {
    if (!connected) return;
    try {
      const usdcWei = await tokenContracts.USDC.balanceOf(userAddress);
      const usdcDec = await tokenContracts.USDC.decimals();
      balances.USDC = parseFloat(ethers.utils.formatUnits(usdcWei, usdcDec));
      const eurcWei = await tokenContracts.EURC.balanceOf(userAddress);
      const eurcDec = await tokenContracts.EURC.decimals();
      balances.EURC = parseFloat(ethers.utils.formatUnits(eurcWei, eurcDec));
      console.log(`Balances: USDC=${balances.USDC}, EURC=${balances.EURC}`);
    } catch (err) {
      console.error(err);
      showToast('Failed to fetch balances', true);
    }
    updateBalanceUI();
    validateSwap();
  }

  function updateBalanceUI() {
    fromBalanceSpan.innerText = connected ? `${balances[selectedFrom].toFixed(4)} ${selectedFrom}` : '—';
    toBalanceSpan.innerText = connected ? `${balances[selectedTo].toFixed(4)} ${selectedTo}` : '—';
  }

  // Gas estimation
  async function updateGas() {
    if (!connected) { gasSpan.innerText = '—'; currentGasFee = 0; return; }
    try {
      const feeData = await provider.getFeeData();
      let gasPrice = feeData.gasPrice || feeData.maxFeePerGas;
      if (!gasPrice) throw new Error();
      const gasLimit = ethers.BigNumber.from(350000);
      const totalWei = gasLimit.mul(gasPrice);
      const total = parseFloat(ethers.utils.formatUnits(totalWei, 18));
      currentGasFee = total;
      gasSpan.innerText = `~${total.toFixed(6)} USDC`;
    } catch { gasSpan.innerText = 'Gas error'; currentGasFee = 0.007; } // fallback estimate
  }

  function updateQuote() {
    if (!connected) {
      receiveField.value = ''; minReceiveSpan.innerText = '—'; rateSpan.innerText = '1 USDC ≈ 0.978 EURC';
      return;
    }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) {
      receiveField.value = ''; minReceiveSpan.innerText = '—';
      return;
    }
    const rate = (selectedFrom === 'USDC' && selectedTo === 'EURC') ? 0.978 : (selectedFrom === 'EURC' && selectedTo === 'USDC') ? 1.023 : 1;
    const out = amount * rate;
    const minOut = out * (1 - slippage/100);
    receiveField.value = out.toFixed(6);
    minReceiveSpan.innerText = `min receive: ${minOut.toFixed(6)} ${selectedTo}`;
    rateSpan.innerText = selectedFrom === 'USDC' ? '1 USDC ≈ 0.978 EURC' : '1 EURC ≈ 1.023 USDC';
  }

  function validateSwap() {
    if (!connected || processing) { swapButton.disabled = true; return; }
    const amount = parseFloat(amountInput.value);
    const balance = balances[selectedFrom] || 0;
    // Ensure enough balance for swap + gas (if swapping USDC)
    let gasBuffer = (selectedFrom === 'USDC') ? currentGasFee + 0.001 : 0;
    let maxAllowed = balance - gasBuffer;
    if (maxAllowed < 0) maxAllowed = 0;
    const isValid = amount > 0 && amount <= maxAllowed;
    swapButton.disabled = !isValid;
    if (selectedFrom === 'USDC' && balance > 0 && amount > maxAllowed && amount <= balance) {
      gasWarning.classList.remove('hidden');
      gasWarning.innerText = `⚠️ Leave at least ${gasBuffer.toFixed(6)} USDC for gas. Max swap: ${maxAllowed.toFixed(4)} USDC`;
    } else {
      gasWarning.classList.add('hidden');
    }
  }

  async function refreshUI() {
    if (connected) { await updateGas(); }
    updateQuote(); validateSwap();
    lucide.createIcons();
  }

  // ========== REAL SWAP EXECUTION ==========
  async function executeSwap() {
    if (!connected) { showToast('Connect wallet', true); return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) { showToast('Invalid amount', true); return; }
    const balance = balances[selectedFrom] || 0;
    let gasBuffer = (selectedFrom === 'USDC') ? currentGasFee + 0.001 : 0;
    if (amount + gasBuffer > balance) {
      showToast(`Insufficient balance (need ~${gasBuffer.toFixed(6)} USDC for gas)`, true);
      return;
    }

    processing = true;
    swapButton.disabled = true;
    const originalText = swapButton.innerText;
    swapButton.innerText = 'Preparing swap...';

    try {
      const response = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tokenIn: selectedFrom,
          tokenOut: selectedTo,
          amountIn: amount.toString(),
          walletAddress: userAddress
        })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Backend error');

      const tokenAddr = selectedFrom === 'USDC' ? USDC_ADDRESS : EURC_ADDRESS;
      const token = new ethers.Contract(tokenAddr, ERC20_ABI, provider.getSigner());
      const decimals = await token.decimals();
      const amountWei = ethers.utils.parseUnits(amount.toString(), decimals);
      const spender = data.to;
      const allowance = await token.allowance(userAddress, spender);
      if (allowance.lt(amountWei)) {
        swapButton.innerText = 'Approving token...';
        const approveTx = await token.approve(spender, amountWei);
        await approveTx.wait();
        showToast('Approval confirmed');
      }

      swapButton.innerText = 'Confirm in wallet...';
      const tx = {
        from: userAddress,
        to: data.to,
        data: data.data,
        value: data.value,
        gasPrice: data.gasPrice,
        gasLimit: ethers.BigNumber.from(data.gas || 500000)
      };
      const sendTx = await provider.getSigner().sendTransaction(tx);
      showToast(`Swap submitted: ${sendTx.hash.slice(0,10)}...`);
      swapButton.innerText = 'Confirming...';
      await sendTx.wait(1);
      showToast(`✅ Swap confirmed! ${selectedFrom} → ${selectedTo}`);
      swapButton.innerText = 'Done!';
      await refreshBalances();
      setTimeout(() => {
        swapButton.innerText = originalText;
        processing = false;
        validateSwap();
      }, 2000);
    } catch (err) {
      console.error(err);
      let msg = err.message.includes('user rejected') ? 'Transaction rejected' : err.message;
      showToast(`❌ Swap failed: ${msg}`, true);
      swapButton.innerText = originalText;
      processing = false;
      validateSwap();
    }
  }

  // Event handlers
  connectBtn.onclick = connectWallet;
  refreshBtn.onclick = async () => { if (connected) await refreshBalances(); await refreshUI(); };
  faucetBtn.onclick = () => window.open('https://faucet.circle.com/', '_blank');
  flipBtn.onclick = () => { let tmp = selectedFrom; selectedFrom = selectedTo; selectedTo = tmp; fromSymbolSpan.innerText = selectedFrom; toSymbolSpan.innerText = selectedTo; refreshUI(); };
  maxBtn.onclick = () => {
    if (connected) {
      let gasBuffer = (selectedFrom === 'USDC') ? currentGasFee + 0.001 : 0;
      let maxAmt = Math.max(0, balances[selectedFrom] - gasBuffer);
      amountInput.value = maxAmt.toFixed(4);
      refreshUI();
    }
  };
  document.querySelectorAll('.percentBtn').forEach(btn => {
    btn.onclick = () => {
      if (connected) {
        let p = parseFloat(btn.dataset.pct);
        let gasBuffer = (selectedFrom === 'USDC') ? currentGasFee + 0.001 : 0;
        let maxAmt = balances[selectedFrom] - gasBuffer;
        if (maxAmt < 0) maxAmt = 0;
        amountInput.value = (maxAmt * p).toFixed(4);
        refreshUI();
      }
    };
    btn.classList.add('text-xs', 'px-2', 'py-0.5', 'rounded-full', 'bg-slate-700', 'hover:bg-blue-600/50');
  });
  amountInput.oninput = refreshUI;
  swapButton.onclick = executeSwap;
  document.querySelectorAll('.slippagePreset').forEach(btn => {
    btn.onclick = () => { slippage = parseFloat(btn.dataset.slip); slippageSpan.innerText = `${slippage}%`; refreshUI(); };
    btn.classList.add('text-xs', 'px-2', 'py-0.5', 'rounded', 'bg-slate-700');
  });
  advToggle.onclick = () => { advPanel.classList.toggle('hidden'); chevron.style.transform = advPanel.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)'; };
  aiBtn.onclick = () => showToast(`✨ AI: gas ${gasSpan.innerText}, slippage ${slippage}%`);

  // Token selector modal (unchanged)
  const tokenList = [{ sym:"USDC", name:"USD Coin", icon:"circle-dollar-sign" }, { sym:"EURC", name:"Euro Coin", icon:"euro" }];
  function renderTokenModal(side) {
    let html = tokenList.map(t => `<div class="token-item flex justify-between p-3 rounded-xl hover:bg-slate-700/50 cursor-pointer" data-sym="${t.sym}" data-side="${side}"><div class="flex gap-3"><i data-lucide="${t.icon}" class="w-6 h-6"></i><div><div>${t.sym}</div><div class="text-xs">${t.name}</div></div></div><div class="text-sm">${(balances[t.sym]||0).toFixed(4)}</div></div>`).join('');
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 bg-black/80 backdrop-blur flex items-end justify-center z-50';
    modal.innerHTML = `<div class="bg-slate-900 rounded-t-2xl w-full max-w-md p-5"><div class="flex justify-between mb-4"><h3 class="text-white font-semibold">Select token</h3><button class="closeModal"><i data-lucide="x" class="w-5 h-5"></i></button></div><div class="space-y-2 max-h-96 overflow-auto">${html}</div></div>`;
    document.body.appendChild(modal);
    lucide.createIcons();
    modal.querySelector('.closeModal').onclick = () => modal.remove();
    modal.querySelectorAll('.token-item').forEach(el => {
      el.onclick = () => {
        const sym = el.dataset.sym;
        if (el.dataset.side === 'from') { selectedFrom = sym; fromSymbolSpan.innerText = sym; }
        else { selectedTo = sym; toSymbolSpan.innerText = sym; }
        modal.remove(); refreshUI();
      };
    });
  }
  fromTokenBtn.onclick = () => renderTokenModal('from');
  toTokenBtn.onclick = () => renderTokenModal('to');

  // Sparkline (cosmetic)
  const canvas = document.createElement('canvas'); canvas.width = 80; canvas.height = 24; canvas.className = 'bg-black/30 rounded ml-2';
  const rateContainer = document.querySelector('.flex.items-center.gap-2');
  if (rateContainer) rateContainer.appendChild(canvas);
  let sparkCtx = canvas.getContext('2d');
  let sparkData = Array(20).fill(0.978);
  setInterval(() => {
    if (!connected) return;
    let newVal = (selectedFrom === 'USDC' ? 0.978 : 1.023) + (Math.random() - 0.5)*0.002;
    sparkData.push(newVal); if(sparkData.length>30) sparkData.shift();
    sparkCtx.clearRect(0,0,80,24);
    sparkCtx.beginPath(); sparkCtx.strokeStyle='#60a5fa'; sparkCtx.lineWidth=1.5;
    let min=Math.min(...sparkData), max=Math.max(...sparkData);
    for(let i=0;i<sparkData.length;i++){ let x=i/sparkData.length*80; let y=24-((sparkData[i]-min)/(max-min||1))*20; if(i===0) sparkCtx.moveTo(x,y); else sparkCtx.lineTo(x,y); }
    sparkCtx.stroke();
  }, 4000);

  refreshUI();
  lucide.createIcons();
</script>
</body>
</html>
