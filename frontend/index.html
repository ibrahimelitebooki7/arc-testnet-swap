<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xroga · Debug Swap</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body { background: #0a0f1f; color: white; font-family: monospace; padding: 20px; }
    .debug-panel { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    button { background: #3b82f6; border: none; padding: 8px 16px; border-radius: 8px; color: white; cursor: pointer; margin-right: 10px; }
    pre { background: #0f172a; padding: 10px; border-radius: 8px; overflow-x: auto; }
    input, select { padding: 8px; margin: 5px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; }
  </style>
</head>
<body>
<h2>🔧 Xroga Swap Debugger</h2>

<div class="debug-panel">
  <button id="connectBtn">Connect Wallet</button>
  <button id="refreshBalanceBtn">Refresh Balance</button>
  <button id="forceSwapBtn" style="background:#ef4444;">⚠️ Force Swap (skip balance check)</button>
  <span id="status">Not connected</span>
</div>

<div class="debug-panel">
  <h3>Wallet Info</h3>
  <div>Address: <span id="walletAddress">-</span></div>
  <div>Network: <span id="networkName">-</span> (Chain ID: <span id="chainId">-</span>)</div>
  <div>USDC Balance (from contract): <span id="usdcBalance">-</span> USDC</div>
  <div>EURC Balance: <span id="eurcBalance">-</span> EURC</div>
  <div>Raw USDC balance (wei): <span id="rawBalance">-</span></div>
</div>

<div class="debug-panel">
  <h3>Swap Parameters</h3>
  <div>
    <label>From: </label>
    <select id="tokenFrom">
      <option value="USDC">USDC</option>
      <option value="EURC">EURC</option>
    </select>
    <label>To: </label>
    <select id="tokenTo">
      <option value="EURC">EURC</option>
      <option value="USDC">USDC</option>
    </select>
  </div>
  <div>
    <label>Amount: </label>
    <input type="number" id="amount" value="1.0" step="0.5">
    <button id="maxBtn">MAX</button>
  </div>
  <div>
    <label>Slippage: </label>
    <select id="slippage">
      <option value="0.1">0.1%</option>
      <option value="0.5" selected>0.5%</option>
      <option value="1">1%</option>
    </select>
  </div>
  <div>
    <label>Receive estimate: </label>
    <span id="receiveEstimate">-</span>
  </div>
</div>

<div class="debug-panel">
  <h3>Transaction Log</h3>
  <pre id="logArea">Ready.</pre>
</div>

<script>
  // ========== CONFIGURATION ==========
  const USDC_ADDRESS = '0x3600000000000000000000000000000000000000';
  const EURC_ADDRESS = '0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a';
  const ERC20_ABI = [
    "function balanceOf(address owner) view returns (uint256)",
    "function decimals() view returns (uint8)",
    "function symbol() view returns (string)"
  ];
  const EXPECTED_CHAIN_ID = 5042002;
  const BACKEND_URL = 'https://arc-testnet-swap.vercel.app/api/swap';

  let provider = null;
  let signer = null;
  let userAddress = null;
  let connected = false;
  let tokenContracts = {};

  // DOM elements
  const connectBtn = document.getElementById('connectBtn');
  const refreshBtn = document.getElementById('refreshBalanceBtn');
  const forceSwapBtn = document.getElementById('forceSwapBtn');
  const statusSpan = document.getElementById('status');
  const walletSpan = document.getElementById('walletAddress');
  const networkNameSpan = document.getElementById('networkName');
  const chainIdSpan = document.getElementById('chainId');
  const usdcBalanceSpan = document.getElementById('usdcBalance');
  const eurcBalanceSpan = document.getElementById('eurcBalance');
  const rawBalanceSpan = document.getElementById('rawBalance');
  const tokenFromSelect = document.getElementById('tokenFrom');
  const tokenToSelect = document.getElementById('tokenTo');
  const amountInput = document.getElementById('amount');
  const maxBtn = document.getElementById('maxBtn');
  const slippageSelect = document.getElementById('slippage');
  const receiveEstimateSpan = document.getElementById('receiveEstimate');
  const logArea = document.getElementById('logArea');

  function log(msg) {
    console.log(msg);
    logArea.innerText += msg + '\n';
    logArea.scrollTop = logArea.scrollHeight;
  }

  async function initContracts() {
    if (!provider) return;
    tokenContracts.USDC = new ethers.Contract(USDC_ADDRESS, ERC20_ABI, provider);
    tokenContracts.EURC = new ethers.Contract(EURC_ADDRESS, ERC20_ABI, provider);
    log("Contracts initialized");
  }

  async function fetchBalances() {
    if (!userAddress || !provider || !tokenContracts.USDC) {
      log("Cannot fetch balances: missing provider or address");
      return;
    }
    try {
      log("Fetching USDC balance for " + userAddress);
      const usdcWei = await tokenContracts.USDC.balanceOf(userAddress);
      const usdcDecimals = await tokenContracts.USDC.decimals();
      const usdcBalance = ethers.utils.formatUnits(usdcWei, usdcDecimals);
      log(`USDC: ${usdcBalance} (raw: ${usdcWei.toString()}, decimals: ${usdcDecimals})`);
      usdcBalanceSpan.innerText = usdcBalance;
      rawBalanceSpan.innerText = usdcWei.toString();

      const eurcWei = await tokenContracts.EURC.balanceOf(userAddress);
      const eurcDecimals = await tokenContracts.EURC.decimals();
      const eurcBalance = ethers.utils.formatUnits(eurcWei, eurcDecimals);
      log(`EURC: ${eurcBalance}`);
      eurcBalanceSpan.innerText = eurcBalance;
    } catch (err) {
      log("Error fetching balances: " + err.message);
      console.error(err);
    }
  }

  async function connectWallet() {
    if (!window.ethereum) {
      alert("No Ethereum wallet found (MetaMask)");
      return;
    }
    try {
      log("Requesting accounts...");
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      userAddress = accounts[0];
      provider = new ethers.providers.Web3Provider(window.ethereum);
      signer = provider.getSigner();
      const network = await provider.getNetwork();
      chainIdSpan.innerText = network.chainId;
      networkNameSpan.innerText = network.name === 'unknown' ? 'Arc Testnet' : network.name;
      walletSpan.innerText = userAddress;
      statusSpan.innerText = "Connected to " + (network.chainId === EXPECTED_CHAIN_ID ? "Arc Testnet ✅" : "Wrong network ⚠️");
      if (network.chainId !== EXPECTED_CHAIN_ID) {
        log("Warning: Not on Arc Testnet. Please switch network.");
        try {
          await window.ethereum.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId: `0x${EXPECTED_CHAIN_ID.toString(16)}` }]
          });
          log("Switched to Arc Testnet, reloading...");
          window.location.reload();
        } catch(e) { log("Auto-switch failed: " + e.message); }
      }
      connected = true;
      await initContracts();
      await fetchBalances();
      updateReceiveEstimate();
    } catch (err) {
      log("Connection error: " + err.message);
    }
  }

  function updateReceiveEstimate() {
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount)) return;
    const from = tokenFromSelect.value;
    const to = tokenToSelect.value;
    let rate = (from === 'USDC' && to === 'EURC') ? 0.978 : (from === 'EURC' && to === 'USDC') ? 1.023 : 1;
    const rawOut = amount * rate;
    const slippage = parseFloat(slippageSelect.value);
    const minReceived = rawOut * (1 - slippage / 100);
    receiveEstimateSpan.innerText = `${rawOut.toFixed(6)} ${to} (min ${minReceived.toFixed(6)})`;
  }

  async function executeSwap(force = false) {
    if (!connected) { alert("Connect wallet first"); return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) { alert("Invalid amount"); return; }
    const fromToken = tokenFromSelect.value;
    const toToken = tokenToSelect.value;
    const balance = fromToken === 'USDC' ? parseFloat(usdcBalanceSpan.innerText) : parseFloat(eurcBalanceSpan.innerText);
    if (!force && amount > balance) {
      alert(`Insufficient ${fromToken} balance. You have ${balance}`);
      return;
    }
    log(`Initiating swap: ${amount} ${fromToken} → ${toToken} (force=${force})`);
    try {
      const response = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tokenIn: fromToken,
          tokenOut: toToken,
          amountIn: amount.toString(),
          walletAddress: userAddress
        })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Backend error');
      log("Backend response received");
      
      let tx;
      if (data.fullResult && data.fullResult.to) {
        tx = {
          to: data.fullResult.to,
          data: data.fullResult.data,
          value: data.fullResult.value || "0x0",
          gasLimit: data.fullResult.gas || 500000,
          gasPrice: data.fullResult.gasPrice
        };
      } else if (data.to && data.data) {
        tx = {
          to: data.to,
          data: data.data,
          value: data.value || "0x0",
          gasLimit: data.gas || 500000,
          gasPrice: data.gasPrice
        };
      } else {
        throw new Error("No transaction data in response");
      }
      log("Sending transaction to wallet...");
      const txResponse = await signer.sendTransaction(tx);
      log(`Transaction sent: ${txResponse.hash}`);
      log("Waiting for confirmation...");
      await txResponse.wait(1);
      log("✅ Swap confirmed!");
      await fetchBalances();
    } catch (err) {
      log("❌ Swap failed: " + err.message);
    }
  }

  // Event listeners
  connectBtn.addEventListener('click', connectWallet);
  refreshBtn.addEventListener('click', async () => {
    if (connected) await fetchBalances();
    else alert("Connect wallet first");
  });
  forceSwapBtn.addEventListener('click', () => executeSwap(true));
  maxBtn.addEventListener('click', () => {
    const fromToken = tokenFromSelect.value;
    const balance = fromToken === 'USDC' ? parseFloat(usdcBalanceSpan.innerText) : parseFloat(eurcBalanceSpan.innerText);
    if (!isNaN(balance)) amountInput.value = balance;
  });
  tokenFromSelect.addEventListener('change', () => {
    const from = tokenFromSelect.value;
    const to = tokenToSelect.value;
    if (from === to) {
      tokenToSelect.value = from === 'USDC' ? 'EURC' : 'USDC';
    }
    updateReceiveEstimate();
  });
  tokenToSelect.addEventListener('change', () => {
    const from = tokenFromSelect.value;
    const to = tokenToSelect.value;
    if (from === to) {
      tokenFromSelect.value = to === 'USDC' ? 'EURC' : 'USDC';
    }
    updateReceiveEstimate();
  });
  amountInput.addEventListener('input', updateReceiveEstimate);
  slippageSelect.addEventListener('change', updateReceiveEstimate);

  // Also add a normal swap button
  const normalSwapBtn = document.createElement('button');
  normalSwapBtn.innerText = "🔁 Execute Swap (with balance check)";
  normalSwapBtn.style.background = "#10b981";
  normalSwapBtn.addEventListener('click', () => executeSwap(false));
  document.querySelector('.debug-panel').appendChild(normalSwapBtn);

  log("Debugger ready. Click 'Connect Wallet' to start.");
</script>
</body>
</html>
