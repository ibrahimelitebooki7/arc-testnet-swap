<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Nexus Swap · Arc 2026</title>
  <!-- Fonts + Tailwind + Ethers + Lucide -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body {
      background: #020617;
      overflow-x: hidden;
    }
    /* Ambient canvas layer */
    #fluidCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    /* neo-glass 2.0 */
    .neo-glass {
      background: rgba(10, 20, 35, 0.65);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 2rem;
      transition: box-shadow 0.25s ease, border-color 0.2s;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    .neo-glass:hover {
      border-color: rgba(59, 130, 246, 0.6);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(59,130,246,0.2);
    }
    /* breathing glow */
    .breathing-glow {
      animation: softPulse 3s infinite ease-in-out;
    }
    @keyframes softPulse {
      0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.15); }
      50% { box-shadow: 0 0 0 12px rgba(59,130,246,0); }
      100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
    }
    /* morph button progress */
    .morph-progress {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 1.5rem;
      transition: width 0.2s linear;
      z-index: 1;
    }
    /* modal animations */
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      transition: opacity 0.2s;
    }
    .modal-slide {
      animation: slideUpFade 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    @keyframes slideUpFade {
      0% { opacity: 0; transform: translateY(40px) scale(0.96); filter: blur(4px);}
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0);}
    }
    /* skeleton loading */
    .skeleton {
      background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmerMove 1.2s infinite;
    }
    @keyframes shimmerMove {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    /* high contrast mode (simple toggle) */
    .high-contrast {
      filter: contrast(1.2) brightness(1.05);
      background: #000 !important;
    }
    .high-contrast .neo-glass {
      background: #0a0f1f !important;
      border-color: #3b82f6 !important;
    }
    /* utility */
    .disable-tap-highlight { touch-action: manipulation; }
    .token-icon-img { width: 28px; height: 28px; object-fit: contain; }
    .toast-notify {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172fe6;
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      z-index: 200;
      transition: all 0.2s;
      border: 1px solid #334155;
      pointer-events: none;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

  <canvas id="fluidCanvas" class="fixed inset-0 w-full h-full pointer-events-none"></canvas>
  
  <main class="relative z-10 w-full max-w-md mx-auto">
    <div id="swapCard" class="neo-glass p-5 md:p-6 breathing-glow transition-all duration-300">
      <!-- header with wallet 2026 -->
      <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-2">
          <i data-lucide="sparkles" class="w-5 h-5 text-blue-400"></i>
          <span class="text-xl font-black bg-gradient-to-r from-white via-blue-300 to-indigo-400 bg-clip-text text-transparent">Nexus</span>
          <span class="text-[10px] font-mono px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-300">ARC testnet</span>
        </div>
        <div class="relative">
          <button id="walletMainBtn" class="flex items-center gap-2 bg-slate-800/70 hover:bg-slate-700/80 rounded-full px-3 py-1.5 text-sm border border-slate-700 transition">
            <i data-lucide="wallet" class="w-3.5 h-3.5"></i>
            <span id="walletBtnLabel">Connect</span>
          </button>
          <div id="walletDropdown" class="absolute right-0 mt-2 w-56 hidden bg-slate-800/90 backdrop-blur rounded-xl border border-slate-700 shadow-xl z-20">
            <div class="p-2">
              <button id="copyAddressBtn" class="flex items-center gap-2 w-full px-3 py-2 text-sm hover:bg-slate-700 rounded-lg"><i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy address</button>
              <button id="disconnectBtn" class="flex items-center gap-2 w-full px-3 py-2 text-sm hover:bg-slate-700 rounded-lg text-red-300"><i data-lucide="log-out" class="w-3.5 h-3.5"></i> Disconnect</button>
            </div>
          </div>
        </div>
      </div>

      <!-- wallet status row: address + network health -->
      <div class="flex justify-between items-center bg-black/30 rounded-2xl px-3 py-2 mb-5 text-xs">
        <div class="flex items-center gap-2">
          <div id="statusLed" class="w-2 h-2 rounded-full bg-gray-500"></div>
          <span id="walletShort" class="text-slate-300 font-mono">Not connected</span>
        </div>
        <div class="flex gap-2 items-center">
          <i data-lucide="activity" class="w-3 h-3 text-emerald-400"></i>
          <span id="networkHealth" class="text-emerald-300">Arc: --</span>
          <button id="contrastToggle" class="ml-1 p-1 rounded-full hover:bg-slate-700"><i data-lucide="contrast" class="w-3.5 h-3.5"></i></button>
        </div>
      </div>

      <!-- FROM card (swipe down gesture) -->
      <div id="fromCard" class="bg-slate-900/40 rounded-2xl p-4 mb-3 border border-white/5 transition-all">
        <div class="flex justify-between text-xs text-slate-400 mb-1">
          <span>You pay</span>
          <span id="fromBalance" class="font-mono">—</span>
        </div>
        <div class="flex items-center justify-between gap-2">
          <button id="fromTokenBtn" class="flex items-center gap-2 bg-slate-800 rounded-full pl-2 pr-3 py-1.5 text-white font-semibold">
            <i data-lucide="circle-dollar-sign" class="w-4 h-4 text-blue-300"></i> <span id="fromTokenSymbol">USDC</span> <i data-lucide="chevron-down" class="w-3 h-3"></i>
          </button>
          <input type="number" id="amountInput" value="1.0" step="any" class="bg-transparent text-right text-2xl font-medium text-white w-full outline-none">
        </div>
        <div class="flex justify-end mt-1">
          <button id="maxBtn" class="text-[11px] font-semibold px-2 py-0.5 rounded-full bg-slate-700/60 hover:bg-blue-600/50 flex items-center gap-1"><i data-lucide="maximize-2" class="w-2.5 h-2.5"></i> MAX</button>
        </div>
      </div>

      <!-- flip icon (drag + click) -->
      <div class="flex justify-center -my-2 relative z-10">
        <button id="flipBtn" class="bg-slate-800/90 border border-blue-500/40 rounded-full p-2 backdrop-blur hover:bg-slate-700 transition-all shadow-md cursor-grab active:cursor-grabbing">
          <i data-lucide="arrow-down-up" class="w-5 h-5 text-blue-400"></i>
        </button>
      </div>

      <!-- TO card -->
      <div id="toCard" class="bg-slate-900/40 rounded-2xl p-4 mt-1 mb-3">
        <div class="flex justify-between text-xs text-slate-400 mb-1">
          <span>You receive</span>
          <span id="toBalance" class="font-mono">—</span>
        </div>
        <div class="flex items-center justify-between gap-2">
          <button id="toTokenBtn" class="flex items-center gap-2 bg-slate-800 rounded-full pl-2 pr-3 py-1.5 text-white font-semibold">
            <i data-lucide="euro" class="w-4 h-4 text-blue-300"></i> <span id="toTokenSymbol">EURC</span> <i data-lucide="chevron-down" class="w-3 h-3"></i>
          </button>
          <input type="text" id="receiveAmount" readonly disabled class="bg-transparent text-right text-2xl font-medium text-white/70 w-full outline-none">
        </div>
        <div class="flex justify-end mt-1">
          <span id="minReceiveDisplay" class="text-[11px] text-slate-400">min receive: —</span>
        </div>
      </div>

      <!-- Info row + sparkline + slippage + chevron (collapsible advanced) -->
      <div class="flex flex-wrap items-center justify-between gap-2 bg-black/30 rounded-xl px-3 py-2 mb-2 text-xs">
        <div class="flex items-center gap-1"><i data-lucide="fuel" class="w-3 h-3"></i> <span id="gasEstimate">~0.0002 USDC</span></div>
        <div class="flex items-center gap-2">
          <i data-lucide="refresh-cw" class="w-3 h-3"></i>
          <span id="rateText" class="font-medium">1 USDC ≈ 0.978 EURC</span>
          <canvas id="sparkCanvas" width="80" height="24" class="rounded-md bg-black/30" style="width:80px; height:24px"></canvas>
        </div>
        <button id="slippageTrigger" class="flex items-center gap-1 bg-slate-800/60 rounded-full px-2 py-0.5"><i data-lucide="gauge" class="w-3 h-3"></i> <span id="slippageLabel">Auto</span> <i data-lucide="chevron-down" class="w-2.5 h-2.5"></i></button>
      </div>
      <!-- Advanced collapsible panel -->
      <div id="advancedPanel" class="hidden mt-2 p-3 bg-black/40 rounded-xl text-xs space-y-3 border border-white/10">
        <div class="flex justify-between items-center">
          <span class="flex items-center gap-1"><i data-lucide="shield-check"></i> MEV protection</span>
          <label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="mevToggle" class="sr-only peer"><div class="w-8 h-4 bg-slate-700 rounded-full peer-checked:bg-blue-600 after:absolute after:top-[2px] after:left-[2px] after:w-3 after:h-3 after:rounded-full after:bg-white after:transition-all peer-checked:after:translate-x-4"></div></label>
        </div>
        <div><span class="flex items-center gap-1"><i data-lucide="sliders"></i> Custom slippage (%)</span><input id="customSlippage" type="number" step="0.1" class="w-full mt-1 bg-slate-800 rounded-lg px-2 py-1 text-white" placeholder="0.2" value="0.2"></div>
        <div><span>Gasometer</span><div class="w-full h-1.5 bg-slate-700 rounded-full mt-1"><div id="gasBar" class="h-full w-3/4 bg-emerald-400 rounded-full"></div></div><span class="text-[10px] text-slate-400">~ 12 gwei · low</span></div>
      </div>
      <button id="advancedToggle" class="text-[10px] text-slate-400 flex items-center justify-center w-full mt-1 gap-1"><i data-lucide="chevron-down" class="w-3 h-3"></i> Advanced</button>

      <!-- morphing swap button -->
      <button id="swapMainBtn" disabled class="relative w-full overflow-hidden mt-3 bg-gradient-to-r from-blue-600 to-indigo-600 disabled:opacity-60 disabled:from-slate-600 disabled:to-slate-700 rounded-2xl py-3.5 font-bold text-white text-sm transition-all">
        <div id="morphProgressBar" class="morph-progress"></div>
        <span id="swapBtnContent" class="relative z-10 flex items-center justify-center gap-2"><i data-lucide="wand-2" class="w-4 h-4"></i> Swap tokens</span>
      </button>
      
      <div id="toastContainer" class="toast-notify hidden"></div>
      <!-- AI sparkles tooltip chip -->
      <div id="aiTip" class="hidden absolute bottom-20 left-4 bg-slate-800/90 backdrop-blur rounded-xl p-2 text-xs max-w-xs z-30 border border-blue-500/40 shadow-xl"></div>
    </div>
  </main>

  <script>
    // ---------- MOCK DATA & STATE ----------
    const ARC_CHAIN_ID = 5042002;
    const RATES = { USDC_EURC: 0.978, EURC_USDC: 1.023 };
    let userBalances = { USDC: 247.5, EURC: 134.2 };
    let fromToken = 'USDC', toToken = 'EURC';
    let connected = false, userAddress = null, provider = null;
    let currentSlippageMode = 'auto'; // 'auto' or custom number
    let currentSlippageValue = 0.2; // percent for auto
    let isProcessing = false;
    let lastSwapAmount = 1.0;
    let priceImpactPct = 0.05;
    let sparkData = Array(20).fill(0).map((_,i)=> 0.978 + Math.sin(i*0.5)*0.003);
    let sparkInterval;
    
    // DOM elements
    const fromTokenBtn = document.getElementById('fromTokenBtn'), toTokenBtn = document.getElementById('toTokenBtn');
    const fromTokenSymbol = document.getElementById('fromTokenSymbol'), toTokenSymbol = document.getElementById('toTokenSymbol');
    const amountInput = document.getElementById('amountInput'), receiveAmount = document.getElementById('receiveAmount');
    const fromBalanceSpan = document.getElementById('fromBalance'), toBalanceSpan = document.getElementById('toBalance');
    const minReceiveSpan = document.getElementById('minReceiveDisplay');
    const rateSpan = document.getElementById('rateText');
    const swapBtn = document.getElementById('swapMainBtn'), swapContentSpan = document.getElementById('swapBtnContent');
    const morphBar = document.getElementById('morphProgressBar');
    const slippageTrigger = document.getElementById('slippageTrigger'), slippageLabelSpan = document.getElementById('slippageLabel');
    const advancedToggle = document.getElementById('advancedToggle'), advancedPanel = document.getElementById('advancedPanel');
    const customSlippageInput = document.getElementById('customSlippage');
    const mevToggle = document.getElementById('mevToggle');
    const walletBtn = document.getElementById('walletMainBtn'), walletDropdown = document.getElementById('walletDropdown');
    const walletShortSpan = document.getElementById('walletShort'), statusLed = document.getElementById('statusLed');
    const networkHealthSpan = document.getElementById('networkHealth');
    const copyBtn = document.getElementById('copyAddressBtn'), disconnectBtn = document.getElementById('disconnectBtn');
    const contrastToggle = document.getElementById('contrastToggle');
    const maxBtn = document.getElementById('maxBtn'), flipBtn = document.getElementById('flipBtn');
    const fromCard = document.getElementById('fromCard'), aiTipDiv = document.getElementById('aiTip');
    
    // Helper: show toast
    function showToast(msg, type='info') {
      const toast = document.getElementById('toastContainer');
      toast.innerHTML = `<i data-lucide="${type==='error'?'alert-circle':'info'}" class="w-3.5 h-3.5 inline mr-1"></i> ${msg}`;
      toast.classList.remove('hidden');
      lucide.createIcons();
      setTimeout(() => toast.classList.add('hidden'), 2800);
    }
    function setMessage(msg, isErr=false) { showToast(msg, isErr?'error':'info'); }
    
    // Refresh quote, min receive, balances, rate
    function updateQuoteAndUI() {
      if (!connected) { receiveAmount.value = ''; minReceiveSpan.innerText = '—'; return; }
      const amount = parseFloat(amountInput.value) || 0;
      let rate = fromToken === 'USDC' ? RATES.USDC_EURC : RATES.EURC_USDC;
      let outAmount = amount * rate;
      const slippage = currentSlippageMode === 'auto' ? 0.2 : parseFloat(currentSlippageValue);
      const minReceive = outAmount * (1 - slippage/100);
      receiveAmount.value = outAmount.toFixed(6);
      minReceiveSpan.innerText = `min receive: ${minReceive.toFixed(6)} ${toToken}`;
      rateSpan.innerText = `1 ${fromToken} ≈ ${rate.toFixed(4)} ${toToken}`;
      // price impact mock (0.03% to 0.25%)
      priceImpactPct = Math.min(0.5, amount * 0.002);
      document.getElementById('gasBar')?.setAttribute('style', `width: ${Math.min(100, 30+amount*2)}%`);
      validateSwap();
      updateBalanceUI();
      updateSparkline();
    }
    
    function updateBalanceUI() {
      if(!connected) { fromBalanceSpan.innerText = '—'; toBalanceSpan.innerText = '—'; return; }
      fromBalanceSpan.innerText = `${userBalances[fromToken]?.toFixed(4)} ${fromToken}`;
      toBalanceSpan.innerText = `${userBalances[toToken]?.toFixed(4)} ${toToken}`;
    }
    function validateSwap() {
      if(!connected || isProcessing) { swapBtn.disabled = true; return; }
      const amount = parseFloat(amountInput.value);
      if(isNaN(amount) || amount<=0 || amount > (userBalances[fromToken]||0)) swapBtn.disabled = true;
      else swapBtn.disabled = false;
    }
    // Token selector modal (Smart Token Selector)
    function openTokenSelector(side) {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 z-50 flex items-end md:items-center justify-center p-4';
      modal.innerHTML = `<div class="modal-backdrop absolute inset-0" onclick="this.parentElement.remove()"></div>
        <div class="relative bg-slate-900/95 backdrop-blur-xl w-full max-w-md rounded-2xl p-5 modal-slide border border-blue-500/30">
          <div class="flex justify-between items-center mb-3"><h3 class="font-bold text-white">Select token</h3><i data-lucide="x" class="w-5 h-5 text-slate-400 close-modal"></i></div>
          <input id="tokenSearch" placeholder="Search name" class="w-full bg-slate-800 rounded-xl px-4 py-2 text-white mb-3">
          <div class="flex gap-2 border-b border-slate-700 pb-1 mb-2"><button class="tab-btn active text-blue-400" data-tab="your">Your tokens</button><button class="tab-btn" data-tab="popular">Popular</button><button class="tab-btn" data-tab="recent">Recent</button></div>
          <div id="tokenListContainer" class="max-h-96 overflow-y-auto space-y-2"></div>
        </div>`;
      document.body.appendChild(modal);
      lucide.createIcons();
      const closeBtn = modal.querySelector('.close-modal');
      closeBtn?.addEventListener('click', () => modal.remove());
      const renderTokens = (filter='') => {
        const tokens = [{sym:'USDC', icon:'circle-dollar-sign', bal:userBalances.USDC, fiat:'$247.50'},{sym:'EURC', icon:'euro', bal:userBalances.EURC, fiat:'€134.20'}];
        const filtered = tokens.filter(t=>t.sym.toLowerCase().includes(filter.toLowerCase()));
        const container = modal.querySelector('#tokenListContainer');
        container.innerHTML = filtered.map(t => `<div class="token-option flex justify-between items-center p-3 hover:bg-slate-800 rounded-xl cursor-pointer transition" data-symbol="${t.sym}"><div class="flex items-center gap-2"><i data-lucide="${t.icon}" class="w-6 h-6 text-blue-300"></i><span class="font-semibold">${t.sym}</span><span class="text-xs text-slate-400">${t.bal?.toFixed(2)}</span></div><span class="text-xs text-slate-400">${t.fiat}</span></div>`).join('');
        lucide.createIcons();
        document.querySelectorAll('.token-option').forEach(el => {
          el.addEventListener('click', () => {
            const sym = el.dataset.symbol;
            if(side === 'from') { fromToken = sym; fromTokenSymbol.innerText = sym; fromTokenBtn.querySelector('i').setAttribute('data-lucide', sym==='USDC'?'circle-dollar-sign':'euro'); }
            else { toToken = sym; toTokenSymbol.innerText = sym; toTokenBtn.querySelector('i').setAttribute('data-lucide', sym==='USDC'?'circle-dollar-sign':'euro'); }
            lucide.createIcons(); updateQuoteAndUI(); modal.remove();
            localStorage.setItem('lastFromToken', fromToken); localStorage.setItem('lastToToken', toToken);
          });
        });
      };
      renderTokens();
      modal.querySelector('#tokenSearch').addEventListener('input', e=> renderTokens(e.target.value));
      modal.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click',()=>{}));
    }
    fromTokenBtn.addEventListener('click', () => openTokenSelector('from'));
    toTokenBtn.addEventListener('click', () => openTokenSelector('to'));
    
    // Slippage popup + auto mode
    slippageTrigger.addEventListener('click', (e) => {
      const popup = document.createElement('div');
      popup.className = 'absolute bg-slate-800 border border-slate-700 rounded-xl p-2 w-40 z-40 shadow-xl';
      popup.innerHTML = `<div class="space-y-1"><button data-slippage="auto" class="w-full text-left px-3 py-1.5 hover:bg-slate-700 rounded-lg">🤖 Auto (0.2%)</button><button data-slippage="0.1" class="w-full text-left px-3 py-1.5 hover:bg-slate-700 rounded-lg">0.1%</button><button data-slippage="0.5" class="w-full text-left px-3 py-1.5 hover:bg-slate-700 rounded-lg">0.5%</button><button data-slippage="1.0" class="w-full text-left px-3 py-1.5 hover:bg-slate-700 rounded-lg">1.0%</button></div>`;
      document.body.appendChild(popup);
      const rect = slippageTrigger.getBoundingClientRect();
      popup.style.top = `${rect.bottom + 5}px`; popup.style.left = `${rect.left}px`;
      popup.querySelectorAll('[data-slippage]').forEach(btn => {
        btn.addEventListener('click', () => {
          const val = btn.dataset.slippage;
          if(val === 'auto') { currentSlippageMode = 'auto'; currentSlippageValue = 0.2; slippageLabelSpan.innerText = 'Auto'; }
          else { currentSlippageMode = 'custom'; currentSlippageValue = parseFloat(val); slippageLabelSpan.innerText = `${val}%`; }
          updateQuoteAndUI(); popup.remove();
        });
      });
      setTimeout(() => popup.remove(), 4000);
    });
    
    // Morphing swap + haptic + mock swap
    async function doSwap() {
      if(!connected || isProcessing) return;
      const amount = parseFloat(amountInput.value);
      if(amount > userBalances[fromToken]) { showToast(`Insufficient ${fromToken}`, 'error'); return; }
      isProcessing = true; swapBtn.disabled = true;
      const rate = fromToken==='USDC' ? RATES.USDC_EURC : RATES.EURC_USDC;
      const outVal = amount*rate;
      const minOut = outVal * (1 - (currentSlippageMode==='auto'?0.2:currentSlippageValue)/100);
      // morph progress animation
      morphBar.style.width = '0%';
      let width=0; const interval = setInterval(()=>{ width+=8; morphBar.style.width = `${width}%`; if(width>=70) clearInterval(interval); }, 30);
      swapContentSpan.innerHTML = '<i data-lucide="loader-2" class="animate-spin w-4 h-4"></i> confirming...';
      lucide.createIcons();
      await new Promise(r=>setTimeout(r, 800));
      clearInterval(interval); morphBar.style.width = '100%';
      swapContentSpan.innerHTML = '<i data-lucide="wallet" class="w-4 h-4"></i> Confirm in wallet';
      await new Promise(r=>setTimeout(r, 1100));
      // mock tx
      userBalances[fromToken] -= amount;
      userBalances[toToken] += outVal;
      userBalances[fromToken] = parseFloat(userBalances[fromToken].toFixed(6));
      userBalances[toToken] = parseFloat(userBalances[toToken].toFixed(6));
      updateBalanceUI(); updateQuoteAndUI();
      if(navigator.vibrate) navigator.vibrate(50);
      swapContentSpan.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-400"></i> Success!';
      lucide.createIcons();
      setTimeout(()=>{ morphBar.style.width = '0%'; swapContentSpan.innerHTML = '<i data-lucide="wand-2" class="w-4 h-4"></i> Swap tokens'; lucide.createIcons(); isProcessing=false; validateSwap(); }, 1500);
      lastSwapAmount = amount;
      showToast(`Swapped ${amount} ${fromToken} → ${outVal.toFixed(4)} ${toToken}`, 'info');
    }
    swapBtn.addEventListener('click', doSwap);
    
    // Wallet connection with persist & copy & disconnect
    async function connectWallet() {
      if(!window.ethereum) { showToast('Install MetaMask', 'error'); return; }
      try {
        const accounts = await window.ethereum.request({method:'eth_requestAccounts'});
        userAddress = accounts[0];
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await window.ethereum.request({method:'wallet_switchEthereumChain', params:[{chainId:`0x${ARC_CHAIN_ID.toString(16)}`}]});
        connected = true;
        walletShortSpan.innerText = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
        statusLed.className = 'w-2 h-2 rounded-full bg-emerald-400 shadow-md';
        networkHealthSpan.innerText = 'Arc: 2.1s';
        document.getElementById('walletBtnLabel').innerText = '⚡ Connected';
        localStorage.setItem('nexusWalletConnected', userAddress);
        updateBalanceUI(); updateQuoteAndUI(); validateSwap();
        showToast('Wallet connected + Arc testnet', 'info');
      } catch(e) { showToast(e.message, 'error'); }
    }
    walletBtn.addEventListener('click', () => { if(!connected) connectWallet(); else walletDropdown.classList.toggle('hidden'); });
    copyBtn?.addEventListener('click', () => { if(userAddress) { navigator.clipboard.writeText(userAddress); showToast('Address copied'); } });
    disconnectBtn?.addEventListener('click', () => { connected=false; userAddress=null; walletShortSpan.innerText='Not connected'; statusLed.className='w-2 h-2 rounded-full bg-gray-500'; document.getElementById('walletBtnLabel').innerText='Connect'; localStorage.removeItem('nexusWalletConnected'); fromBalanceSpan.innerText='—'; toBalanceSpan.innerText='—'; receiveAmount.value=''; validateSwap(); showToast('Disconnected'); walletDropdown.classList.add('hidden'); });
    if(localStorage.getItem('nexusWalletConnected')) setTimeout(connectWallet, 200);
    
    // Flip + drag gesture
    flipBtn.addEventListener('click', () => { let tmp=fromToken; fromToken=toToken; toToken=tmp; fromTokenSymbol.innerText=fromToken; toTokenSymbol.innerText=toToken; updateQuoteAndUI(); });
    let dragStartY=0; flipBtn.addEventListener('mousedown', (e)=>{ dragStartY=e.clientY; });
    window.addEventListener('mousemove', (e)=>{ if(dragStartY && Math.abs(e.clientY-dragStartY)>30) { flipBtn.click(); dragStartY=0; } });
    window.addEventListener('mouseup',()=>dragStartY=0);
    // Swipe down on From card
    let touchStart=0; fromCard.addEventListener('touchstart', e=>{ touchStart=e.touches[0].clientY; });
    fromCard.addEventListener('touchmove', e=>{ if(touchStart && e.touches[0].clientY - touchStart > 40) { amountInput.value=''; updateQuoteAndUI(); touchStart=0; showToast('Amount cleared'); } });
    // Long press quick swap
    let pressTimer; swapBtn.addEventListener('mousedown',()=>{ pressTimer=setTimeout(()=>{ if(connected && !isProcessing && lastSwapAmount) { amountInput.value=lastSwapAmount; updateQuoteAndUI(); showToast('Quick swap loaded'); } }, 500); });
    window.addEventListener('mouseup',()=>clearTimeout(pressTimer));
    
    // Sparkline & real-time mock
    function updateSparkline() { let newVal = RATES[fromToken==='USDC'?'USDC_EURC':'EURC_USDC'] + (Math.random()-0.5)*0.002; sparkData.push(newVal); if(sparkData.length>20) sparkData.shift(); drawSpark(); }
    function drawSpark() { const canvas = document.getElementById('sparkCanvas'); const ctx = canvas.getContext('2d'); const w=canvas.width=80, h=canvas.height=24; ctx.clearRect(0,0,w,h); ctx.beginPath(); let xStep=w/(sparkData.length-1); ctx.strokeStyle='#3b82f6'; ctx.lineWidth=1.5; sparkData.forEach((val,i)=>{ let y = h - (val-0.97)*h*3; if(i===0) ctx.moveTo(i*xStep, y); else ctx.lineTo(i*xStep, y); }); ctx.stroke(); }
    setInterval(()=>{ if(connected) updateSparkline(); }, 3000);
    
    // Advanced toggle
    advancedToggle.addEventListener('click', ()=> advancedPanel.classList.toggle('hidden'));
    customSlippageInput.addEventListener('change', ()=>{ currentSlippageMode='custom'; currentSlippageValue=parseFloat(customSlippageInput.value); slippageLabelSpan.innerText=`${currentSlippageValue}%`; updateQuoteAndUI(); });
    
    // AI Copilot + localstorage
    const aiSparkles = document.createElement('i'); aiSparkles.setAttribute('data-lucide','sparkles'); aiSparkles.classList.add('w-4','h-4','ml-2','cursor-pointer','text-purple-300');
    document.querySelector('.flex.justify-between.items-center.mb-4 .flex.items-center.gap-2').appendChild(aiSparkles);
    lucide.createIcons();
    aiSparkles.addEventListener('click', (e) => { aiTipDiv.classList.toggle('hidden'); aiTipDiv.innerHTML = `<div class="p-2"><i data-lucide="message-circle" class="w-3.5 inline mr-1"></i> AI Insight: You swapped ${fromToken}→${toToken} recently. Best rate ${RATES[fromToken==='USDC'?'USDC_EURC':'EURC_USDC']}. Gas is cheap.<br/>✨ Consider splitting for low slippage.</div>`; lucide.createIcons(); setTimeout(()=>aiTipDiv.classList.add('hidden'), 4000); });
    if(localStorage.getItem('lastFromToken')) { fromToken=localStorage.getItem('lastFromToken'); toToken=localStorage.getItem('lastToToken'); fromTokenSymbol.innerText=fromToken; toTokenSymbol.innerText=toToken; }
    window.addEventListener('beforeunload',()=>{ localStorage.setItem('lastFromToken', fromToken); localStorage.setItem('lastToToken', toToken); localStorage.setItem('lastSlippageMode', currentSlippageMode); });
    
    // Contrast toggle
    contrastToggle.addEventListener('click',()=>document.body.classList.toggle('high-contrast'));
    maxBtn.addEventListener('click',()=>{ if(connected) { amountInput.value = userBalances[fromToken]; updateQuoteAndUI(); } });
    setInterval(()=> { if(connected) updateBalanceUI(); }, 1000);
    lucide.createIcons(); updateQuoteAndUI(); drawSpark();
  </script>
</body>
</html>
