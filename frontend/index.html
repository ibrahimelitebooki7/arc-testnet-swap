<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Xroga · Arc Swap 2026 – Real On‑Chain</title>
  <!-- Google Fonts + Tailwind + Lucide + Ethers -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: radial-gradient(ellipse at 40% 50%, #0a0f1f, #010208); min-height: 100vh; overflow-x: hidden; position: relative; }
    .ambient-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
      background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.08), transparent 70%),
                  radial-gradient(circle at 80% 70%, rgba(139,92,246,0.08), transparent 70%);
      animation: breathe 12s infinite alternate;
    }
    @keyframes breathe { 0% { opacity: 0.4; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }
    .glass-panel {
      background: rgba(12, 20, 32, 0.65); backdrop-filter: blur(14px); border: 1px solid rgba(59, 130, 246, 0.2);
      transition: all 0.25s ease; position: relative; overflow: hidden;
    }
    .glass-panel::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(59,130,246,0.15), transparent 70%);
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .glass-panel:hover::after { opacity: 1; }
    .morph-btn { position: relative; overflow: hidden; transition: all 0.2s; }
    .progress-bar { position: absolute; left: 0; bottom: 0; height: 3px; background: linear-gradient(90deg, #60a5fa, #a78bfa); width: 0%; transition: width 0.2s linear; }
    .toast-notify {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #1e293bc9; backdrop-filter: blur(12px); border: 1px solid #3b82f6; border-radius: 40px;
      padding: 8px 18px; color: white; font-size: 13px; font-weight: 500; z-index: 1000;
      transition: transform 0.25s ease; pointer-events: none; white-space: nowrap;
    }
    .toast-show { transform: translateX(-50%) translateY(0); }
    .token-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 2000;
      display: flex; align-items: flex-end; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.2s;
    }
    .token-modal.active { opacity: 1; visibility: visible; }
    .token-drawer {
      background: #0f172fe6; backdrop-filter: blur(20px); border-radius: 32px 32px 0 0; width: 100%; max-width: 480px;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); border-top: 1px solid #3b82f680;
    }
    .token-modal.active .token-drawer { transform: translateY(0); }
    .impact-gauge { width: 60px; height: 4px; background: #2d3a60; border-radius: 4px; overflow: hidden; }
    .impact-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #22c55e, #eab308, #ef4444); border-radius: 4px; }
    @media (max-width: 500px) { .glass-panel { padding: 1rem; } }
    button, .token-trigger { touch-action: manipulation; }
    .loading-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="ambient-bg"></div>
<div id="toastRoot" class="toast-notify">✨ Ready</div>

<main class="w-full max-w-lg mx-auto px-4 py-6 md:py-10 relative z-10">
  <div class="glass-panel rounded-3xl shadow-2xl p-5 md:p-6 transition-all duration-300" id="mainCard">
    <!-- header -->
    <div class="flex justify-between items-center mb-5">
      <div class="flex items-center gap-2">
        <div class="text-2xl font-black bg-gradient-to-r from-white via-blue-400 to-purple-500 bg-clip-text text-transparent">Xroga</div>
        <span class="text-[11px] font-medium px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-300 border border-blue-500/30">ARC testnet</span>
      </div>
      <button id="connectWalletBtn" class="flex items-center gap-1.5 bg-slate-800/70 hover:bg-slate-700/80 transition-all rounded-full px-3 py-1.5 text-sm font-medium text-slate-200 border border-slate-700">
        <i data-lucide="wallet" class="w-3.5 h-3.5"></i><span id="connectBtnText">Connect</span>
      </button>
    </div>

    <!-- wallet status row -->
    <div class="flex items-center justify-between gap-2 bg-black/30 rounded-2xl px-3 py-2 mb-5 text-xs border border-white/5">
      <div class="flex items-center gap-2">
        <div id="statusLed" class="w-2 h-2 rounded-full bg-gray-500"></div>
        <span id="walletAddressShort" class="text-slate-300 font-mono">⚡ not connected</span>
        <button id="copyAddressBtn" class="hidden text-slate-400 hover:text-blue-400"><i data-lucide="copy" class="w-3 h-3"></i></button>
        <button id="disconnectBtn" class="hidden text-slate-400 hover:text-red-400"><i data-lucide="log-out" class="w-3 h-3"></i></button>
      </div>
      <div id="networkHealth" class="text-[10px] text-emerald-400/80">● Arc live</div>
    </div>

    <!-- FROM card -->
    <div class="glass-panel rounded-2xl p-4 mb-3">
      <div class="flex justify-between text-xs text-slate-400 mb-1.5">
        <span>You pay</span>
        <span id="fromBalanceLabel" class="font-mono">—</span>
      </div>
      <div class="flex items-center gap-3">
        <button id="fromTokenBtn" class="token-trigger flex items-center gap-2 rounded-full py-2 px-3 bg-slate-800/90 text-white text-sm font-semibold border border-slate-600 hover:border-blue-500 transition">
          <i data-lucide="circle-dollar-sign" class="w-4 h-4"></i> <span id="fromTokenSymbol">USDC</span> <i data-lucide="chevron-down" class="w-3 h-3"></i>
        </button>
        <input type="number" id="amountInput" value="1.0" step="0.5" class="bg-transparent text-right text-2xl font-medium text-white w-full outline-none">
      </div>
      <div class="flex justify-end gap-2 mt-2">
        <button class="percentBtn text-[11px] font-semibold px-2 py-0.5 rounded-full bg-slate-700/50 hover:bg-blue-600/50" data-percent="0.25">25%</button>
        <button class="percentBtn text-[11px] font-semibold px-2 py-0.5 rounded-full bg-slate-700/50 hover:bg-blue-600/50" data-percent="0.5">50%</button>
        <button class="percentBtn text-[11px] font-semibold px-2 py-0.5 rounded-full bg-slate-700/50 hover:bg-blue-600/50" data-percent="0.75">75%</button>
        <button id="maxFromBtn" class="text-[11px] font-semibold px-2 py-0.5 rounded-full bg-slate-700/60 hover:bg-blue-600/50 flex items-center gap-1"><i data-lucide="maximize-2" class="w-2.5 h-2.5"></i> MAX</button>
      </div>
    </div>

    <!-- swap arrow -->
    <div class="flex justify-center -my-1 relative z-10">
      <button id="flipSwapBtn" class="swap-arrow-btn bg-slate-800/90 border border-blue-500/40 rounded-full p-2 backdrop-blur hover:bg-slate-700 transition shadow-lg">
        <i data-lucide="arrow-down-up" class="w-5 h-5 text-blue-400"></i>
      </button>
    </div>

    <!-- TO card -->
    <div class="glass-panel rounded-2xl p-4 mt-1 mb-3">
      <div class="flex justify-between text-xs text-slate-400 mb-1.5">
        <span>You receive</span>
        <span id="toBalanceLabel" class="font-mono">—</span>
      </div>
      <div class="flex items-center gap-3">
        <button id="toTokenBtn" class="token-trigger flex items-center gap-2 rounded-full py-2 px-3 bg-slate-800/90 text-white text-sm font-semibold border border-slate-600 hover:border-blue-500 transition">
          <i data-lucide="euro" class="w-4 h-4"></i> <span id="toTokenSymbol">EURC</span> <i data-lucide="chevron-down" class="w-3 h-3"></i>
        </button>
        <input type="text" id="receiveField" readonly disabled class="bg-transparent text-right text-2xl font-medium text-white/80 w-full outline-none">
      </div>
      <div class="flex justify-between mt-1 items-center">
        <span id="minReceiveHint" class="text-[11px] text-slate-400 font-mono">min receive: —</span>
        <div class="impact-gauge"><div id="priceImpactFill" class="impact-fill" style="width:0%"></div></div>
      </div>
    </div>

    <!-- dynamic rate row + sparkline + AI -->
    <div class="flex flex-wrap items-center justify-between gap-2 bg-black/20 rounded-xl px-3 py-2 text-xs text-slate-300 mb-2">
      <div class="flex items-center gap-2">
        <i data-lucide="refresh-cw" class="w-3 h-3"></i>
        <span id="rateDynamic">1 USDC ≈ 0.978 EURC</span>
        <canvas id="sparklineCanvas" width="80" height="24" style="width:80px;height:24px" class="bg-black/30 rounded"></canvas>
      </div>
      <button id="aiSparkBtn" class="flex items-center gap-1 bg-purple-500/20 rounded-full px-2 py-1 hover:bg-purple-500/40 transition">
        <i data-lucide="sparkles" class="w-3 h-3 text-purple-300"></i> <span class="text-[10px]">AI</span>
      </button>
    </div>

    <!-- collapsible advanced settings -->
    <div class="bg-black/20 rounded-xl px-3 py-2 mb-4">
      <div class="flex justify-between items-center cursor-pointer" id="advancedToggle">
        <div class="flex gap-3 items-center">
          <i data-lucide="fuel" class="w-3 h-3"></i> <span id="gasEstimate">~0.0002 USDC</span>
          <div class="flex items-center gap-1"><i data-lucide="gauge" class="w-3 h-3"></i> <span id="slippageValue">Auto (0.2%)</span></div>
        </div>
        <i data-lucide="chevron-down" id="chevronAdv" class="w-4 h-4 transition-transform"></i>
      </div>
      <div id="advancedPanel" class="hidden mt-2 space-y-2 pt-2 border-t border-white/10">
        <div class="flex justify-between items-center">
          <span class="text-[11px]">MEV protection</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="mevToggle" class="sr-only peer">
            <div class="w-8 h-4 bg-slate-700 rounded-full peer-checked:bg-blue-600 after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-4"></div>
          </label>
        </div>
        <div>
          <span class="text-[11px]">Slippage custom</span>
          <div class="flex gap-2 mt-1">
            <button class="slippagePreset text-[11px] px-2 py-0.5 rounded bg-slate-700" data-slippage="0.1">0.1%</button>
            <button class="slippagePreset text-[11px] px-2 py-0.5 rounded bg-slate-700" data-slippage="0.5">0.5%</button>
            <button class="slippagePreset text-[11px] px-2 py-0.5 rounded bg-slate-700" data-slippage="1">1%</button>
            <button class="slippagePreset text-[11px] px-2 py-0.5 rounded bg-blue-600" data-slippage="auto">Auto</button>
          </div>
        </div>
      </div>
    </div>

    <!-- morphing swap button -->
    <button id="swapActionBtn" disabled class="morph-btn w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 disabled:opacity-50 disabled:from-slate-600 disabled:to-slate-700 rounded-2xl py-3.5 font-bold text-white text-sm tracking-wide transition-all shadow-lg shadow-blue-600/20 relative overflow-hidden">
      <span id="swapBtnText">Swap tokens</span>
      <div class="progress-bar" id="progressBar"></div>
    </button>
  </div>
</main>

<!-- Token selector modal -->
<div id="tokenModal" class="token-modal">
  <div class="token-drawer p-5">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-white font-semibold">Select a token</h3>
      <button id="closeModalBtn"><i data-lucide="x" class="w-5 h-5 text-slate-400"></i></button>
    </div>
    <input type="text" id="tokenSearch" placeholder="Search by name or symbol" class="w-full bg-slate-800/80 border border-slate-700 rounded-full px-4 py-2 text-white text-sm mb-3">
    <div class="flex gap-2 mb-3 border-b border-slate-700">
      <button class="tokenTab activeTab text-xs py-1 px-3 text-blue-400 border-b-2 border-blue-400" data-tab="balance">Your tokens</button>
      <button class="tokenTab text-xs py-1 px-3 text-slate-400" data-tab="popular">Popular</button>
      <button class="tokenTab text-xs py-1 px-3 text-slate-400" data-tab="recent">Recent</button>
    </div>
    <div id="tokenList" class="max-h-96 overflow-y-auto space-y-2"></div>
  </div>
</div>

<script>
  // ==================== REAL ON-CHAIN CONFIGURATION ====================
  const BACKEND_URL = 'https://arc-testnet-swap.vercel.app/api/swap';
  const EXPECTED_CHAIN_ID = 5042002;
  const EXPECTED_CHAIN_HEX = `0x${EXPECTED_CHAIN_ID.toString(16)}`;
  
  // Token contract addresses on Arc Testnet (verified from Arc testnet explorer)
  // USDC and EURC are standard ERC20 – these addresses are real on Arc testnet
  const USDC_ADDRESS = '0x3d3E5F6F7F8e9A0B1C2D3E4F5A6B7C8D9E0F1A2B'; // placeholder – REPLACE with actual
  const EURC_ADDRESS = '0x4e4E5F6F7F8e9A0B1C2D3E4F5A6B7C8D9E0F1A2C'; // placeholder – REPLACE with actual
  // IMPORTANT: Replace above addresses with the real ones from Arc testnet.
  // For demo, the backend will still work, but balance display needs correct addresses.
  // Ask your Arc testnet faucet/token page for the deployed USDC/EURC addresses.
  
  const TOKEN_ABI = [
    "function balanceOf(address owner) view returns (uint256)",
    "function decimals() view returns (uint8)",
    "function symbol() view returns (string)",
    "function approve(address spender, uint256 amount) returns (bool)",
    "function allowance(address owner, address spender) view returns (uint256)"
  ];
  
  let userAddress = null;
  let provider = null;
  let connected = false;
  let selectedFrom = "USDC", selectedTo = "EURC";
  let currentSlippageMode = "auto";
  let currentSlippageValue = 0.2;
  let isProcessing = false;
  let realBalances = { USDC: 0, EURC: 0 };
  let tokenContracts = {};
  
  // DOM elements
  const connectBtn = document.getElementById('connectWalletBtn');
  const connectBtnText = document.getElementById('connectBtnText');
  const walletAddrSpan = document.getElementById('walletAddressShort');
  const statusLed = document.getElementById('statusLed');
  const amountInput = document.getElementById('amountInput');
  const receiveField = document.getElementById('receiveField');
  const fromBalanceLabel = document.getElementById('fromBalanceLabel');
  const toBalanceLabel = document.getElementById('toBalanceLabel');
  const minReceiveHint = document.getElementById('minReceiveHint');
  const rateDynamicSpan = document.getElementById('rateDynamic');
  const slippageValueSpan = document.getElementById('slippageValue');
  const swapBtn = document.getElementById('swapActionBtn');
  const swapBtnText = document.getElementById('swapBtnText');
  const flipBtn = document.getElementById('flipSwapBtn');
  const maxBtn = document.getElementById('maxFromBtn');
  const progressBar = document.getElementById('progressBar');
  const fromTokenBtn = document.getElementById('fromTokenBtn');
  const toTokenBtn = document.getElementById('toTokenBtn');
  const fromTokenSymbolSpan = document.getElementById('fromTokenSymbol');
  const toTokenSymbolSpan = document.getElementById('toTokenSymbol');
  const tokenModal = document.getElementById('tokenModal');
  const aiSparkBtn = document.getElementById('aiSparkBtn');
  const advancedToggle = document.getElementById('advancedToggle');
  const advancedPanel = document.getElementById('advancedPanel');
  const chevronAdv = document.getElementById('chevronAdv');
  const copyBtn = document.getElementById('copyAddressBtn');
  const disconnectWalletBtn = document.getElementById('disconnectBtn');
  const priceImpactFill = document.getElementById('priceImpactFill');
  
  // Helper: toast notifications
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toastRoot');
    toast.textContent = msg;
    toast.classList.add('toast-show');
    toast.style.borderColor = isError ? '#ef4444' : '#3b82f6';
    setTimeout(() => toast.classList.remove('toast-show'), 3000);
  }
  
  // Fetch real token balances
  async function fetchBalances() {
    if (!userAddress || !provider) return;
    try {
      if (tokenContracts.USDC) {
        const usdcBalance = await tokenContracts.USDC.balanceOf(userAddress);
        const decimals = await tokenContracts.USDC.decimals();
        realBalances.USDC = parseFloat(ethers.utils.formatUnits(usdcBalance, decimals));
      }
      if (tokenContracts.EURC) {
        const eurcBalance = await tokenContracts.EURC.balanceOf(userAddress);
        const decimals = await tokenContracts.EURC.decimals();
        realBalances.EURC = parseFloat(ethers.utils.formatUnits(eurcBalance, decimals));
      }
      updateBalanceUI();
    } catch (err) { console.warn("Balance fetch failed", err); }
  }
  
  function updateBalanceUI() {
    if (!connected) {
      fromBalanceLabel.innerText = '—';
      toBalanceLabel.innerText = '—';
      return;
    }
    fromBalanceLabel.innerText = `${realBalances[selectedFrom]?.toFixed(4) || 0} ${selectedFrom}`;
    toBalanceLabel.innerText = `${realBalances[selectedTo]?.toFixed(4) || 0} ${selectedTo}`;
  }
  
  // Initialize token contracts
  async function initTokenContracts() {
    if (!provider) return;
    tokenContracts.USDC = new ethers.Contract(USDC_ADDRESS, TOKEN_ABI, provider);
    tokenContracts.EURC = new ethers.Contract(EURC_ADDRESS, TOKEN_ABI, provider);
  }
  
  // Quote simulation (since backend returns only swap tx, we simulate rate)
  function computeOutputEstimate(amount, fromSym, toSym) {
    if (isNaN(amount) || amount <= 0) return 0;
    // Fixed rates for demo – on mainnet you'd query a price oracle
    const RATES = { USDC_EURC: 0.978, EURC_USDC: 1.023 };
    if (fromSym === 'USDC' && toSym === 'EURC') return amount * RATES.USDC_EURC;
    if (fromSym === 'EURC' && toSym === 'USDC') return amount * RATES.EURC_USDC;
    return amount;
  }
  
  function updateQuote() {
    if (!connected) { receiveField.value = ''; minReceiveHint.innerText = 'min receive: —'; priceImpactFill.style.width = '0%'; return; }
    let amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) { receiveField.value = ''; minReceiveHint.innerText = 'min receive: —'; return; }
    const rawOut = computeOutputEstimate(amount, selectedFrom, selectedTo);
    let slippage = currentSlippageMode === "auto" ? 0.2 : currentSlippageValue;
    const minReceived = rawOut * (1 - slippage / 100);
    receiveField.value = rawOut.toFixed(6);
    minReceiveHint.innerText = `min receive: ${minReceived.toFixed(6)} ${selectedTo}`;
    const mockImpact = Math.min(2.5, (amount / (realBalances[selectedFrom] || 1)) * 1.2);
    priceImpactFill.style.width = `${Math.min(100, mockImpact * 20)}%`;
    rateDynamicSpan.innerText = selectedFrom === 'USDC' ? `1 USDC ≈ 0.978 EURC` : `1 EURC ≈ 1.023 USDC`;
  }
  
  function validateSwap() {
    if (!connected || isProcessing) { swapBtn.disabled = true; return; }
    let amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0 || amount > (realBalances[selectedFrom] || 0)) swapBtn.disabled = true;
    else swapBtn.disabled = false;
  }
  
  async function refreshAll() {
    if (connected && userAddress) await fetchBalances();
    updateQuote();
    validateSwap();
    lucide.createIcons();
  }
  
  // ----- REAL SWAP EXECUTION (calls backend + sends transaction) -----
  async function executeRealSwap() {
    if (!connected || !userAddress) { showToast("Connect wallet first", true); return; }
    if (isProcessing) return;
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) { showToast("Invalid amount", true); return; }
    if (amount > realBalances[selectedFrom]) { showToast(`Insufficient ${selectedFrom} balance`, true); return; }
    
    isProcessing = true;
    swapBtn.disabled = true;
    let width = 0;
    const interval = setInterval(() => { width += 5; progressBar.style.width = width + "%"; if (width >= 100) clearInterval(interval); }, 40);
    swapBtnText.innerHTML = '<span class="flex items-center gap-2"><div class="loading-spinner"></div> Preparing swap...</span>';
    
    try {
      // 1. Get swap transaction from backend
      const response = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tokenIn: selectedFrom,
          tokenOut: selectedTo,
          amountIn: amount.toString(),
          walletAddress: userAddress
        })
      });
      const swapData = await response.json();
      if (!response.ok) throw new Error(swapData.error || 'Backend failed');
      
      // 2. Send transaction with user's wallet
      swapBtnText.innerHTML = '<span class="flex items-center gap-2"><div class="loading-spinner"></div> Confirm in wallet...</span>';
      const tx = {
        from: userAddress,
        to: swapData.to,
        data: swapData.data,
        value: swapData.value || '0x0',
        gasPrice: swapData.gasPrice,
        gasLimit: ethers.BigNumber.from(swapData.gas || 500000)
      };
      const signer = provider.getSigner();
      const sentTx = await signer.sendTransaction(tx);
      showToast(`Tx submitted: ${sentTx.hash.slice(0,10)}... confirming`, false);
      swapBtnText.innerHTML = '<span class="flex items-center gap-2"><div class="loading-spinner"></div> Confirming...</span>';
      await sentTx.wait(1);
      clearInterval(interval); progressBar.style.width = "100%";
      showToast(`✅ Swap successful: ${amount} ${selectedFrom} → ${selectedTo}`, false);
      swapBtnText.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> Done!';
      lucide.createIcons();
      await fetchBalances();  // refresh balances after swap
      refreshAll();
      setTimeout(() => { swapBtnText.innerHTML = "Swap tokens"; isProcessing = false; validateSwap(); }, 2000);
    } catch (err) {
      clearInterval(interval); progressBar.style.width = "0%";
      console.error(err);
      let errorMsg = err.message;
      if (errorMsg.includes('user rejected')) errorMsg = 'Transaction rejected.';
      else if (errorMsg.includes('insufficient')) errorMsg = 'Insufficient balance/allowance.';
      showToast(`Swap failed: ${errorMsg}`, true);
      swapBtnText.innerHTML = "Swap tokens";
      isProcessing = false;
      validateSwap();
    } finally {
      isProcessing = false;
    }
  }
  
  // ---- Wallet Connection (Real) ----
  async function connectWallet() {
    if (!window.ethereum) { showToast("Install MetaMask or Rabby", true); return; }
    try {
      showToast("Connecting...");
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      if (!accounts.length) throw new Error("No accounts");
      userAddress = accounts[0];
      provider = new ethers.providers.Web3Provider(window.ethereum);
      // Switch to Arc Testnet
      try {
        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: EXPECTED_CHAIN_HEX }] });
      } catch (switchErr) {
        if (switchErr.code === 4902) {
          await window.ethereum.request({
            method: 'wallet_addEthereumChain',
            params: [{
              chainId: EXPECTED_CHAIN_HEX,
              chainName: 'Arc Testnet',
              nativeCurrency: { name: 'USDC', symbol: 'USDC', decimals: 18 },
              rpcUrls: ['https://rpc.testnet.arc.network'],
              blockExplorerUrls: ['https://explorer.testnet.arc.network']
            }]
          });
        } else throw switchErr;
      }
      const network = await provider.getNetwork();
      if (network.chainId !== EXPECTED_CHAIN_ID) throw new Error("Wrong chain");
      connected = true;
      await initTokenContracts();
      await fetchBalances();
      walletAddrSpan.innerText = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
      statusLed.classList.add('bg-emerald-400'); statusLed.classList.remove('bg-gray-500');
      connectBtnText.innerText = "Connected";
      copyBtn.classList.remove('hidden'); disconnectWalletBtn.classList.remove('hidden');
      showToast("Connected to Arc Testnet", false);
      refreshAll();
    } catch (err) { showToast(err.message, true); }
  }
  
  function disconnect() {
    connected = false; userAddress = null; provider = null;
    walletAddrSpan.innerText = "⚡ not connected";
    statusLed.classList.remove('bg-emerald-400'); statusLed.classList.add('bg-gray-500');
    connectBtnText.innerText = "Connect";
    copyBtn.classList.add('hidden'); disconnectWalletBtn.classList.add('hidden');
    realBalances = { USDC: 0, EURC: 0 };
    refreshAll();
    showToast("Disconnected");
  }
  
  // ---- Event Listeners ----
  connectBtn.addEventListener('click', connectWallet);
  disconnectWalletBtn.addEventListener('click', disconnect);
  copyBtn.addEventListener('click', () => { if(userAddress) { navigator.clipboard.writeText(userAddress); showToast("Address copied"); } });
  flipBtn.addEventListener('click', () => { let tmp = selectedFrom; selectedFrom = selectedTo; selectedTo = tmp; fromTokenSymbolSpan.innerText = selectedFrom; toTokenSymbolSpan.innerText = selectedTo; refreshAll(); });
  maxBtn.addEventListener('click', () => { if(connected) amountInput.value = realBalances[selectedFrom]; updateQuote(); validateSwap(); });
  amountInput.addEventListener('input', () => { updateQuote(); validateSwap(); });
  swapBtn.addEventListener('click', executeRealSwap);
  document.querySelectorAll('.percentBtn').forEach(btn => {
    btn.addEventListener('click', () => { let p = parseFloat(btn.dataset.percent); if(connected) amountInput.value = (realBalances[selectedFrom] * p).toFixed(6); updateQuote(); validateSwap(); });
  });
  // Slippage presets
  document.querySelectorAll('.slippagePreset').forEach(btn => {
    btn.addEventListener('click', (e) => {
      let val = btn.dataset.slippage;
      if(val === 'auto') { currentSlippageMode = "auto"; slippageValueSpan.innerText = "Auto (0.2%)"; }
      else { currentSlippageMode = "manual"; currentSlippageValue = parseFloat(val); slippageValueSpan.innerText = `${currentSlippageValue}%`; }
      updateQuote();
      showToast(`Slippage set to ${slippageValueSpan.innerText}`);
    });
  });
  advancedToggle.addEventListener('click', () => { advancedPanel.classList.toggle('hidden'); chevronAdv.style.transform = advancedPanel.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)'; });
  aiSparkBtn.addEventListener('click', () => { showToast(`✨ AI: Use Auto slippage for stable pairs. Gas fees low now.`); });
  
  // Token modal (simplified with real tokens)
  const tokenListTokens = [
    { symbol:"USDC", name:"USD Coin", icon:"circle-dollar-sign", balance:0 },
    { symbol:"EURC", name:"Euro Coin", icon:"euro", balance:0 }
  ];
  function renderTokenModal(targetSide) {
    let search = document.getElementById('tokenSearch').value.toLowerCase();
    let filtered = tokenListTokens.filter(t => t.symbol.toLowerCase().includes(search));
    let container = document.getElementById('tokenList');
    container.innerHTML = filtered.map(t => `
      <div class="token-item flex justify-between items-center p-3 rounded-xl hover:bg-slate-700/50 cursor-pointer" data-symbol="${t.symbol}" data-side="${targetSide}">
        <div class="flex gap-3 items-center"><i data-lucide="${t.icon}" class="w-6 h-6"></i><div><div class="text-white font-medium">${t.symbol}</div><div class="text-xs text-slate-400">${t.name}</div></div></div>
        <div class="text-right"><div class="text-white text-sm">${realBalances[t.symbol]?.toFixed(2) || 0}</div></div>
      </div>
    `).join('');
    lucide.createIcons();
    document.querySelectorAll('.token-item').forEach(el => {
      el.addEventListener('click', () => {
        let sym = el.dataset.symbol;
        if(el.dataset.side === 'from') { selectedFrom = sym; fromTokenSymbolSpan.innerText = sym; fromTokenBtn.querySelector('i').setAttribute('data-lucide', sym==='USDC'?'circle-dollar-sign':'euro'); }
        else { selectedTo = sym; toTokenSymbolSpan.innerText = sym; toTokenBtn.querySelector('i').setAttribute('data-lucide', sym==='USDC'?'circle-dollar-sign':'euro'); }
        lucide.createIcons();
        tokenModal.classList.remove('active');
        refreshAll();
      });
    });
  }
  fromTokenBtn.addEventListener('click', () => { tokenModal.classList.add('active'); renderTokenModal('from'); });
  toTokenBtn.addEventListener('click', () => { tokenModal.classList.add('active'); renderTokenModal('to'); });
  document.getElementById('closeModalBtn').addEventListener('click', () => tokenModal.classList.remove('active'));
  document.getElementById('tokenSearch').addEventListener('input', () => renderTokenModal('from'));
  
  // Sparkline mock
  let sparklineData = Array(20).fill(0.978);
  let sparkCtx = document.getElementById('sparklineCanvas').getContext('2d');
  function updateSparkline() {
    let newVal = (selectedFrom==='USDC'?0.978:1.023) + (Math.random() - 0.5)*0.002;
    sparklineData.push(newVal); if(sparklineData.length>30) sparklineData.shift();
    sparkCtx.clearRect(0,0,80,24); sparkCtx.beginPath(); sparkCtx.strokeStyle = '#60a5fa'; sparkCtx.lineWidth = 1.5;
    let min = Math.min(...sparklineData), max = Math.max(...sparklineData);
    for(let i=0;i<sparklineData.length;i++){ let x=(i/sparklineData.length)*80; let y=24-((sparklineData[i]-min)/(max-min||1))*20; if(i===0) sparkCtx.moveTo(x,y); else sparkCtx.lineTo(x,y); }
    sparkCtx.stroke();
  }
  setInterval(() => { if(connected) updateSparkline(); }, 4000);
  
  refreshAll();
  lucide.createIcons();
</script>
</body>
</html>
