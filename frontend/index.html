<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Xroga · Swap + Bridge | Arc + CCTP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: radial-gradient(ellipse at 40% 50%, #0a0f1f, #010208); min-height: 100vh; overflow-x: hidden; }
    .ambient-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
      background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.08), transparent 70%),
                  radial-gradient(circle at 80% 70%, rgba(139,92,246,0.08), transparent 70%);
      animation: breathe 12s infinite alternate;
    }
    @keyframes breathe { 0% { opacity: 0.4; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }
    .glass-panel {
      background: rgba(12, 20, 32, 0.65); backdrop-filter: blur(14px); border: 1px solid rgba(59, 130, 246, 0.2);
      transition: all 0.25s ease; position: relative; overflow: hidden;
    }
    .glass-panel::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(59,130,246,0.15), transparent 70%);
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .glass-panel:hover::after { opacity: 1; }
    .morph-btn { position: relative; overflow: hidden; transition: all 0.2s; }
    .toast-notify {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #1e293bc9; backdrop-filter: blur(12px); border: 1px solid #3b82f6; border-radius: 40px;
      padding: 8px 18px; color: white; font-size: 13px; font-weight: 500; z-index: 1000;
      transition: transform 0.25s ease; pointer-events: none; white-space: nowrap;
    }
    .toast-show { transform: translateX(-50%) translateY(0); }
    .token-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 2000;
      display: flex; align-items: flex-end; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.2s;
    }
    .token-modal.active { opacity: 1; visibility: visible; }
    .token-drawer {
      background: #0f172fe6; backdrop-filter: blur(20px); border-radius: 32px 32px 0 0; width: 100%; max-width: 480px;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); border-top: 1px solid #3b82f680;
    }
    .token-modal.active .token-drawer { transform: translateY(0); }
    .loading-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .mode-tab-active { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
    .mode-tab-inactive { background: rgba(30,41,59,0.6); color: #94a3b8; border: 1px solid #334155; }
    select, input { background: rgba(15,23,42,0.8); border: 1px solid #334155; transition: all 0.2s; }
    select:focus, input:focus { border-color: #3b82f6; outline: none; }
  </style>
</head>
<body>
<div class="ambient-bg"></div>
<div id="toastRoot" class="toast-notify">✨ Ready</div>

<main class="w-full max-w-lg mx-auto px-4 py-6 md:py-10 relative z-10">
  <div class="glass-panel rounded-3xl shadow-2xl p-5 md:p-6">
    <!-- Header -->
    <div class="flex justify-between items-center mb-5">
      <div class="flex items-center gap-2">
        <div class="text-2xl font-black bg-gradient-to-r from-white via-blue-400 to-purple-500 bg-clip-text text-transparent">Xroga</div>
        <span class="text-[11px] font-medium px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-300 border border-blue-500/30">ARC testnet</span>
      </div>
      <button id="connectWalletBtn" class="flex items-center gap-1.5 bg-slate-800/70 hover:bg-slate-700/80 transition-all rounded-full px-3 py-1.5 text-sm font-medium text-slate-200 border border-slate-700">
        <i data-lucide="wallet" class="w-3.5 h-3.5"></i><span id="connectBtnText">Connect</span>
      </button>
    </div>

    <!-- Wallet status + backend provider info -->
    <div class="flex items-center justify-between gap-2 bg-black/30 rounded-2xl px-3 py-2 mb-5 text-xs border border-white/5">
      <div class="flex items-center gap-2">
        <div id="statusLed" class="w-2 h-2 rounded-full bg-gray-500"></div>
        <span id="walletAddressShort" class="text-slate-300 font-mono">⚡ not connected</span>
        <button id="copyAddressBtn" class="hidden text-slate-400 hover:text-blue-400"><i data-lucide="copy" class="w-3 h-3"></i></button>
        <button id="disconnectBtn" class="hidden text-slate-400 hover:text-red-400"><i data-lucide="log-out" class="w-3 h-3"></i></button>
      </div>
      <div id="backendWalletBadge" class="text-[9px] bg-indigo-500/30 px-2 py-0.5 rounded-full truncate max-w-[140px]"></div>
    </div>

    <!-- MODE TOGGLE: SWAP / BRIDGE -->
    <div class="flex bg-slate-800/30 rounded-2xl p-1 mb-6">
      <button id="swapModeBtn" class="mode-tab-active flex-1 py-2 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-1"><i data-lucide="arrows-up-down" class="w-3.5 h-3.5"></i> Swap</button>
      <button id="bridgeModeBtn" class="mode-tab-inactive flex-1 py-2 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-1"><i data-lucide="bridge" class="w-3.5 h-3.5"></i> Bridge (CCTP)</button>
    </div>

    <!-- ################## SWAP UI ################## -->
    <div id="swapContainer">
      <div class="glass-panel rounded-2xl p-4 mb-3">
        <div class="flex justify-between text-xs text-slate-400 mb-1.5">
          <span>You pay</span>
          <span id="fromBalanceLabel" class="font-mono">—</span>
        </div>
        <div class="flex items-center gap-3">
          <button id="fromTokenBtn" class="token-trigger flex items-center gap-2 rounded-full py-2 px-3 bg-slate-800/90 text-white text-sm font-semibold border border-slate-600 hover:border-blue-500 transition">
            <i data-lucide="circle-dollar-sign" class="w-4 h-4"></i> <span id="fromTokenSymbol">USDC</span> <i data-lucide="chevron-down" class="w-3 h-3"></i>
          </button>
          <input type="number" id="amountInput" value="1.0" step="0.5" class="bg-transparent text-right text-2xl font-medium text-white w-full outline-none">
        </div>
        <div class="flex justify-end gap-2 mt-2">
          <button class="percentBtn text-[11px] font-semibold px-2 py-0.5 rounded-full bg-slate-700/50 hover:bg-blue-600/50" data-percent="0.25">25%</button>
          <button class="percentBtn text-[11px] font-semibold px-2 py-0.5 rounded-full bg-slate-700/50 hover:bg-blue-600/50" data-percent="0.5">50%</button>
          <button class="percentBtn text-[11px] font-semibold px-2 py-0.5 rounded-full bg-slate-700/50 hover:bg-blue-600/50" data-percent="0.75">75%</button>
          <button id="maxFromBtn" class="text-[11px] font-semibold px-2 py-0.5 rounded-full bg-slate-700/60 hover:bg-blue-600/50 flex items-center gap-1"><i data-lucide="maximize-2" class="w-2.5 h-2.5"></i> MAX</button>
        </div>
      </div>

      <div class="flex justify-center -my-1 relative z-10">
        <button id="flipSwapBtn" class="swap-arrow-btn bg-slate-800/90 border border-blue-500/40 rounded-full p-2 backdrop-blur hover:bg-slate-700 transition shadow-lg">
          <i data-lucide="arrow-down-up" class="w-5 h-5 text-blue-400"></i>
        </button>
      </div>

      <div class="glass-panel rounded-2xl p-4 mt-1 mb-3">
        <div class="flex justify-between text-xs text-slate-400 mb-1.5">
          <span>You receive</span>
          <span id="toBalanceLabel" class="font-mono">—</span>
        </div>
        <div class="flex items-center gap-3">
          <button id="toTokenBtn" class="token-trigger flex items-center gap-2 rounded-full py-2 px-3 bg-slate-800/90 text-white text-sm font-semibold border border-slate-600 hover:border-blue-500 transition">
            <i data-lucide="euro" class="w-4 h-4"></i> <span id="toTokenSymbol">EURC</span> <i data-lucide="chevron-down" class="w-3 h-3"></i>
          </button>
          <input type="text" id="receiveField" readonly disabled class="bg-transparent text-right text-2xl font-medium text-white/80 w-full outline-none">
        </div>
        <div class="flex justify-between mt-1 items-center">
          <span id="minReceiveHint" class="text-[11px] text-slate-400 font-mono">—</span>
        </div>
      </div>
    </div>

    <!-- ################## BRIDGE UI ################## -->
    <div id="bridgeContainer" class="hidden">
      <div class="glass-panel rounded-2xl p-4 mb-3">
        <div class="flex justify-between text-xs text-slate-400 mb-2">
          <span>Source chain</span>
          <span id="bridgeSourceBalanceHint" class="font-mono">balance: —</span>
        </div>
        <select id="sourceChainSelect" class="w-full rounded-xl px-3 py-2 text-white text-sm">
          <option value="Arc_Testnet">Arc Testnet (must include ARC)</option>
          <option value="Ethereum_Sepolia">Ethereum Sepolia</option>
          <option value="Arbitrum_Sepolia">Arbitrum Sepolia</option>
          <option value="Base_Sepolia">Base Sepolia</option>
        </select>
      </div>

      <div class="flex justify-center -my-1 relative z-10">
        <button id="flipBridgeBtn" class="bg-slate-800/90 border border-purple-500/40 rounded-full p-2 backdrop-blur hover:bg-slate-700 transition shadow-lg">
          <i data-lucide="arrow-left-right" class="w-5 h-5 text-purple-400"></i>
        </button>
      </div>

      <div class="glass-panel rounded-2xl p-4 mt-1 mb-3">
        <div class="flex justify-between text-xs text-slate-400 mb-2">
          <span>Destination chain</span>
          <span id="bridgeDestChainLabel" class="font-mono">—</span>
        </div>
        <select id="destChainSelect" class="w-full rounded-xl px-3 py-2 text-white text-sm">
          <option value="Arc_Testnet">Arc Testnet (must include ARC)</option>
          <option value="Ethereum_Sepolia">Ethereum Sepolia</option>
          <option value="Arbitrum_Sepolia">Arbitrum Sepolia</option>
          <option value="Base_Sepolia">Base Sepolia</option>
        </select>
      </div>

      <div class="glass-panel rounded-2xl p-4 mb-3">
        <div class="flex justify-between text-xs text-slate-400 mb-1">
          <span>Amount (USDC)</span>
          <span id="bridgeUsdcBalanceLabel" class="font-mono">—</span>
        </div>
        <input type="number" id="bridgeAmount" value="10" step="5" class="w-full bg-transparent text-2xl font-medium text-white outline-none">
        <div class="flex justify-end mt-2">
          <button id="bridgeMaxBtn" class="text-[11px] font-semibold px-2 py-0.5 rounded-full bg-slate-700/60 hover:bg-blue-600/50">MAX USDC</button>
        </div>
      </div>

      <div class="glass-panel rounded-2xl p-4 mb-3">
        <div class="text-xs text-slate-400 mb-1">Recipient address (on destination chain)</div>
        <input type="text" id="recipientAddress" placeholder="0x... or destination wallet" class="w-full rounded-xl px-3 py-2 text-white text-sm font-mono">
        <div class="text-[10px] text-slate-500 mt-1">Leave empty to use your connected wallet</div>
      </div>
    </div>

    <!-- Shared gas & advanced panel -->
    <div class="bg-black/20 rounded-xl px-3 py-2 mb-4">
      <div class="flex justify-between items-center cursor-pointer" id="advancedToggle">
        <div class="flex gap-3 items-center">
          <i data-lucide="fuel" class="w-3 h-3"></i> <span id="gasEstimate">Fetching gas...</span>
        </div>
        <i data-lucide="chevron-down" id="chevronAdv" class="w-4 h-4 transition-transform"></i>
      </div>
      <div id="advancedPanel" class="hidden mt-2 space-y-2 pt-2 border-t border-white/10">
        <div class="flex justify-between items-center">
          <span class="text-[11px]">MEV protection (simulate)</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="mevToggle" class="sr-only peer">
            <div class="w-8 h-4 bg-slate-700 rounded-full peer-checked:bg-blue-600 after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-4"></div>
          </label>
        </div>
        <div>
          <span class="text-[11px]">Slippage (swap only)</span>
          <div class="flex gap-2 mt-1">
            <button class="slippagePreset text-[11px] px-2 py-0.5 rounded bg-slate-700" data-slippage="0.1">0.1%</button>
            <button class="slippagePreset text-[11px] px-2 py-0.5 rounded bg-slate-700" data-slippage="0.5">0.5%</button>
            <button class="slippagePreset text-[11px] px-2 py-0.5 rounded bg-slate-700" data-slippage="1">1%</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Action button -->
    <button id="actionBtn" disabled class="morph-btn w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 disabled:opacity-50 disabled:from-slate-600 disabled:to-slate-700 rounded-2xl py-3.5 font-bold text-white text-sm tracking-wide transition-all shadow-lg shadow-blue-600/20">
      <span id="actionBtnText">Swap tokens</span>
    </button>
  </div>
</main>

<!-- token modal reused for swap only -->
<div id="tokenModal" class="token-modal">
  <div class="token-drawer p-5">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-white font-semibold">Select token</h3>
      <button id="closeModalBtn"><i data-lucide="x" class="w-5 h-5 text-slate-400"></i></button>
    </div>
    <div id="tokenList" class="space-y-2"></div>
  </div>
</div>

<script>
  // ========== CONFIGURATION ==========
  const USDC_ADDRESS = '0x3600000000000000000000000000000000000000';
  const EURC_ADDRESS = '0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a';
  const ERC20_ABI = ["function balanceOf(address owner) view returns (uint256)", "function decimals() view returns (uint8)", "function symbol() view returns (string)"];
  const EXPECTED_CHAIN_ID = 5042002;
  const BACKEND_SWAP_URL = '/api/swap';
  const BACKEND_BRIDGE_URL = '/api/bridge';
  const BACKEND_GET_URL = '/api/swap';

  let userAddress = null;
  let provider = null;
  let connected = false;
  let selectedFrom = "USDC";
  let selectedTo = "EURC";
  let currentSlippage = 0.5;
  let isProcessing = false;
  let userBalances = { USDC: 0, EURC: 0 };
  let tokenContracts = {};
  let currentMode = "swap"; // "swap" or "bridge"
  let backendWalletAddress = "";

  // DOM elements
  const connectBtn = document.getElementById('connectWalletBtn');
  const connectBtnText = document.getElementById('connectBtnText');
  const walletAddrSpan = document.getElementById('walletAddressShort');
  const statusLed = document.getElementById('statusLed');
  const fromBalanceLabel = document.getElementById('fromBalanceLabel');
  const toBalanceLabel = document.getElementById('toBalanceLabel');
  const amountInput = document.getElementById('amountInput');
  const receiveField = document.getElementById('receiveField');
  const minReceiveHint = document.getElementById('minReceiveHint');
  const swapBtn = document.getElementById('actionBtn');
  const actionBtnText = document.getElementById('actionBtnText');
  const flipSwapBtn = document.getElementById('flipSwapBtn');
  const flipBridgeBtn = document.getElementById('flipBridgeBtn');
  const maxBtn = document.getElementById('maxFromBtn');
  const swapContainer = document.getElementById('swapContainer');
  const bridgeContainer = document.getElementById('bridgeContainer');
  const swapModeBtn = document.getElementById('swapModeBtn');
  const bridgeModeBtn = document.getElementById('bridgeModeBtn');
  const sourceChainSelect = document.getElementById('sourceChainSelect');
  const destChainSelect = document.getElementById('destChainSelect');
  const bridgeAmountInput = document.getElementById('bridgeAmount');
  const recipientAddressInput = document.getElementById('recipientAddress');
  const bridgeMaxBtn = document.getElementById('bridgeMaxBtn');
  const bridgeUsdcBalanceLabel = document.getElementById('bridgeUsdcBalanceLabel');
  const bridgeSourceBalanceHint = document.getElementById('bridgeSourceBalanceHint');

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toastRoot');
    toast.textContent = msg;
    toast.classList.add('toast-show');
    toast.style.borderColor = isError ? '#ef4444' : '#3b82f6';
    setTimeout(() => toast.classList.remove('toast-show'), 4000);
  }

  // Fetch backend wallet address (bridge provider address)
  async function fetchBackendWallet() {
    try {
      const res = await fetch(BACKEND_GET_URL);
      const data = await res.json();
      if (data.backendAddress) {
        backendWalletAddress = data.backendAddress;
        document.getElementById('backendWalletBadge').innerHTML = `🐚 provider: ${backendWalletAddress.slice(0,6)}...${backendWalletAddress.slice(-4)}`;
      }
    } catch(e) { console.warn(e); }
  }

  async function fetchTokenBalances() {
    if (!userAddress || !provider) return;
    try {
      if (tokenContracts.USDC) {
        const balanceWei = await tokenContracts.USDC.balanceOf(userAddress);
        const decimals = await tokenContracts.USDC.decimals();
        userBalances.USDC = parseFloat(ethers.utils.formatUnits(balanceWei, decimals));
      }
      if (tokenContracts.EURC) {
        const balanceWei = await tokenContracts.EURC.balanceOf(userAddress);
        const decimals = await tokenContracts.EURC.decimals();
        userBalances.EURC = parseFloat(ethers.utils.formatUnits(balanceWei, decimals));
      }
      updateBalanceUI();
    } catch(err) { console.warn(err); }
  }

  function updateBalanceUI() {
    if (!connected) {
      fromBalanceLabel.innerText = '—';
      toBalanceLabel.innerText = '—';
      return;
    }
    fromBalanceLabel.innerText = `${userBalances[selectedFrom]?.toFixed(4) || 0} ${selectedFrom}`;
    toBalanceLabel.innerText = `${userBalances[selectedTo]?.toFixed(4) || 0} ${selectedTo}`;
  }

  async function updateGasFee() {
    if (!provider || !connected) { document.getElementById('gasEstimate').innerText = '— USDC'; return; }
    try {
      const feeData = await provider.getFeeData();
      let maxFeePerGas = feeData.maxFeePerGas || feeData.gasPrice;
      if (!maxFeePerGas) throw new Error();
      const minFeeWei = ethers.utils.parseUnits("160", "gwei");
      if (maxFeePerGas.lt(minFeeWei)) maxFeePerGas = minFeeWei;
      const gasLimit = ethers.BigNumber.from(350000);
      const totalWei = gasLimit.mul(maxFeePerGas);
      const totalUSDC = ethers.utils.formatUnits(totalWei, 18);
      document.getElementById('gasEstimate').innerText = `~${parseFloat(totalUSDC).toFixed(6)} USDC`;
    } catch(e) { document.getElementById('gasEstimate').innerText = "Gas error"; }
  }

  function updateSwapQuote() {
    if (!connected) { receiveField.value = ''; minReceiveHint.innerText = 'min receive: —'; return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) { receiveField.value = ''; minReceiveHint.innerText = 'min receive: —'; return; }
    const rate = (selectedFrom === 'USDC' && selectedTo === 'EURC') ? 0.978 : (selectedFrom === 'EURC' && selectedTo === 'USDC') ? 1.023 : 1;
    const rawOut = amount * rate;
    const minReceived = rawOut * (1 - currentSlippage / 100);
    receiveField.value = rawOut.toFixed(6);
    minReceiveHint.innerText = `min receive: ${minReceived.toFixed(6)} ${selectedTo}`;
    document.getElementById('rateDynamic') ? document.getElementById('rateDynamic').innerText = selectedFrom === 'USDC' ? `1 USDC ≈ 0.978 EURC` : `1 EURC ≈ 1.023 USDC` : null;
  }

  function validateSwap() {
    if (!connected || isProcessing || currentMode !== "swap") { swapBtn.disabled = true; return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0 || amount > (userBalances[selectedFrom] || 0)) swapBtn.disabled = true;
    else swapBtn.disabled = false;
  }

  async function refreshUI() {
    if (connected) { await fetchTokenBalances(); await updateGasFee(); }
    if (currentMode === "swap") updateSwapQuote();
    validateSwap();
    lucide.createIcons();
  }

  async function initTokenContracts() {
    if (!provider) return;
    tokenContracts.USDC = new ethers.Contract(USDC_ADDRESS, ERC20_ABI, provider);
    tokenContracts.EURC = new ethers.Contract(EURC_ADDRESS, ERC20_ABI, provider);
  }

  async function ensureArcNetwork(ethereumProvider) {
    const chainIdHex = `0x${EXPECTED_CHAIN_ID.toString(16)}`;
    try { await ethereumProvider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: chainIdHex }] }); } 
    catch (switchError) {
      if (switchError.code === 4902) {
        await ethereumProvider.request({ method: 'wallet_addEthereumChain', params: [{
          chainId: chainIdHex, chainName: 'Arc Testnet',
          nativeCurrency: { name: 'USDC', symbol: 'USDC', decimals: 18 },
          rpcUrls: ['https://rpc.testnet.arc.network'], blockExplorerUrls: ['https://explorer.testnet.arc.network']
        }]});
      } else throw switchError;
    }
  }

  async function connectWallet() {
    if (!window.ethereum) { showToast('❌ No wallet (MetaMask)', true); return; }
    try {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      userAddress = accounts[0];
      provider = new ethers.providers.Web3Provider(window.ethereum);
      await ensureArcNetwork(window.ethereum);
      const network = await provider.getNetwork();
      if (network.chainId !== EXPECTED_CHAIN_ID) throw new Error('Switch to Arc Testnet');
      connected = true;
      await initTokenContracts();
      await refreshUI();
      walletAddrSpan.innerText = `${userAddress.slice(0,6)}...${userAddress.slice(-4)} on Arc`;
      statusLed.classList.add('bg-emerald-400'); statusLed.classList.remove('bg-gray-500');
      connectBtnText.innerText = 'Connected';
      document.getElementById('copyAddressBtn').classList.remove('hidden');
      document.getElementById('disconnectBtn').classList.remove('hidden');
      showToast('Connected to Arc Testnet');
    } catch(err) { showToast(`Connection err: ${err.message}`, true); connected = false; }
  }
  function disconnect() { connected = false; userAddress = null; provider = null; userBalances = { USDC:0, EURC:0 }; walletAddrSpan.innerText = '⚡ not connected'; statusLed.classList.remove('bg-emerald-400'); statusLed.classList.add('bg-gray-500'); connectBtnText.innerText = 'Connect'; document.getElementById('copyAddressBtn').classList.add('hidden'); document.getElementById('disconnectBtn').classList.add('hidden'); refreshUI(); showToast('Disconnected'); }

  // ========== SWAP EXECUTION (same as original, backend wallet) ==========
  async function executeSwap() {
    if (!userAddress) { showToast('Connect wallet first', true); return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) { showToast('Invalid amount', true); return; }
    isProcessing = true; swapBtn.disabled = true;
    actionBtnText.innerHTML = '<span class="flex items-center gap-2"><div class="loading-spinner"></div> Preparing swap...</span>';
    try {
      const res = await fetch(BACKEND_SWAP_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tokenIn: selectedFrom, tokenOut: selectedTo, amountIn: amount.toString(), walletAddress: userAddress })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Swap failed');
      actionBtnText.innerHTML = '<span class="flex items-center gap-2"><div class="loading-spinner"></div> Confirming...</span>';
      showToast(`Swap executed! Tx: ${data.transactionHash?.slice(0,10)}`, false);
      await refreshUI();
      actionBtnText.innerHTML = 'Swap tokens';
    } catch(err) { showToast(`Swap error: ${err.message}`, true); actionBtnText.innerHTML = 'Swap tokens'; } 
    finally { isProcessing = false; validateSwap(); }
  }

  // ========== BRIDGE EXECUTION via backend ==========
  async function executeBridge() {
    if (!userAddress) { showToast('Connect wallet first', true); return; }
    let sourceChain = sourceChainSelect.value;
    let destChain = destChainSelect.value;
    if (sourceChain === destChain) { showToast('Source and destination chains must differ', true); return; }
    if (!sourceChain.includes('Arc') && !destChain.includes('Arc')) { showToast('One side MUST be Arc Testnet (ARC is required)', true); return; }
    const amount = parseFloat(bridgeAmountInput.value);
    if (isNaN(amount) || amount <= 0) { showToast('Invalid amount', true); return; }
    let recipient = recipientAddressInput.value.trim();
    if (!recipient) recipient = userAddress;
    if (!recipient.match(/^0x[a-fA-F0-9]{40}$/)) { showToast('Invalid recipient address (0x... )', true); return; }
    isProcessing = true; swapBtn.disabled = true;
    actionBtnText.innerHTML = '<span class="flex items-center gap-2"><div class="loading-spinner"></div> Bridging via CCTP...</span>';
    try {
      const res = await fetch(BACKEND_BRIDGE_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sourceChain, destChain, amount: amount.toString(), recipient, token: "USDC" })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Bridge failed');
      showToast(`✅ Bridge initiated! Tx: ${data.transactionHash?.slice(0,12)}`, false);
      actionBtnText.innerHTML = 'Bridge completed';
      setTimeout(() => { actionBtnText.innerHTML = currentMode === "swap" ? "Swap tokens" : "Bridge USDC"; isProcessing = false; validateBridgeUI(); }, 3000);
    } catch(err) { showToast(`Bridge error: ${err.message}`, true); actionBtnText.innerHTML = "Bridge USDC"; isProcessing = false; validateBridgeUI(); }
  }

  function validateBridgeUI() {
    if (!connected || isProcessing || currentMode !== "bridge") swapBtn.disabled = true;
    else swapBtn.disabled = false;
  }

  function flipBridge() {
    const src = sourceChainSelect.value;
    const dst = destChainSelect.value;
    sourceChainSelect.value = dst;
    destChainSelect.value = src;
    validateBridgeUI();
  }

  function updateBridgeBalanceHint() {
    if (!connected) { bridgeUsdcBalanceLabel.innerText = '—'; return; }
    bridgeUsdcBalanceLabel.innerText = `${userBalances.USDC?.toFixed(2) || 0} USDC`;
    bridgeSourceBalanceHint.innerText = `balance: ${userBalances.USDC?.toFixed(2) || 0} USDC`;
  }
  bridgeMaxBtn.addEventListener('click', () => { if (connected) bridgeAmountInput.value = userBalances.USDC || 0; validateBridgeUI(); });

  // mode switching
  function setMode(mode) {
    currentMode = mode;
    if (mode === "swap") {
      swapContainer.classList.remove('hidden');
      bridgeContainer.classList.add('hidden');
      swapModeBtn.classList.add('mode-tab-active'); swapModeBtn.classList.remove('mode-tab-inactive');
      bridgeModeBtn.classList.add('mode-tab-inactive'); bridgeModeBtn.classList.remove('mode-tab-active');
      actionBtnText.innerHTML = "Swap tokens";
      validateSwap();
    } else {
      swapContainer.classList.add('hidden');
      bridgeContainer.classList.remove('hidden');
      bridgeModeBtn.classList.add('mode-tab-active'); bridgeModeBtn.classList.remove('mode-tab-inactive');
      swapModeBtn.classList.add('mode-tab-inactive'); swapModeBtn.classList.remove('mode-tab-active');
      actionBtnText.innerHTML = "Bridge USDC";
      updateBridgeBalanceHint();
      validateBridgeUI();
    }
    lucide.createIcons();
  }

  // Event listeners
  connectBtn.addEventListener('click', connectWallet);
  document.getElementById('disconnectBtn').addEventListener('click', disconnect);
  document.getElementById('copyAddressBtn').addEventListener('click', () => { if(userAddress) { navigator.clipboard.writeText(userAddress); showToast('Copied'); } });
  flipSwapBtn.addEventListener('click', () => { let tmp=selectedFrom; selectedFrom=selectedTo; selectedTo=tmp; document.getElementById('fromTokenSymbol').innerText=selectedFrom; document.getElementById('toTokenSymbol').innerText=selectedTo; refreshUI(); });
  maxBtn.addEventListener('click', () => { if(connected) amountInput.value = userBalances[selectedFrom]; refreshUI(); });
  amountInput.addEventListener('input', refreshUI);
  document.querySelectorAll('.percentBtn').forEach(btn => btn.addEventListener('click', () => { if(connected) amountInput.value = (userBalances[selectedFrom] * parseFloat(btn.dataset.percent)).toFixed(6); refreshUI(); }));
  document.querySelectorAll('.slippagePreset').forEach(btn => btn.addEventListener('click', () => { currentSlippage = parseFloat(btn.dataset.slippage); document.getElementById('slippageValue').innerText = `${currentSlippage}%`; refreshUI(); }));
  document.getElementById('advancedToggle').addEventListener('click', () => { document.getElementById('advancedPanel').classList.toggle('hidden'); document.getElementById('chevronAdv').style.transform = document.getElementById('advancedPanel').classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)'; });
  swapModeBtn.addEventListener('click', () => setMode('swap'));
  bridgeModeBtn.addEventListener('click', () => setMode('bridge'));
  flipBridgeBtn.addEventListener('click', flipBridge);
  sourceChainSelect.addEventListener('change', validateBridgeUI);
  destChainSelect.addEventListener('change', validateBridgeUI);
  bridgeAmountInput.addEventListener('input', validateBridgeUI);
  recipientAddressInput.addEventListener('input', validateBridgeUI);
  swapBtn.addEventListener('click', () => { if(currentMode === 'swap') executeSwap(); else executeBridge(); });

  // Token modal for swap
  const fromTokenBtnElem = document.getElementById('fromTokenBtn');
  const toTokenBtnElem = document.getElementById('toTokenBtn');
  const tokenModalDiv = document.getElementById('tokenModal');
  const closeModal = document.getElementById('closeModalBtn');
  function openTokenModal(side) {
    const container = document.getElementById('tokenList');
    container.innerHTML = `<div class="token-item flex justify-between items-center p-3 rounded-xl hover:bg-slate-700/50 cursor-pointer" data-symbol="USDC" data-side="${side}"><div class="flex gap-3"><i data-lucide="circle-dollar-sign"></i><div><div class="text-white">USDC</div></div></div></div>
                           <div class="token-item flex justify-between items-center p-3 rounded-xl hover:bg-slate-700/50 cursor-pointer" data-symbol="EURC" data-side="${side}"><div class="flex gap-3"><i data-lucide="euro"></i><div><div class="text-white">EURC</div></div></div></div>`;
    lucide.createIcons();
    document.querySelectorAll('.token-item').forEach(el => {
      el.addEventListener('click', () => {
        let sym = el.dataset.symbol;
        if (el.dataset.side === 'from') { selectedFrom = sym; document.getElementById('fromTokenSymbol').innerText = sym; fromTokenBtnElem.querySelector('i').setAttribute('data-lucide', sym==='USDC'?'circle-dollar-sign':'euro'); }
        else { selectedTo = sym; document.getElementById('toTokenSymbol').innerText = sym; toTokenBtnElem.querySelector('i').setAttribute('data-lucide', sym==='USDC'?'circle-dollar-sign':'euro'); }
        lucide.createIcons(); tokenModalDiv.classList.remove('active'); refreshUI();
      });
    });
    tokenModalDiv.classList.add('active');
  }
  fromTokenBtnElem.addEventListener('click', () => openTokenModal('from'));
  toTokenBtnElem.addEventListener('click', () => openTokenModal('to'));
  closeModal.addEventListener('click', () => tokenModalDiv.classList.remove('active'));

  fetchBackendWallet();
  refreshUI();
  lucide.createIcons();
  setMode('swap');
</script>
</body>
</html>
