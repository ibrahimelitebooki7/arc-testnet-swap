<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Xroga · Arc Swap – Working</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0a0f1f; }
    .glass-panel { background: rgba(12,20,32,0.65); backdrop-filter: blur(14px); border: 1px solid #3b82f620; }
    .toast-notify { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293bc9; backdrop-filter: blur(12px); border-radius: 40px; padding: 8px 18px; color: white; font-size: 13px; z-index: 1000; transition: transform 0.25s; pointer-events: none; }
    .toast-show { transform: translateX(-50%) translateY(0); }
    .loading-spinner { width: 16px; height: 16px; border: 2px solid #ffffff33; border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="toastRoot" class="toast-notify">✨ Ready</div>

<main class="max-w-md mx-auto px-4 py-8">
  <div class="glass-panel rounded-3xl p-5">
    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
      <div class="text-2xl font-black bg-gradient-to-r from-white via-blue-400 to-purple-500 bg-clip-text text-transparent">Xroga</div>
      <button id="connectBtn" class="bg-slate-800/70 hover:bg-slate-700/80 rounded-full px-3 py-1.5 text-sm text-slate-200 border border-slate-700 flex items-center gap-1">
        <i data-lucide="wallet" class="w-3.5 h-3.5"></i><span id="connectBtnText">Connect</span>
      </button>
    </div>

    <!-- Wallet status -->
    <div class="bg-black/30 rounded-2xl px-3 py-2 mb-5 text-xs flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div id="statusLed" class="w-2 h-2 rounded-full bg-gray-500"></div>
        <span id="walletAddressShort" class="text-slate-300">⚡ not connected</span>
        <button id="copyAddressBtn" class="hidden text-slate-400 hover:text-blue-400"><i data-lucide="copy" class="w-3 h-3"></i></button>
        <button id="disconnectBtn" class="hidden text-slate-400 hover:text-red-400"><i data-lucide="log-out" class="w-3 h-3"></i></button>
      </div>
      <button id="refreshBtn" class="text-[10px] bg-slate-700/50 hover:bg-slate-600 px-2 py-0.5 rounded-full flex items-center gap-1">
        <i data-lucide="refresh-cw" class="w-2.5 h-2.5"></i> Refresh
      </button>
    </div>

    <!-- FROM -->
    <div class="glass-panel rounded-2xl p-4 mb-3">
      <div class="flex justify-between text-xs text-slate-400 mb-1">
        <span>You pay</span>
        <span id="fromBalanceLabel" class="font-mono">—</span>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 rounded-full py-2 px-3 bg-slate-800/90 text-white text-sm font-semibold border border-slate-600">
          <i data-lucide="circle-dollar-sign" class="w-4 h-4"></i> <span>USDC</span>
        </div>
        <input type="number" id="amountInput" value="1.0" step="0.5" class="bg-transparent text-right text-2xl font-medium text-white w-full outline-none">
      </div>
      <div class="flex justify-end gap-2 mt-2">
        <button class="percentBtn text-[11px] px-2 py-0.5 rounded-full bg-slate-700/50" data-percent="0.25">25%</button>
        <button class="percentBtn text-[11px] px-2 py-0.5 rounded-full bg-slate-700/50" data-percent="0.5">50%</button>
        <button class="percentBtn text-[11px] px-2 py-0.5 rounded-full bg-slate-700/50" data-percent="0.75">75%</button>
        <button id="maxBtn" class="text-[11px] px-2 py-0.5 rounded-full bg-slate-700/60">MAX</button>
      </div>
    </div>

    <!-- TO -->
    <div class="glass-panel rounded-2xl p-4 mt-1 mb-4">
      <div class="flex justify-between text-xs text-slate-400 mb-1">
        <span>You receive</span>
        <span id="toBalanceLabel" class="font-mono">—</span>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 rounded-full py-2 px-3 bg-slate-800/90 text-white text-sm font-semibold border border-slate-600">
          <i data-lucide="euro" class="w-4 h-4"></i> <span>EURC</span>
        </div>
        <input type="text" id="receiveField" readonly disabled class="bg-transparent text-right text-2xl font-medium text-white/80 w-full">
      </div>
      <div class="flex justify-between mt-1">
        <span id="minReceiveHint" class="text-[11px] text-slate-400">—</span>
      </div>
    </div>

    <!-- Gas & slippage -->
    <div class="bg-black/20 rounded-xl px-3 py-2 mb-4 text-xs">
      <div class="flex justify-between"><span>⛽ Gas:</span><span id="gasEstimate">—</span></div>
      <div class="flex justify-between mt-1"><span>📉 Slippage:</span><span id="slippageValue">0.5%</span></div>
      <div class="flex gap-2 justify-end mt-2">
        <button class="slippagePreset text-[10px] px-2 py-0.5 rounded bg-slate-700" data-slippage="0.1">0.1%</button>
        <button class="slippagePreset text-[10px] px-2 py-0.5 rounded bg-slate-700" data-slippage="0.5">0.5%</button>
        <button class="slippagePreset text-[10px] px-2 py-0.5 rounded bg-slate-700" data-slippage="1">1%</button>
      </div>
    </div>

    <button id="swapBtn" disabled class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 disabled:opacity-50 rounded-2xl py-3.5 font-bold text-white">
      <span id="swapBtnText">Swap tokens</span>
    </button>
  </div>
</main>

<script>
  // ========== CONFIGURATION ==========
  const USDC_ADDRESS = '0x3600000000000000000000000000000000000000';
  const EURC_ADDRESS = '0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a';
  const ERC20_ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"];
  const BACKEND_URL = 'https://arc-testnet-swap.vercel.app/api/swap';
  const EXPECTED_CHAIN_ID = 5042002;

  let provider, signer, userAddress, connected = false;
  let usdcContract, eurcContract;
  let currentSlippage = 0.5;
  let isProcessing = false;
  let usdcBalance = 0, eurcBalance = 0;

  // DOM elements
  const connectBtn = document.getElementById('connectBtn');
  const connectBtnText = document.getElementById('connectBtnText');
  const statusLed = document.getElementById('statusLed');
  const walletAddrSpan = document.getElementById('walletAddressShort');
  const fromBalanceLabel = document.getElementById('fromBalanceLabel');
  const toBalanceLabel = document.getElementById('toBalanceLabel');
  const amountInput = document.getElementById('amountInput');
  const receiveField = document.getElementById('receiveField');
  const minReceiveHint = document.getElementById('minReceiveHint');
  const swapBtn = document.getElementById('swapBtn');
  const swapBtnText = document.getElementById('swapBtnText');
  const maxBtn = document.getElementById('maxBtn');
  const gasEstimateSpan = document.getElementById('gasEstimate');
  const slippageValueSpan = document.getElementById('slippageValue');
  const refreshBtn = document.getElementById('refreshBtn');
  const copyBtn = document.getElementById('copyAddressBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toastRoot');
    toast.textContent = msg;
    toast.classList.add('toast-show');
    toast.style.borderColor = isError ? '#ef4444' : '#3b82f6';
    setTimeout(() => toast.classList.remove('toast-show'), 4000);
  }

  async function fetchBalances() {
    if (!connected || !usdcContract) return;
    try {
      const usdcWei = await usdcContract.balanceOf(userAddress);
      const usdcDec = await usdcContract.decimals();
      usdcBalance = parseFloat(ethers.utils.formatUnits(usdcWei, usdcDec));
      const eurcWei = await eurcContract.balanceOf(userAddress);
      const eurcDec = await eurcContract.decimals();
      eurcBalance = parseFloat(ethers.utils.formatUnits(eurcWei, eurcDec));
      fromBalanceLabel.innerText = `${usdcBalance.toFixed(4)} USDC`;
      toBalanceLabel.innerText = `${eurcBalance.toFixed(4)} EURC`;
      console.log(`Balances: USDC=${usdcBalance}, EURC=${eurcBalance}`);
      return true;
    } catch (err) {
      console.error("Balance fetch error", err);
      fromBalanceLabel.innerText = 'Error';
      return false;
    }
  }

  async function updateGasFee() {
    if (!provider || !connected) { gasEstimateSpan.innerText = '—'; return; }
    try {
      const feeData = await provider.getFeeData();
      let gasPrice = feeData.maxFeePerGas || feeData.gasPrice;
      if (!gasPrice) throw new Error();
      const minWei = ethers.utils.parseUnits("160", "gwei");
      if (gasPrice.lt(minWei)) gasPrice = minWei;
      const totalWei = ethers.BigNumber.from(350000).mul(gasPrice);
      const totalUSDC = ethers.utils.formatUnits(totalWei, 18);
      gasEstimateSpan.innerText = `~${parseFloat(totalUSDC).toFixed(6)} USDC`;
    } catch(e) { gasEstimateSpan.innerText = "?"; }
  }

  function updateQuote() {
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) {
      receiveField.value = '';
      minReceiveHint.innerText = '—';
      return;
    }
    const rate = 0.978; // USDC to EURC
    const rawOut = amount * rate;
    const minReceived = rawOut * (1 - currentSlippage / 100);
    receiveField.value = rawOut.toFixed(6);
    minReceiveHint.innerText = `min receive: ${minReceived.toFixed(6)} EURC`;
  }

  function validateAndEnable() {
    const amount = parseFloat(amountInput.value);
    if (!connected || isProcessing || isNaN(amount) || amount <= 0 || amount > usdcBalance) {
      swapBtn.disabled = true;
    } else {
      swapBtn.disabled = false;
    }
  }

  async function refreshUI() {
    if (connected) {
      await fetchBalances();
      await updateGasFee();
    }
    updateQuote();
    validateAndEnable();
    lucide.createIcons();
  }

  async function ensureArcNetwork(ethereumProvider) {
    const chainIdHex = `0x${EXPECTED_CHAIN_ID.toString(16)}`;
    try {
      await ethereumProvider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: chainIdHex }] });
    } catch (err) {
      if (err.code === 4902) {
        await ethereumProvider.request({ method: 'wallet_addEthereumChain', params: [{
          chainId: chainIdHex, chainName: 'Arc Testnet',
          nativeCurrency: { name: 'USDC', symbol: 'USDC', decimals: 18 },
          rpcUrls: ['https://rpc.testnet.arc.network'],
          blockExplorerUrls: ['https://explorer.testnet.arc.network']
        }]});
      } else throw err;
    }
  }

  async function connectWallet() {
    if (!window.ethereum) { showToast("Install MetaMask or Rabby", true); return; }
    try {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      userAddress = accounts[0];
      provider = new ethers.providers.Web3Provider(window.ethereum);
      signer = provider.getSigner();
      await ensureArcNetwork(window.ethereum);
      const network = await provider.getNetwork();
      if (network.chainId !== EXPECTED_CHAIN_ID) throw new Error("Wrong network");
      connected = true;
      usdcContract = new ethers.Contract(USDC_ADDRESS, ERC20_ABI, provider);
      eurcContract = new ethers.Contract(EURC_ADDRESS, ERC20_ABI, provider);
      await refreshUI();
      walletAddrSpan.innerText = `${userAddress.slice(0,6)}...${userAddress.slice(-4)} on Arc`;
      statusLed.classList.add('bg-emerald-400'); statusLed.classList.remove('bg-gray-500');
      connectBtnText.innerText = 'Connected';
      copyBtn.classList.remove('hidden'); disconnectBtn.classList.remove('hidden');
      showToast("Connected to Arc Testnet");
      if (window.gasInterval) clearInterval(window.gasInterval);
      window.gasInterval = setInterval(() => { if (connected) updateGasFee(); }, 15000);
    } catch (err) {
      showToast(`Connection error: ${err.message}`, true);
      connected = false;
    }
  }

  function disconnect() {
    connected = false;
    userAddress = null;
    provider = null;
    usdcBalance = 0; eurcBalance = 0;
    if (window.gasInterval) clearInterval(window.gasInterval);
    walletAddrSpan.innerText = '⚡ not connected';
    statusLed.classList.remove('bg-emerald-400'); statusLed.classList.add('bg-gray-500');
    connectBtnText.innerText = 'Connect';
    copyBtn.classList.add('hidden'); disconnectBtn.classList.add('hidden');
    refreshUI();
    showToast('Disconnected');
  }

  async function executeSwap() {
    if (!connected) { showToast("Connect wallet", true); return; }
    const amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) { showToast("Invalid amount", true); return; }

    // Fresh balance check directly from contract
    let realBalance = 0;
    try {
      const wei = await usdcContract.balanceOf(userAddress);
      const dec = await usdcContract.decimals();
      realBalance = parseFloat(ethers.utils.formatUnits(wei, dec));
    } catch(e) { realBalance = usdcBalance; }
    if (amount > realBalance) {
      showToast(`Insufficient USDC balance. You have ${realBalance.toFixed(4)} USDC`, true);
      return;
    }

    isProcessing = true;
    swapBtn.disabled = true;
    swapBtnText.innerHTML = '<div class="loading-spinner"></div> Preparing swap...';

    try {
      const response = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tokenIn: "USDC",
          tokenOut: "EURC",
          amountIn: amount.toString(),
          walletAddress: userAddress
        })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Backend error');

      // Extract transaction from fullResult (your backend's format)
      const txData = data.fullResult || data;
      if (!txData.to || !txData.data) throw new Error("Invalid transaction data");

      const tx = {
        from: userAddress,
        to: txData.to,
        data: txData.data,
        value: txData.value || "0x0",
        gasPrice: txData.gasPrice,
        gasLimit: ethers.BigNumber.from(txData.gas || 500000)
      };

      swapBtnText.innerHTML = '<div class="loading-spinner"></div> Confirm in wallet...';
      const sendTx = await signer.sendTransaction(tx);
      swapBtnText.innerHTML = '<div class="loading-spinner"></div> Confirming...';
      await sendTx.wait(1);
      showToast(`✅ Swap successful! Tx: ${sendTx.hash.slice(0,10)}...`, false);
      await refreshUI();
    } catch (err) {
      console.error(err);
      let friendly = err.message;
      if (friendly.includes('user rejected')) friendly = 'Transaction rejected.';
      else if (friendly.includes('insufficient')) friendly = 'Insufficient funds for gas or token.';
      showToast(`❌ Swap failed: ${friendly}`, true);
    } finally {
      swapBtnText.innerHTML = "Swap tokens";
      isProcessing = false;
      validateAndEnable();
    }
  }

  // Event listeners
  connectBtn.addEventListener('click', connectWallet);
  disconnectBtn.addEventListener('click', disconnect);
  copyBtn.addEventListener('click', () => { if(userAddress) navigator.clipboard.writeText(userAddress); showToast("Copied"); });
  refreshBtn.addEventListener('click', async () => { if(connected) await refreshUI(); });
  maxBtn.addEventListener('click', () => { if(connected) { amountInput.value = usdcBalance; refreshUI(); } });
  amountInput.addEventListener('input', () => { updateQuote(); validateAndEnable(); });
  document.querySelectorAll('.percentBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      if(connected) amountInput.value = (usdcBalance * parseFloat(btn.dataset.percent)).toFixed(6);
      refreshUI();
    });
  });
  document.querySelectorAll('.slippagePreset').forEach(btn => {
    btn.addEventListener('click', () => {
      currentSlippage = parseFloat(btn.dataset.slippage);
      slippageValueSpan.innerText = `${currentSlippage}%`;
      updateQuote();
    });
  });
  swapBtn.addEventListener('click', executeSwap);

  refreshUI();
  lucide.createIcons();
</script>
</body>
</html>
