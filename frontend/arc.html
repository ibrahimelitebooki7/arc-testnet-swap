<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ARC·CIRCLE | REAL SWAP (Uniswap V2)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
    body{min-height:100vh;background:radial-gradient(ellipse at 20% 30%,#0A0F1C,#02040A);display:flex;align-items:center;justify-content:center;padding:0.75rem;position:relative;}
    body::before{content:'';position:fixed;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,0.08) 0%,transparent 70%);top:10%;left:-80px;pointer-events:none;z-index:0;}
    body::after{content:'';position:fixed;width:420px;height:420px;border-radius:50%;border:2px dashed rgba(56,189,248,0.12);bottom:-120px;right:-120px;pointer-events:none;transform:rotate(15deg);}
    .swap-card{max-width:540px;width:100%;background:rgba(8,14,26,0.92);backdrop-filter:blur(20px);border-radius:2.2rem;padding:1.2rem;box-shadow:0 20px 38px -12px rgba(0,0,0,0.7),0 0 0 1px rgba(56,189,248,0.2);border:1px solid rgba(56,189,248,0.25);position:relative;z-index:2;}
    .swap-card::before{content:'';position:absolute;top:-1px;left:15%;width:70%;height:3px;background:linear-gradient(90deg,transparent,#38bdf8,#a855f7,transparent);border-radius:4px;opacity:0.7;}
    .swap-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;}
    .logo-area{display:flex;align-items:center;gap:8px;}
    .logo-area i{font-size:1.5rem;color:#38bdf8;filter:drop-shadow(0 0 4px #38bdf8);}
    .logo-area h1{font-size:1.35rem;font-weight:700;background:linear-gradient(135deg,#FFFFFF,#a5b4fc);background-clip:text;-webkit-background-clip:text;color:transparent;}
    .arc-circle-badge{background:rgba(168,85,247,0.2);padding:4px 8px;border-radius:60px;font-size:0.65rem;font-weight:600;color:#c084fc;border:0.5px solid rgba(168,85,247,0.5);display:flex;align-items:center;gap:5px;}
    .live-tag{display:flex;align-items:center;gap:6px;background:#0f172a80;border-radius:2rem;padding:0.2rem 0.7rem;}
    .live-dot{width:7px;height:7px;background:#10b981;border-radius:50%;box-shadow:0 0 5px #10b981;animation:pulse 1.5s infinite;}
    .badge{background:rgba(56,189,248,0.12);padding:4px 8px;border-radius:40px;font-size:0.6rem;font-weight:500;color:#b9e6ff;}
    .wallet-row{background:#0A0F1C;border-radius:1.5rem;padding:0.6rem 0.9rem;margin-bottom:1rem;border:1px solid #2a3a60;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
    .connect-wallet-btn{background:linear-gradient(135deg,#1e2a3a,#0f172f);border:1px solid #38bdf8;border-radius:2rem;padding:0.4rem 1rem;font-size:0.7rem;font-weight:600;color:#b9e6ff;cursor:pointer;transition:0.2s;display:flex;align-items:center;gap:8px;}
    .connect-wallet-btn:hover{background:#2563eb;color:white;}
    .address-display{font-family:monospace;background:#030712;padding:0.3rem 0.8rem;border-radius:2rem;font-size:0.7rem;color:#a5f3c3;}
    .balance-row{font-size:0.7rem;color:#8a9bc0;margin-top:6px;display:flex;justify-content:space-between;}
    .trade-box{background:#0A0F1C;border-radius:1.5rem;padding:0.7rem 0.9rem;margin-bottom:0.65rem;border:1px solid #1e2a44;}
    .amount-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.7rem;color:#9ca3cf;}
    .token-input-row{display:flex;align-items:center;gap:8px;}
    .token-input-row input{flex:2;background:#030712;border:1px solid #2d3a5e;padding:0.7rem;border-radius:1.3rem;font-size:1.1rem;font-weight:600;color:white;outline:none;}
    .token-input-row input:focus{border-color:#38bdf8;box-shadow:0 0 0 1.5px rgba(56,189,248,0.4);}
    .token-select{background:#0f172f;border:1px solid #2a3a60;border-radius:1.8rem;padding:0.55rem 0.9rem;display:flex;align-items:center;gap:8px;cursor:pointer;color:white;font-weight:500;min-width:105px;justify-content:space-between;font-size:0.85rem;}
    .swap-arrow{display:flex;justify-content:center;margin:0.2rem 0;}
    .swap-arrow-btn{background:#0f172f;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.2s;color:#9bb2e6;border:1.5px solid #2e467a;position:relative;}
    .swap-arrow-btn::after{content:"⭘";position:absolute;font-size:2rem;color:rgba(56,189,248,0.3);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
    .swap-arrow-btn:hover{background:#1f2b46;color:#38bdf8;transform:rotate(180deg);}
    .rate-info{background:#070c17;border-radius:1.2rem;padding:0.55rem 0.9rem;margin:0.4rem 0 0.7rem;display:flex;justify-content:space-between;font-size:0.75rem;color:#cbd5e6;border:1px solid #1f2a42;}
    .swap-action-btn{width:100%;background:linear-gradient(95deg,#2563eb,#38bdf8);border:none;padding:0.8rem;border-radius:2.5rem;font-weight:700;font-size:0.95rem;color:white;cursor:pointer;transition:0.15s;margin-top:0.2rem;}
    .swap-action-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .refresh-area{display:flex;justify-content:space-between;margin-top:0.6rem;font-size:0.6rem;color:#7e8bb8;}
    footer{text-align:center;font-size:0.6rem;margin-top:0.8rem;color:#4b567e;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
    .toast-message{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f172fe6;backdrop-filter:blur(12px);color:white;padding:8px 20px;border-radius:40px;font-size:0.75rem;z-index:200;border-left:3px solid #38bdf8;pointer-events:none;white-space:nowrap;max-width:90vw;white-space:normal;text-align:center;}
    .loader{display:inline-block;width:12px;height:12px;border:2px solid #2d3a5e;border-top:2px solid #38bdf8;border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{100%{transform:rotate(360deg);}}
    @keyframes pulse{0%{opacity:0.6;transform:scale(0.9);}100%{opacity:1;transform:scale(1.2);}}
    @media (max-width:480px){.swap-card{padding:1rem;}.token-select{min-width:85px;padding:0.45rem 0.7rem;font-size:0.75rem;}}
  </style>
</head>
<body>
<div class="swap-card">
  <div class="swap-header">
    <div class="logo-area"><i class="fas fa-bolt"></i><h1>NovaSwap <span style="font-size:0.7rem;">⚡</span></h1><div class="arc-circle-badge"><i class="fas fa-circle-notch"></i> ARC·CIRCLE</div></div>
    <div class="live-tag"><span class="live-dot"></span><span class="badge">REAL SWAP • UNISWAP V2</span></div>
  </div>

  <div class="wallet-row">
    <div><i class="fas fa-wallet"></i> <span id="walletStatus">Not connected</span></div>
    <button id="connectBtn" class="connect-wallet-btn"><i class="fab fa-metamask"></i> Connect</button>
    <div id="walletAddress" class="address-display" style="display:none;"></div>
  </div>

  <!-- FROM -->
  <div class="trade-box">
    <div class="amount-label"><span><i class="fas fa-arrow-up"></i> You pay</span><span id="fromUsdLabel">~ $0.00</span></div>
    <div class="token-input-row">
      <input type="number" id="fromAmount" value="0.01" step="any" placeholder="0.0">
      <div class="token-select" id="fromTokenSelect"><span><i class="fab fa-ethereum" id="fromIcon"></i> <span id="fromSymbol">WETH</span></span><i class="fas fa-chevron-down"></i></div>
    </div>
    <div class="balance-row"><span id="fromBalance">Balance: —</span><span id="wrapHint" style="font-size:0.65rem;color:#6f8fcf;"></span></div>
  </div>
  <div class="swap-arrow"><div class="swap-arrow-btn" id="swapDirBtn"><i class="fas fa-arrow-down"></i></div></div>
  <!-- TO -->
  <div class="trade-box">
    <div class="amount-label"><span><i class="fas fa-arrow-down"></i> You receive</span><span id="toUsdLabel">est.</span></div>
    <div class="token-input-row">
      <input type="text" id="toAmount" readonly style="background:#010409; cursor:default;">
      <div class="token-select" id="toTokenSelect"><span><i class="fas fa-dollar-sign" id="toIcon"></i> <span id="toSymbol">USDC</span></span><i class="fas fa-chevron-down"></i></div>
    </div>
    <div class="balance-row"><span id="toBalance">Balance: —</span></div>
  </div>
  <div class="rate-info"><span id="rateText">Fetching rate...</span><span><i class="fas fa-chart-line"></i> live</span></div>
  <button class="swap-action-btn" id="swapBtn"><i class="fas fa-exchange-alt"></i> Execute Real Swap</button>
  <div class="refresh-area"><span id="lastUpdate">—</span><button id="refreshRateBtn" class="refresh-btn"><i class="fas fa-cloud-sun"></i> Refresh</button></div>
  <footer><span>⛓️ Sepolia Testnet</span><span class="circle-arc-footer"><i class="fas fa-circle-notch"></i> REAL ONCHAIN</span><span><a href="#" id="faucetLink" style="color:#6f8fcf;text-decoration:none;">⛽ Get Sepolia ETH</a></span></footer>
</div>

<script>
  // ==================== CONFIGURATION ====================
  const UNISWAP_ROUTER = "0xC532a74256D3Db42D0Bf7a0400fEFDbad7694008";
  const WETH_ADDRESS = "0xfFf9976782d46CC05630D1f6eBAb18b2324d6B14";
  const USDC_ADDRESS = "0x94a9D9AC8a22534E3FaCa9F4e7F2E2cf85d861E7";
  const DAI_ADDRESS  = "0x3e622317f8C93f7328350cF0B56d4eD4c502C3B5";

  const TOKENS = {
    WETH: { address: WETH_ADDRESS, symbol: "WETH", decimals: 18, icon: "fab fa-ethereum", name: "Wrapped ETH", isNative: false },
    USDC: { address: USDC_ADDRESS, symbol: "USDC", decimals: 6,  icon: "fas fa-dollar-sign", name: "USD Coin", isNative: false },
    DAI:  { address: DAI_ADDRESS,  symbol: "DAI",  decimals: 18, icon: "fas fa-coins", name: "Dai", isNative: false }
  };
  const TOKEN_LIST = [TOKENS.WETH, TOKENS.USDC, TOKENS.DAI];

  let provider, signer, userAddress = null;
  let fromToken = TOKENS.WETH, toToken = TOKENS.USDC;
  let router, wethContract;
  let currentRate = null;

  // DOM elements
  const fromAmountInp = document.getElementById('fromAmount');
  const toAmountField = document.getElementById('toAmount');
  const fromSymbolSpan = document.getElementById('fromSymbol');
  const toSymbolSpan = document.getElementById('toSymbol');
  const fromIconSpan = document.getElementById('fromIcon');
  const toIconSpan = document.getElementById('toIcon');
  const rateTextSpan = document.getElementById('rateText');
  const swapBtn = document.getElementById('swapBtn');
  const connectBtn = document.getElementById('connectBtn');
  const walletStatusSpan = document.getElementById('walletStatus');
  const walletAddressDiv = document.getElementById('walletAddress');
  const refreshRateBtn = document.getElementById('refreshRateBtn');
  const swapDirBtn = document.getElementById('swapDirBtn');
  const fromTokenSelect = document.getElementById('fromTokenSelect');
  const toTokenSelect = document.getElementById('toTokenSelect');
  const fromUsdLabel = document.getElementById('fromUsdLabel');
  const toUsdLabel = document.getElementById('toUsdLabel');
  const lastUpdateSpan = document.getElementById('lastUpdate');
  const fromBalanceSpan = document.getElementById('fromBalance');
  const toBalanceSpan = document.getElementById('toBalance');
  const wrapHintSpan = document.getElementById('wrapHint');
  const faucetLink = document.getElementById('faucetLink');

  faucetLink.onclick = (e) => { e.preventDefault(); window.open('https://sepoliafaucet.com', '_blank'); };

  function showToast(msg, isErr=false) {
    let t = document.querySelector('.toast-message');
    if(t) t.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity='0'; setTimeout(()=>toast.remove(),300); }, 4000);
  }

  // ---------- ERC20 helpers ----------
  async function getTokenBalance(tokenAddr, decimals) {
    if(!userAddress) return "0";
    const contract = new ethers.Contract(tokenAddr, ["function balanceOf(address) view returns (uint256)"], provider);
    const bal = await contract.balanceOf(userAddress);
    return ethers.formatUnits(bal, decimals);
  }

  async function updateBalances() {
    if(!signer || !userAddress) return;
    try {
      const fromBal = await getTokenBalance(fromToken.address, fromToken.decimals);
      fromBalanceSpan.innerText = `Balance: ${parseFloat(fromBal).toFixed(6)} ${fromToken.symbol}`;
      const toBal = await getTokenBalance(toToken.address, toToken.decimals);
      toBalanceSpan.innerText = `Balance: ${parseFloat(toBal).toFixed(6)} ${toToken.symbol}`;
      if(fromToken.symbol === 'WETH') {
        const ethBalance = await provider.getBalance(userAddress);
        wrapHintSpan.innerHTML = ` (${ethers.formatEther(ethBalance)} ETH available to wrap)`;
      } else { wrapHintSpan.innerHTML = ''; }
    } catch(e) { console.warn(e); }
  }

  // ---------- Wrap ETH (if user chooses to swap native ETH) ----------
  async function wrapETH(amountWei) {
    if(!wethContract) wethContract = new ethers.Contract(WETH_ADDRESS, ["function deposit() payable", "function approve(address,uint256) returns(bool)"], signer);
    showToast("Wrapping ETH → WETH...", false);
    const tx = await wethContract.deposit({ value: amountWei });
    await tx.wait();
    showToast(`Wrapped ${ethers.formatEther(amountWei)} ETH`, false);
  }

  // ---------- Approve token for router ----------
  async function approveToken(tokenAddr, amountWei, symbol) {
    const token = new ethers.Contract(tokenAddr, ["function approve(address spender, uint256 amount) public returns (bool)", "function allowance(address,address) view returns (uint256)"], signer);
    const allowance = await token.allowance(userAddress, UNISWAP_ROUTER);
    if(allowance >= amountWei) return true;
    showToast(`Approving ${symbol}...`, false);
    const tx = await token.approve(UNISWAP_ROUTER, amountWei);
    await tx.wait();
    showToast(`✅ ${symbol} approved`, false);
    return true;
  }

  // ---------- Fetch real rate ----------
  async function fetchRealRate() {
    if(!router || !fromToken || !toToken) return;
    try {
      const amountIn = ethers.parseUnits("1", fromToken.decimals);
      const path = [fromToken.address, toToken.address];
      const amounts = await router.getAmountsOut(amountIn, path);
      const outAmount = ethers.formatUnits(amounts[1], toToken.decimals);
      currentRate = parseFloat(outAmount);
      rateTextSpan.innerHTML = `💱 1 ${fromToken.symbol} ≈ ${currentRate.toFixed(6)} ${toToken.symbol}`;
      lastUpdateSpan.innerHTML = `<i class="far fa-clock"></i> ${new Date().toLocaleTimeString()}`;
      updateConversion();
      return true;
    } catch(e) { rateTextSpan.innerHTML = "⚠️ Rate error (no liquidity)"; console.error(e); return false; }
  }

  async function updateConversion() {
    if(!router) return;
    const amountInStr = fromAmountInp.value;
    if(!amountInStr || parseFloat(amountInStr)<=0) { toAmountField.value = ""; return; }
    try {
      const amountIn = ethers.parseUnits(amountInStr, fromToken.decimals);
      const path = [fromToken.address, toToken.address];
      const amounts = await router.getAmountsOut(amountIn, path);
      const outAmount = ethers.formatUnits(amounts[1], toToken.decimals);
      toAmountField.value = parseFloat(outAmount).toFixed(6);
      // approximate USD (for display)
      const mockUsd = { WETH: 2500, USDC:1, DAI:1 };
      const fromUsd = parseFloat(amountInStr) * (mockUsd[fromToken.symbol] || 0);
      const toUsd = parseFloat(outAmount) * (mockUsd[toToken.symbol] || 0);
      fromUsdLabel.innerHTML = `≈ $${fromUsd.toFixed(2)}`;
      toUsdLabel.innerHTML = `≈ $${toUsd.toFixed(2)}`;
    } catch(e) { toAmountField.value = "error"; }
  }

  // ---------- Execute REAL swap ----------
  async function executeRealSwap() {
    if(!router || !userAddress) { showToast("Connect wallet first", true); return; }
    const amountIn = fromAmountInp.value;
    if(!amountIn || parseFloat(amountIn)<=0) { showToast("Enter amount", true); return; }
    swapBtn.disabled = true;
    swapBtn.innerHTML = '<i class="loader"></i> Swapping...';
    try {
      const amountInWei = ethers.parseUnits(amountIn, fromToken.decimals);
      const path = [fromToken.address, toToken.address];
      const amounts = await router.getAmountsOut(amountInWei, path);
      const amountOutMin = amounts[1] * 95n / 100n; // 5% slippage
      const deadline = Math.floor(Date.now()/1000) + 1200;

      // Special case: if fromToken is WETH and user has insufficient WETH but has ETH, offer to wrap
      if(fromToken.symbol === 'WETH') {
        const wethBal = await getTokenBalance(WETH_ADDRESS, 18);
        if(parseFloat(wethBal) < parseFloat(amountIn)) {
          const ethBal = await provider.getBalance(userAddress);
          const ethNeeded = ethers.parseUnits(amountIn, 18);
          if(ethBal >= ethNeeded) {
            showToast("Insufficient WETH, wrapping ETH...", false);
            await wrapETH(ethNeeded);
            await updateBalances();
          } else {
            throw new Error("Insufficient WETH and ETH balance");
          }
        }
      }

      // Approve token (if not native ETH – but we only use WETH/ERC20)
      await approveToken(fromToken.address, amountInWei, fromToken.symbol);

      const tx = await router.swapExactTokensForTokens(
        amountInWei, amountOutMin, path, userAddress, deadline
      );
      showToast(`Swap submitted: ${tx.hash.slice(0,10)}...`, false);
      await tx.wait();
      showToast(`✅ Swap complete! Received ${ethers.formatUnits(amountOutMin, toToken.decimals)} ${toToken.symbol}`, false);
      await fetchRealRate();
      await updateBalances();
    } catch(e) {
      let msg = e.message;
      if(msg.includes("INSUFFICIENT_OUTPUT_AMOUNT")) msg = "Slippage too high, try a smaller amount or refresh rate";
      else if(msg.includes("TRANSFER_FROM_FAILED")) msg = "Insufficient balance or approval failed";
      else if(msg.includes("execution reverted")) msg = "Swap reverted (check balance or liquidity)";
      showToast("❌ "+msg.slice(0,100), true);
    } finally {
      swapBtn.disabled = false;
      swapBtn.innerHTML = '<i class="fas fa-exchange-alt"></i> Execute Real Swap';
    }
  }

  // ---------- Network and connection ----------
  async function initWeb3() {
    if(!window.ethereum) { showToast("Install MetaMask!", true); return false; }
    try {
      provider = new ethers.BrowserProvider(window.ethereum);
      const accounts = await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      userAddress = await signer.getAddress();
      walletAddressDiv.style.display = 'block';
      walletAddressDiv.innerText = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
      walletStatusSpan.innerText = 'Connected (Sepolia)';
      connectBtn.innerHTML = '<i class="fas fa-check-circle"></i> Wallet Ready';
      connectBtn.disabled = true;
      const network = await provider.getNetwork();
      if(network.chainId !== 11155111n) {
        showToast("⚠️ Please switch to Sepolia testnet in MetaMask", true);
        return false;
      }
      const routerABI = [
        "function getAmountsOut(uint amountIn, address[] memory path) public view returns (uint[] memory amounts)",
        "function swapExactTokensForTokens(uint amountIn, uint amountOutMin, address[] calldata path, address to, uint deadline) external returns (uint[] memory amounts)"
      ];
      router = new ethers.Contract(UNISWAP_ROUTER, routerABI, signer);
      wethContract = new ethers.Contract(WETH_ADDRESS, ["function deposit() payable", "function approve(address,uint256) returns(bool)", "function balanceOf(address) view returns (uint256)"], signer);
      await fetchRealRate();
      await updateBalances();
      return true;
    } catch(e) { showToast("Connection error: "+e.message.slice(0,80), true); return false; }
  }

  // ---------- UI helpers ----------
  function swapTokens() {
    let temp = fromToken;
    fromToken = toToken;
    toToken = temp;
    fromSymbolSpan.innerText = fromToken.symbol;
    toSymbolSpan.innerText = toToken.symbol;
    fromIconSpan.className = fromToken.icon;
    toIconSpan.className = toToken.icon;
    renderSelectVisuals();
    fetchRealRate();
    updateBalances();
  }

  function renderSelectVisuals() {
    fromTokenSelect.querySelector('span:first-child').innerHTML = `<i class="${fromToken.icon}" style="margin-right:6px;"></i> ${fromToken.symbol}`;
    toTokenSelect.querySelector('span:first-child').innerHTML = `<i class="${toToken.icon}" style="margin-right:6px;"></i> ${toToken.symbol}`;
  }

  function buildTokenModal(isFrom) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(12px); z-index:1000; display:flex; align-items:center; justify-content:center;';
    const card = document.createElement('div');
    card.style.cssText = 'background:#0E1527; border-radius:1.8rem; width:270px; padding:1.2rem; border:1px solid #2d3a62;';
    card.innerHTML = `<h4 style="margin-bottom:0.8rem; color:white;"><i class="fas fa-circle-notch"></i> ARC·CIRCLE tokens</h4><div id="tokenList" style="max-height:300px; overflow:auto;"></div><button id="closeModal" style="margin-top:1rem; background:#1e2a44; border:none; padding:6px; border-radius:30px; width:100%; color:white;">Cancel</button>`;
    const list = card.querySelector('#tokenList');
    TOKEN_LIST.forEach(tok => {
      const item = document.createElement('div');
      item.style.cssText = 'display:flex; align-items:center; gap:10px; padding:10px 8px; border-radius:1rem; cursor:pointer; color:#e2e8f0; border-bottom:1px solid #1e2a42;';
      item.innerHTML = `<i class="${tok.icon}"></i> <span style="flex:1; font-weight:500;">${tok.symbol}</span><span style="font-size:0.65rem;">${tok.name}</span>`;
      item.onclick = () => {
        if(isFrom) fromToken = tok;
        else toToken = tok;
        fromSymbolSpan.innerText = fromToken.symbol;
        toSymbolSpan.innerText = toToken.symbol;
        fromIconSpan.className = fromToken.icon;
        toIconSpan.className = toToken.icon;
        renderSelectVisuals();
        fetchRealRate();
        updateBalances();
        document.body.removeChild(overlay);
        showToast(`${tok.symbol} selected`);
      };
      list.appendChild(item);
    });
    card.querySelector('#closeModal').onclick = () => document.body.removeChild(overlay);
    overlay.appendChild(card);
    document.body.appendChild(overlay);
  }

  // ---------- Event binding ----------
  fromTokenSelect.addEventListener('click', (e) => { e.stopPropagation(); buildTokenModal(true); });
  toTokenSelect.addEventListener('click', (e) => { e.stopPropagation(); buildTokenModal(false); });
  swapDirBtn.addEventListener('click', swapTokens);
  fromAmountInp.addEventListener('input', () => { if(router) updateConversion(); });
  refreshRateBtn.addEventListener('click', async () => { await fetchRealRate(); await updateBalances(); });
  swapBtn.addEventListener('click', executeRealSwap);
  connectBtn.addEventListener('click', async () => { await initWeb3(); });

  // Initial render
  renderSelectVisuals();
  fromSymbolSpan.innerText = fromToken.symbol;
  toSymbolSpan.innerText = toToken.symbol;
  fromIconSpan.className = fromToken.icon;
  toIconSpan.className = toToken.icon;
  if(window.ethereum && window.ethereum.selectedAddress) initWeb3();
</script>
</body>
</html>
