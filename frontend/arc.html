<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ARC CIRCLE • NOVA SWAP + WALLET</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 20% 30%, #0A0F1C, #02040A);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      position: relative;
    }

    /* ARC + CIRCLE decorative rings */
    body::before {
      content: '';
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%);
      top: 10%;
      left: -80px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 2px dashed rgba(56,189,248,0.12);
      bottom: -120px;
      right: -120px;
      pointer-events: none;
      transform: rotate(15deg);
    }

    .swap-card {
      max-width: 520px;
      width: 100%;
      background: rgba(8, 14, 26, 0.86);
      backdrop-filter: blur(20px);
      border-radius: 2.2rem;
      padding: 1.2rem;
      box-shadow: 0 20px 38px -12px rgba(0,0,0,0.7), 0 0 0 1px rgba(56, 189, 248, 0.2);
      border: 1px solid rgba(56, 189, 248, 0.25);
      position: relative;
      z-index: 2;
    }

    .swap-card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 15%;
      width: 70%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #38bdf8, #a855f7, transparent);
      border-radius: 4px;
      opacity: 0.7;
    }

    /* header + wallet row */
    .swap-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-area i {
      font-size: 1.5rem;
      color: #38bdf8;
      filter: drop-shadow(0 0 4px #38bdf8);
    }
    .logo-area h1 {
      font-size: 1.35rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFFFFF, #a5b4fc);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .arc-circle-badge {
      background: rgba(168, 85, 247, 0.2);
      padding: 4px 8px;
      border-radius: 60px;
      font-size: 0.65rem;
      font-weight: 600;
      color: #c084fc;
      border: 0.5px solid rgba(168,85,247,0.5);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .live-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #0f172a80;
      border-radius: 2rem;
      padding: 0.2rem 0.7rem;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 5px #10b981;
      animation: pulse 1.5s infinite;
    }
    .badge {
      background: rgba(56, 189, 248, 0.12);
      padding: 4px 8px;
      border-radius: 40px;
      font-size: 0.6rem;
      font-weight: 500;
      color: #b9e6ff;
    }

    /* wallet connection row */
    .wallet-row {
      background: #0A0F1C;
      border-radius: 1.5rem;
      padding: 0.6rem 0.9rem;
      margin-bottom: 1rem;
      border: 1px solid #2a3a60;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .wallet-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: #9ca3cf;
    }
    .connect-wallet-btn {
      background: linear-gradient(135deg, #1e2a3a, #0f172f);
      border: 1px solid #38bdf8;
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: #b9e6ff;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .connect-wallet-btn:hover {
      background: #2563eb;
      border-color: white;
      color: white;
    }
    .address-display {
      font-family: monospace;
      background: #030712;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      color: #a5f3c3;
    }

    /* trade boxes compact */
    .trade-box {
      background: #0A0F1C;
      border-radius: 1.5rem;
      padding: 0.7rem 0.9rem;
      margin-bottom: 0.65rem;
      border: 1px solid #1e2a44;
    }
    .amount-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.7rem;
      color: #9ca3cf;
      font-weight: 500;
    }
    .token-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .token-input-row input {
      flex: 2;
      background: #030712;
      border: 1px solid #2d3a5e;
      padding: 0.7rem 0.7rem;
      border-radius: 1.3rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      outline: none;
    }
    .token-input-row input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 1.5px rgba(56, 189, 248, 0.4);
    }
    .token-select {
      background: #0f172f;
      border: 1px solid #2a3a60;
      border-radius: 1.8rem;
      padding: 0.55rem 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: white;
      font-weight: 500;
      min-width: 105px;
      justify-content: space-between;
      font-size: 0.85rem;
    }
    .swap-arrow {
      display: flex;
      justify-content: center;
      margin: 0.2rem 0;
    }
    .swap-arrow-btn {
      background: #0f172f;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      color: #9bb2e6;
      border: 1.5px solid #2e467a;
      position: relative;
    }
    .swap-arrow-btn::after {
      content: "⭘";
      position: absolute;
      font-size: 2rem;
      color: rgba(56,189,248,0.3);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .swap-arrow-btn:hover {
      background: #1f2b46;
      color: #38bdf8;
      transform: rotate(180deg);
    }
    .rate-info {
      background: #070c17;
      border-radius: 1.2rem;
      padding: 0.55rem 0.9rem;
      margin: 0.4rem 0 0.7rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #cbd5e6;
      border: 1px solid #1f2a42;
    }
    .swap-action-btn {
      width: 100%;
      background: linear-gradient(95deg, #2563eb, #38bdf8);
      border: none;
      padding: 0.8rem;
      border-radius: 2.5rem;
      font-weight: 700;
      font-size: 0.95rem;
      color: white;
      cursor: pointer;
      transition: 0.15s;
      margin-top: 0.2rem;
    }
    .swap-action-btn:hover {
      transform: scale(0.98);
      background: linear-gradient(95deg, #1e55cf, #2d9ef0);
    }
    .refresh-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.6rem;
      font-size: 0.6rem;
      color: #7e8bb8;
    }
    .refresh-btn {
      background: none;
      border: none;
      color: #6f8fcf;
      cursor: pointer;
      font-size: 0.7rem;
    }
    footer {
      text-align: center;
      font-size: 0.6rem;
      margin-top: 0.8rem;
      color: #4b567e;
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .circle-arc-footer {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(168,85,247,0.1);
      padding: 0.1rem 0.5rem;
      border-radius: 100px;
    }
    .toast-message {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172fe6;
      backdrop-filter: blur(12px);
      color: white;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 0.75rem;
      z-index: 200;
      border-left: 3px solid #38bdf8;
      pointer-events: none;
    }
    .loader {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #2d3a5e;
      border-top: 2px solid #38bdf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes pulse {
      0% { opacity: 0.6; transform: scale(0.9);}
      100% { opacity: 1; transform: scale(1.2);}
    }
    @media (max-width: 480px) {
      .swap-card { padding: 1rem; }
      .token-select { min-width: 85px; padding: 0.45rem 0.7rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<div class="swap-card">
  <div class="swap-header">
    <div class="logo-area">
      <i class="fas fa-bolt"></i>
      <h1>NovaSwap <span style="font-size:0.7rem;">⚡</span></h1>
      <div class="arc-circle-badge"><i class="fas fa-circle-notch"></i> ARC·CIRCLE</div>
    </div>
    <div class="live-tag">
      <span class="live-dot"></span>
      <span class="badge">ZERO FEES</span>
    </div>
  </div>

  <!-- WALLET CONNECTION (MetaMask) - real wallet, no private key hardcoded -->
  <div class="wallet-row">
    <div class="wallet-status">
      <i class="fas fa-wallet"></i> <span id="walletStatusText">Not connected</span>
    </div>
    <button id="connectWalletBtn" class="connect-wallet-btn">
      <i class="fab fa-metamask"></i> Connect MetaMask
    </button>
    <div id="walletAddressDisplay" class="address-display" style="display: none;"></div>
  </div>

  <!-- FROM BOX -->
  <div class="trade-box">
    <div class="amount-label"><span><i class="fas fa-arrow-up"></i> You pay</span><span id="fromBalanceLabel">~ $0.00</span></div>
    <div class="token-input-row">
      <input type="number" id="fromAmount" value="1.0" step="any">
      <div class="token-select" id="fromTokenSelect">
        <span><i class="fab fa-bitcoin" id="fromIcon"></i> <span id="fromSymbol">BTC</span></span>
        <i class="fas fa-chevron-down"></i>
      </div>
    </div>
  </div>

  <!-- SWAP ARROW -->
  <div class="swap-arrow">
    <div class="swap-arrow-btn" id="swapDirectionBtn"><i class="fas fa-arrow-down"></i></div>
  </div>

  <!-- TO BOX -->
  <div class="trade-box">
    <div class="amount-label"><span><i class="fas fa-arrow-down"></i> You receive</span><span id="toBalanceLabel">est. value</span></div>
    <div class="token-input-row">
      <input type="text" id="toAmount" readonly style="background:#010409; cursor:default;">
      <div class="token-select" id="toTokenSelect">
        <span><i class="fab fa-ethereum" id="toIcon"></i> <span id="toSymbol">ETH</span></span>
        <i class="fas fa-chevron-down"></i>
      </div>
    </div>
  </div>

  <div class="rate-info"><span id="exchangeRateText">1 BTC = 0 ETH</span><span><i class="fas fa-chart-line"></i> Live</span></div>
  <button class="swap-action-btn" id="executeSwapBtn"><i class="fas fa-sync-alt"></i> Instant Swap</button>
  <div class="refresh-area"><span id="lastUpdateTime">updating...</span><button class="refresh-btn" id="refreshPriceBtn"><i class="fas fa-cloud-sun"></i> Refresh</button></div>
  <footer><span>⚡ Live via CoinGecko</span><span class="circle-arc-footer"><i class="fas fa-circle-notch"></i> WALLET READY</span><span>0% fee</span></footer>
</div>

<script>
  // ----------------------------- TOKEN LIST -------------------------
  const TOKENS = [
    { symbol: "BTC", name: "Bitcoin", coinId: "bitcoin", icon: "fab fa-bitcoin" },
    { symbol: "ETH", name: "Ethereum", coinId: "ethereum", icon: "fab fa-ethereum" },
    { symbol: "USDC", name: "USD Coin", coinId: "usd-coin", icon: "fas fa-dollar-sign" },
    { symbol: "USDT", name: "Tether", coinId: "tether", icon: "fas fa-dollar-sign" },
    { symbol: "BNB", name: "BNB", coinId: "binancecoin", icon: "fas fa-chart-simple" },
    { symbol: "SOL", name: "Solana", coinId: "solana", icon: "fas fa-sun" },
    { symbol: "MATIC", name: "Polygon", coinId: "matic-network", icon: "fas fa-shield-alt" },
    { symbol: "DOGE", name: "Dogecoin", coinId: "dogecoin", icon: "fas fa-dog" }
  ];

  let fromToken = TOKENS[0], toToken = TOKENS[1];
  let priceMap = {};
  let isLoadingPrices = false;
  let walletAddress = null;

  // DOM elements
  const fromAmountInput = document.getElementById('fromAmount');
  const toAmountField = document.getElementById('toAmount');
  const fromSymbolSpan = document.getElementById('fromSymbol');
  const toSymbolSpan = document.getElementById('toSymbol');
  const fromIconSpan = document.getElementById('fromIcon');
  const toIconSpan = document.getElementById('toIcon');
  const exchangeRateSpan = document.getElementById('exchangeRateText');
  const lastUpdateSpan = document.getElementById('lastUpdateTime');
  const swapDirectionBtn = document.getElementById('swapDirectionBtn');
  const executeSwapBtn = document.getElementById('executeSwapBtn');
  const refreshPriceBtn = document.getElementById('refreshPriceBtn');
  const fromTokenSelect = document.getElementById('fromTokenSelect');
  const toTokenSelect = document.getElementById('toTokenSelect');
  const fromBalanceLabel = document.getElementById('fromBalanceLabel');
  const toBalanceLabel = document.getElementById('toBalanceLabel');
  const connectWalletBtn = document.getElementById('connectWalletBtn');
  const walletStatusSpan = document.getElementById('walletStatusText');
  const walletAddressDiv = document.getElementById('walletAddressDisplay');

  function showToast(msg, isError = false) {
    let existing = document.querySelector('.toast-message');
    if(existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2600);
  }

  // ---------------------------- WALLET (MetaMask) -------------------------
  async function connectMetaMask() {
    if (!window.ethereum) {
      showToast("❌ MetaMask not detected. Please install MetaMask.", true);
      return;
    }
    try {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      if (accounts && accounts.length > 0) {
        walletAddress = accounts[0];
        walletAddressDiv.style.display = 'block';
        walletAddressDiv.innerText = `${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
        walletStatusSpan.innerText = 'Connected';
        connectWalletBtn.innerHTML = '<i class="fas fa-check-circle"></i> Wallet Active';
        connectWalletBtn.disabled = true;
        connectWalletBtn.style.opacity = '0.7';
        showToast(`✅ Wallet connected: ${walletAddress.slice(0,10)}...`);
        // optional: fetch ETH balance
        const balance = await window.ethereum.request({ method: 'eth_getBalance', params: [walletAddress, 'latest'] });
        const ethBalance = parseInt(balance, 16) / 1e18;
        showToast(`💰 Balance: ${ethBalance.toFixed(4)} ETH`, false);
      } else {
        showToast("No accounts found", true);
      }
    } catch (err) {
      console.error(err);
      showToast("Connection rejected or error", true);
    }
  }

  connectWalletBtn.addEventListener('click', connectMetaMask);

  // Listen for account changes
  if (window.ethereum) {
    window.ethereum.on('accountsChanged', (accounts) => {
      if (accounts.length === 0) {
        walletAddress = null;
        walletAddressDiv.style.display = 'none';
        walletStatusSpan.innerText = 'Not connected';
        connectWalletBtn.innerHTML = '<i class="fab fa-metamask"></i> Connect MetaMask';
        connectWalletBtn.disabled = false;
        connectWalletBtn.style.opacity = '1';
        showToast("Wallet disconnected");
      } else {
        walletAddress = accounts[0];
        walletAddressDiv.innerText = `${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
        walletStatusSpan.innerText = 'Connected';
        showToast("Account changed, reconnected");
      }
    });
  }

  // ----------------------------- PRICE FETCHING (CoinGecko) -----------------
  async function fetchAllPrices() {
    if(isLoadingPrices) return;
    isLoadingPrices = true;
    exchangeRateSpan.innerHTML = '<i class="loader"></i> fetching...';
    try {
      const ids = TOKENS.map(t=>t.coinId).join(',');
      const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
      if(!res.ok) throw new Error();
      const data = await res.json();
      for(let t of TOKENS) {
        priceMap[t.coinId] = data[t.coinId]?.usd || null;
      }
      lastUpdateSpan.innerHTML = `<i class="far fa-clock"></i> ${new Date().toLocaleTimeString()}`;
      updateConversion();
      showToast("Rates updated", false);
    } catch(e) {
      if(Object.keys(priceMap).length === 0) {
        // fallback demo
        priceMap = { bitcoin: 68500, ethereum: 3200, "usd-coin":1, tether:1, binancecoin:580, solana:145, "matic-network":0.72, dogecoin:0.12 };
      }
      showToast("⚠️ Using cached rates", true);
      updateConversion();
    } finally {
      isLoadingPrices = false;
      exchangeRateSpan.innerHTML = 'updating...';
      updateRateDisplay();
    }
  }

  function computeToAmount(amount) {
    if(!amount || amount<=0) return 0;
    const fp = priceMap[fromToken.coinId], tp = priceMap[toToken.coinId];
    if(!fp || !tp) return 0;
    return (amount * fp) / tp;
  }

  function updateConversion() {
    const fromVal = parseFloat(fromAmountInput.value);
    if(isNaN(fromVal)) { toAmountField.value = ''; return; }
    const res = computeToAmount(fromVal);
    toAmountField.value = (res && isFinite(res)) ? res.toLocaleString(undefined, {minimumFractionDigits:2,maximumFractionDigits:8}) : '0.00';
    updateRateDisplay();
  }

  function updateRateDisplay() {
    const fp = priceMap[fromToken.coinId];
    const tp = priceMap[toToken.coinId];
    if(fp && tp) {
      const rate = fp / tp;
      exchangeRateSpan.innerHTML = `💱 1 ${fromToken.symbol} ≈ ${rate.toFixed(8)} ${toToken.symbol}`;
    } else {
      exchangeRateSpan.innerHTML = `⚡ ARC live rate ...`;
    }
    const fromVal = parseFloat(fromAmountInput.value) || 0;
    if(fp) fromBalanceLabel.innerHTML = `≈ $${(fromVal * fp).toFixed(2)} USD`;
    const toRaw = toAmountField.value.replace(/,/g, '');
    const toNum = parseFloat(toRaw) || 0;
    if(tp) toBalanceLabel.innerHTML = `≈ $${(toNum * tp).toFixed(2)} USD`;
  }

  function swapTokens() {
    [fromToken, toToken] = [toToken, fromToken];
    fromSymbolSpan.innerText = fromToken.symbol;
    toSymbolSpan.innerText = toToken.symbol;
    fromIconSpan.className = fromToken.icon;
    toIconSpan.className = toToken.icon;
    renderSelectVisuals();
    updateConversion();
    showToast(`Swapped ${fromToken.symbol} ↔ ${toToken.symbol}`);
  }

  function renderSelectVisuals() {
    fromTokenSelect.querySelector('span:first-child').innerHTML = `<i class="${fromToken.icon}" style="margin-right:6px;"></i> ${fromToken.symbol}`;
    toTokenSelect.querySelector('span:first-child').innerHTML = `<i class="${toToken.icon}" style="margin-right:6px;"></i> ${toToken.symbol}`;
  }

  function buildTokenModal(isFrom) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(12px); z-index:1000; display:flex; align-items:center; justify-content:center;';
    const card = document.createElement('div');
    card.style.cssText = 'background:#0E1527; border-radius:1.8rem; width:270px; padding:1.2rem; border:1px solid #2d3a62;';
    card.innerHTML = `<h4 style="margin-bottom:0.8rem; color:white;"><i class="fas fa-circle-notch"></i> Select token</h4><div id="modalList" style="max-height:300px; overflow:auto;"></div><button id="closeModalBtn" style="margin-top:1rem; background:#1e2a44; border:none; padding:6px; border-radius:30px; width:100%; color:white;">Close</button>`;
    const list = card.querySelector('#modalList');
    TOKENS.forEach(tok => {
      const item = document.createElement('div');
      item.style.cssText = 'display:flex; align-items:center; gap:10px; padding:10px 8px; border-radius:1rem; cursor:pointer; color:#e2e8f0; border-bottom:1px solid #1e2a42;';
      item.innerHTML = `<i class="${tok.icon}"></i> <span style="flex:1; font-weight:500;">${tok.symbol}</span><span style="font-size:0.65rem;">${tok.name}</span>`;
      item.onclick = () => {
        if(isFrom) fromToken = tok;
        else toToken = tok;
        fromSymbolSpan.innerText = fromToken.symbol;
        toSymbolSpan.innerText = toToken.symbol;
        fromIconSpan.className = fromToken.icon;
        toIconSpan.className = toToken.icon;
        renderSelectVisuals();
        updateConversion();
        document.body.removeChild(overlay);
        showToast(`${tok.symbol} selected`);
      };
      list.appendChild(item);
    });
    card.querySelector('#closeModalBtn').onclick = () => document.body.removeChild(overlay);
    overlay.appendChild(card);
    document.body.appendChild(overlay);
  }

  fromTokenSelect.addEventListener('click', (e) => { e.stopPropagation(); buildTokenModal(true); });
  toTokenSelect.addEventListener('click', (e) => { e.stopPropagation(); buildTokenModal(false); });
  swapDirectionBtn.addEventListener('click', swapTokens);
  fromAmountInput.addEventListener('input', updateConversion);
  refreshPriceBtn.addEventListener('click', () => { fetchAllPrices(); });
  executeSwapBtn.addEventListener('click', () => {
    const fromVal = parseFloat(fromAmountInput.value);
    if(!fromVal || fromVal<=0) return showToast("Enter amount", true);
    const received = computeToAmount(fromVal);
    if(!received) return showToast("Rate missing", true);
    if(!walletAddress) showToast("⚠️ Connect wallet first to simulate real swap", false);
    showToast(`🔄 SWAP SIM: ${fromVal} ${fromToken.symbol} → ${received.toFixed(6)} ${toToken.symbol} (0 fees)`, false);
  });

  function init() {
    renderSelectVisuals();
    fetchAllPrices();
    setInterval(fetchAllPrices, 50000);
  }
  init();
</script>
</body>
